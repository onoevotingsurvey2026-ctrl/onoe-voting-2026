<!DOCTYPE html>
<html>
<head>
  <title>TRUE Election System PRO</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#f4f6f8;
      margin:0;
    }

    header{
      background:#0f172a;
      color:white;
      padding:15px;
    }

    #dashboard{ display:none; }

    .card{
      background:white;
      margin:10px;
      padding:15px;
      border-radius:10px;
      display:inline-block;
      min-width:240px;
    }

    button{
      padding:10px 15px;
      margin:5px;
      cursor:pointer;
    }

    #adminPanel{
      display:none;
      background:#fff3cd;
      padding:10px;
      margin:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<header>
  🌍 TRUE Election System
</header>

<!-- LOGIN -->
<div id="loginSection">
  <h2>Login to Continue</h2>
  <button onclick="login()">Login with Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <h2>📊 Live Election Results</h2>

  <div class="card">
    <h3>India</h3>

    <p>ONOE Support: <span id="os">0</span></p>
    <p>ONOE Against: <span id="oa">0</span></p>
    <p>DEL Support: <span id="ds">0</span></p>
    <p>DEL Against: <span id="da">0</span></p>

    <button onclick="vote('india','onoeSupport')">ONOE +</button>
    <button onclick="vote('india','onoeAgainst')">ONOE -</button>
    <button onclick="vote('india','delSupport')">DEL +</button>
    <button onclick="vote('india','delAgainst')">DEL -</button>
  </div>

  <div id="adminPanel">
    <h3>🧑‍💼 Admin Panel</h3>
    <button onclick="resetSystem()">Reset All Votes</button>
  </div>

</div>

<script>

/////////////////////////////////////////////////////
// 🔥 FIREBASE CONFIG
/////////////////////////////////////////////////////

const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/////////////////////////////////////////////////////
// 🔐 LOGIN (REDIRECT SAFE)
/////////////////////////////////////////////////////

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

auth.getRedirectResult().catch(()=>{});

/////////////////////////////////////////////////////
// 🔄 AUTH CONTROL
/////////////////////////////////////////////////////

auth.onAuthStateChanged(user=>{

  if(user){
    document.getElementById("loginSection").style.display="none";
    document.getElementById("dashboard").style.display="block";

    loadResults();

    // ADMIN CHECK
    if(user.email === "onoe.voting.survey2026@gmail.com"){
      document.getElementById("adminPanel").style.display="block";
    }

  }else{
    document.getElementById("loginSection").style.display="block";
    document.getElementById("dashboard").style.display="none";
  }

});

/////////////////////////////////////////////////////
// 🗳️ TRUE VOTING SYSTEM (NO DUPLICATE)
/////////////////////////////////////////////////////

function vote(country, choice){

  const user = auth.currentUser;
  if(!user){
    alert("Login first");
    return;
  }

  const path = "userVotes/"+user.uid+"/"+country;

  db.ref(path).once("value", snap=>{

    if(snap.exists()){
      alert("❌ You already voted in this country!");
      return;
    }

    db.ref(path).set(choice);
    alert("✅ Vote recorded successfully!");
  });

}

/////////////////////////////////////////////////////
// 📊 AUTO RESULT CALCULATION
/////////////////////////////////////////////////////

function loadResults(){

  db.ref("userVotes").on("value", snap=>{

    let data = snap.val() || {};

    let os=0, oa=0, ds=0, da=0;

    Object.values(data).forEach(user=>{

      if(user.india === "onoeSupport") os++;
      if(user.india === "onoeAgainst") oa++;
      if(user.india === "delSupport") ds++;
      if(user.india === "delAgainst") da++;

    });

    document.getElementById("os").innerText = os;
    document.getElementById("oa").innerText = oa;
    document.getElementById("ds").innerText = ds;
    document.getElementById("da").innerText = da;

  });

}

/////////////////////////////////////////////////////
// 🧑‍💼 ADMIN RESET
/////////////////////////////////////////////////////

function resetSystem(){

  const user = auth.currentUser;

  if(user.email !== "onoe.voting.survey2026@gmail.com"){
    alert("Not allowed");
    return;
  }

  db.ref("userVotes").remove();
  alert("System reset complete!");
}

</script>

</body>
</html>
