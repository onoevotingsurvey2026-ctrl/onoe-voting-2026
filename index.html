<!DOCTYPE html>
<html>
<head>
  <title>TV Mode Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body{
      margin:0;
      font-family: Arial;
      background: #0b1a33;
      color:white;
      text-align:center;
    }

    .header{
      padding:20px;
      background: rgba(255,255,255,0.05);
      font-size:22px;
      font-weight:bold;
    }

    .grid{
      display:flex;
      justify-content:space-around;
      margin-top:40px;
      flex-wrap:wrap;
    }

    .card{
      width:30%;
      min-width:250px;
      padding:30px;
      margin:10px;
      border-radius:15px;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }

    .num{
      font-size:60px;
      font-weight:bold;
      margin-top:10px;
    }

    .a{border-top:5px solid #00ff7f;}
    .b{border-top:5px solid #ff4d4d;}
    .c{border-top:5px solid #4da6ff;}

    .label{
      font-size:20px;
      margin-top:10px;
    }

    .footer{
      position:fixed;
      bottom:0;
      width:100%;
      padding:10px;
      background: rgba(255,255,255,0.05);
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="header">
📺 LIVE TV MODE DASHBOARD<br>
🇮🇳 INDIA PUBLIC OPINION RESULTS
</div>

<div class="grid">

  <div class="card a">
    <div class="label">🟢 A - Support</div>
    <div class="num" id="a">0</div>
  </div>

  <div class="card b">
    <div class="label">🔴 B - Oppose</div>
    <div class="num" id="b">0</div>
  </div>

  <div class="card c">
    <div class="label">🔵 C - Mixed</div>
    <div class="num" id="c">0</div>
  </div>

</div>

<div class="footer">
🌍 GLOBAL VOTING NETWORK | LIVE REAL-TIME DATA
</div>

<script>
  // 🔥 Firebase Config (your project)
  const firebaseConfig = {
    apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
    authDomain: "onoevote2026.firebaseapp.com",
    databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "onoevote2026",
    storageBucket: "onoevote2026.firebasestorage.app",
    messagingSenderId: "181065724520",
    appId: "1:181065724520:web:f72a93869786373c1101dd"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function loadData(){

    db.ref("votes").on("value", snapshot => {

      let data = snapshot.val();

      let a=0,b=0,c=0;

      for(let key in data){
        if(data[key].vote=="A") a++;
        if(data[key].vote=="B") b++;
        if(data[key].vote=="C") c++;
      }

      document.getElementById("a").innerText = a;
      document.getElementById("b").innerText = b;
      document.getElementById("c").innerText = c;
    });
  }

  loadData();
</script>

</body>
</html>
