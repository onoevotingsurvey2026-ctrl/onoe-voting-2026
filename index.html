<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Vote Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  padding:20px;
  text-align:center;
  background:#1e293b;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.voteA{background:#22c55e;color:white;}
.voteB{background:#3b82f6;color:white;}
.voteC{background:#f59e0b;color:white;}

.admin{background:#ef4444;color:white;}

canvas{background:white;border-radius:10px;padding:10px;}
</style>
</head>

<body>

<header>
  <h2>🌍 Global Civic Voting Dashboard</h2>
</header>

<div class="container">

<!-- VOTING -->
<div class="card">
  <h3>🗳️ Vote Panel</h3>

  <input id="name" placeholder="Enter Name" style="padding:10px;width:90%;margin-bottom:10px;"><br>

  <button class="voteA" onclick="vote('A')">Vote A</button>
  <button class="voteB" onclick="vote('B')">Vote B</button>
  <button class="voteC" onclick="vote('C')">Vote C</button>

  <p id="status"></p>
</div>

<!-- PIE CHART -->
<div class="card">
  <h3>📊 Live Result (Pie)</h3>
  <canvas id="pie"></canvas>
</div>

<!-- BAR CHART -->
<div class="card">
  <h3>📊 District Stats</h3>
  <canvas id="bar"></canvas>
</div>

<!-- ADMIN -->
<div class="card">
  <h3>🔐 Admin Panel</h3>
  <button class="admin" onclick="downloadPDF()">Download PDF</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* DATA REFERENCES */
const voteRef = ref(db,"votes");
const userRef = ref(db,"users");

/* CHARTS */
let pieChart = new Chart(document.getElementById("pie"), {
  type:"pie",
  data:{
    labels:["A","B","C"],
    datasets:[{data:[0,0,0]}]
  }
});

let barChart = new Chart(document.getElementById("bar"), {
  type:"bar",
  data:{
    labels:["Chennai","Madurai","Coimbatore"],
    datasets:[{label:"Votes",[data:[0,0,0]]}]
  }
});

/* LIVE UPDATE */
onValue(voteRef,(snap)=>{
  let d = snap.val() || {A:0,B:0,C:0};

  pieChart.data.datasets[0].data = [d.A,d.B,d.C];
  pieChart.update();
});

/* VOTE FUNCTION */
window.vote = async (opt)=>{

  let name = document.getElementById("name").value;
  if(!name){
    alert("Enter Name");
    return;
  }

  const snap = await get(voteRef);
  let data = snap.val() || {A:0,B:0,C:0};

  data[opt] += 1;

  await set(voteRef,data);

  document.getElementById("status").innerText="Vote Submitted ✔";
};

/* ADMIN PDF */
window.downloadPDF = async ()=>{

  const snap = await get(voteRef);
  let d = snap.val();

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("GLOBAL VOTE REPORT",10,10);
  doc.text("A: "+d.A,10,30);
  doc.text("B: "+d.B,10,40);
  doc.text("C: "+d.C,10,50);

  doc.save("report.pdf");
};

</script>

</body>
</html>
