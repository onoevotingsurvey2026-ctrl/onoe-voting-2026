<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONOE Public Opinion Portal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      text-align: center;
    }

    .container {
      max-width: 650px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 26px;
      margin-top: 25px;
    }

    .subtitle {
      color: #555;
      font-size: 15px;
      margin-bottom: 10px;
    }

    .live {
      color: green;
      font-weight: bold;
      margin: 10px 0;
    }

    .btn {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .support {
      background: #2ecc71;
      color: white;
    }

    .against {
      background: #e74c3c;
      color: white;
    }

    iframe {
      width: 100%;
      height: 420px;
      border: none;
      margin-top: 20px;
    }

    .footer {
      font-size: 12px;
      color: gray;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🗳️ ONOE / Delimitation Public Opinion</h1>

  <div class="subtitle">
    Real-time transparent voting system
  </div>

  <div class="live">🔴 LIVE DASHBOARD ACTIVE</div>

  <!-- VOTE BUTTONS -->
  <button class="btn support"
    onclick="window.open('PASTE_YOUR_GOOGLE_FORM_LINK_HERE')">
    ✔️ Support
  </button>

  <button class="btn against"
    onclick="window.open('PASTE_YOUR_GOOGLE_FORM_LINK_HERE')">
    ❌ Against
  </button>

  <!-- LIVE RESULTS -->
  <iframe src="PASTE_YOUR_SHEET_EMBED_LINK_HERE"></iframe>

  <div class="footer">
    ⚡ Fast • Mobile Friendly • Real-time Updates
  </div>

</div>

</body>
</html>
