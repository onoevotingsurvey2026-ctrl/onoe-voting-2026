<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Indian Vote</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<!-- PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f4f4f4;
}

.card{
  background:white;
  padding:20px;
  margin:10px;
  border-radius:10px;
  display:inline-block;
}

button{
  padding:10px 20px;
  margin:5px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}

.support{background:green;color:white;}
.neutral{background:orange;}
.oppose{background:red;color:white;}
.download{background:#007bff;color:white;}
</style>

</head>

<body>

<h2>🗳️ Global Indian Vote</h2>

<div class="card">
<p id="userInfo">Not Logged In</p>
<button onclick="login()">Login Gmail</button>
</div>

<div class="card">
<h3>Vote</h3>
<button class="support" onclick="vote('support')">Support</button>
<button class="neutral" onclick="vote('neutral')">Neutral</button>
<button class="oppose" onclick="vote('oppose')">Oppose</button>
</div>

<div class="card">
<h3>📊 Results</h3>
<p>Support: <span id="s">0</span></p>
<p>Neutral: <span id="n">0</span></p>
<p>Oppose: <span id="o">0</span></p>
<p>Total: <span id="t">0</span></p>

<button class="download" onclick="downloadPDF()">📄 Download PDF Report</button>
</div>

<canvas id="chart" width="300"></canvas>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_DB_URL.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = null;

// 👤 LOGIN (simple)
function login(){
  let email = prompt("Enter Gmail ID");

  if(email && email.includes("@gmail.com")){
    currentUser = email;
    document.getElementById("userInfo").innerText =
    "Logged in: " + email;
  }else{
    alert("Invalid Gmail");
  }
}

// 🗳️ VOTE
function vote(type){

  if(!currentUser){
    alert("Login required");
    return;
  }

  db.ref("user_votes/" + currentUser).set({
    vote: type,
    timestamp: Date.now()
  });

}

// 📊 LIVE LISTENER
db.ref("user_votes").on("value", (snapshot)=>{

  let data = snapshot.val() || {};

  let support=0, neutral=0, oppose=0;

  Object.values(data).forEach(v=>{
    if(v.vote==="support") support++;
    if(v.vote==="neutral") neutral++;
    if(v.vote==="oppose") oppose++;
  });

  document.getElementById("s").innerText = support;
  document.getElementById("n").innerText = neutral;
  document.getElementById("o").innerText = oppose;
  document.getElementById("t").innerText = support+neutral+oppose;

  chart.data.datasets[0].data = [support,neutral,oppose];
  chart.update();

});

// 📊 CHART
const chart = new Chart(document.getElementById("chart"), {
type:'pie',
data:{
  labels:['Support','Neutral','Oppose'],
  datasets:[{
    data:[0,0,0],
    backgroundColor:['green','orange','red']
  }]
}
});

// 📄 PDF DOWNLOAD
function downloadPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let support = document.getElementById("s").innerText;
  let neutral = document.getElementById("n").innerText;
  let oppose = document.getElementById("o").innerText;
  let total = document.getElementById("t").innerText;

  doc.setFontSize(16);
  doc.text("Global Indian Vote Report", 20, 20);

  doc.setFontSize(12);
  doc.text("Support: " + support, 20, 40);
  doc.text("Neutral: " + neutral, 20, 50);
  doc.text("Oppose: " + oppose, 20, 60);
  doc.text("Total: " + total, 20, 70);

  doc.text("Generated: " + new Date().toLocaleString(), 20, 90);

  doc.save("vote-report.pdf");
}

</script>

</body>
</html>
