<!DOCTYPE html>
<html>
<head>
  <title>Firestore Election System PRO</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#f4f6f8;
      margin:0;
    }

    header{
      background:#0f172a;
      color:white;
      padding:15px;
    }

    #dashboard{ display:none; }

    .card{
      background:white;
      margin:10px;
      padding:15px;
      border-radius:10px;
      display:inline-block;
      min-width:240px;
    }

    button{
      padding:10px 15px;
      margin:5px;
      cursor:pointer;
    }

    #adminPanel{
      display:none;
      background:#fff3cd;
      padding:10px;
      margin:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<header>
  🌍 Firestore Election System
</header>

<!-- LOGIN -->
<div id="loginSection">
  <h2>Login to Continue</h2>
  <button onclick="login()">Login with Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <h2>📊 Live Results</h2>

  <div class="card">
    <h3>India</h3>

    <p>ONOE Support: <span id="os">0</span></p>
    <p>ONOE Against: <span id="oa">0</span></p>
    <p>DEL Support: <span id="ds">0</span></p>
    <p>DEL Against: <span id="da">0</span></p>

    <button onclick="vote('india','onoeSupport')">ONOE +</button>
    <button onclick="vote('india','onoeAgainst')">ONOE -</button>
    <button onclick="vote('india','delSupport')">DEL +</button>
    <button onclick="vote('india','delAgainst')">DEL -</button>
  </div>

  <div id="adminPanel">
    <h3>🧑‍💼 Admin Panel</h3>
    <button onclick="resetAll()">Reset Votes</button>
  </div>

</div>

<script>

/////////////////////////////////////////////////////
// 🔥 FIREBASE CONFIG (YOUR FIRESTORE PROJECT)
/////////////////////////////////////////////////////

const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/////////////////////////////////////////////////////
// 🔐 LOGIN
/////////////////////////////////////////////////////

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

auth.getRedirectResult().catch(()=>{});

/////////////////////////////////////////////////////
// 🔄 AUTH
/////////////////////////////////////////////////////

auth.onAuthStateChanged(user=>{

  if(user){
    document.getElementById("loginSection").style.display="none";
    document.getElementById("dashboard").style.display="block";

    loadResults();

    if(user.email === "onoe.voting.survey2026@gmail.com"){
      document.getElementById("adminPanel").style.display="block";
    }

  }else{
    document.getElementById("loginSection").style.display="block";
    document.getElementById("dashboard").style.display="none";
  }

});

/////////////////////////////////////////////////////
// 🗳️ VOTE SYSTEM (FIRESTORE)
/////////////////////////////////////////////////////

function vote(country, choice){

  const user = auth.currentUser;

  if(!user){
    alert("Login required");
    return;
  }

  const ref = db.collection("userVotes").doc(user.uid);

  ref.get().then(doc=>{

    if(doc.exists && doc.data()[country]){
      alert("❌ Already voted!");
      return;
    }

    ref.set({
      [country]: choice
    }, { merge: true });

  });

}

/////////////////////////////////////////////////////
// 📊 LIVE RESULTS (AUTO CALCULATION)
/////////////////////////////////////////////////////

function loadResults(){

  db.collection("userVotes").onSnapshot(snapshot=>{

    let os=0, oa=0, ds=0, da=0;

    snapshot.forEach(doc=>{

      let d = doc.data();

      if(d.india === "onoeSupport") os++;
      if(d.india === "onoeAgainst") oa++;
      if(d.india === "delSupport") ds++;
      if(d.india === "delAgainst") da++;

    });

    document.getElementById("os").innerText = os;
    document.getElementById("oa").innerText = oa;
    document.getElementById("ds").innerText = ds;
    document.getElementById("da").innerText = da;

  });

}

/////////////////////////////////////////////////////
// 🧑‍💼 ADMIN RESET
/////////////////////////////////////////////////////

function resetAll(){

  const user = auth.currentUser;

  if(user.email !== "onoe.voting.survey2026@gmail.com"){
    alert("Not allowed");
    return;
  }

  db.collection("userVotes").get().then(snap=>{
    snap.forEach(doc=>{
      doc.ref.delete();
    });
  });

  alert("System reset complete!");
}

</script>

</body>
</html>
