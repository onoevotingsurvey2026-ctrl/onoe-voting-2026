<!DOCTYPE html>
<html>
<head>
  <title>ONOE LIVE Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#020617; color:white; text-align:center; }

    header { padding:15px; font-size:22px; border-bottom:2px solid red; }

    .live { color:red; }

    .top { display:flex; justify-content:space-between; padding:10px 20px; background:#0f172a; }

    button { padding:10px; border:none; border-radius:6px; cursor:pointer; }

    .voteBtn { width:250px; margin:10px; font-size:16px; }

    .onoe{background:#2563eb;}
    .delim{background:#16a34a;}
    .comb{background:#7c3aed;}

    .chartbox { width:90%; margin:auto; margin-top:20px; }

    .ticker {
      background:red;
      padding:8px;
      position:fixed;
      bottom:0;
      width:100%;
      font-weight:bold;
    }

    #admin input { margin:5px; padding:5px; }

  </style>
</head>

<body>

<header>
🏛️ ONOE & Delimitation Public Opinion  
<br><span class="live">🔴 LIVE / நேரலை</span>
</header>

<div class="top">
  <div id="user">👤 Guest</div>
  <div>
    <button onclick="login()">Login</button>
    <button onclick="document.body.requestFullscreen()">📺 TV Mode</button>
  </div>
</div>

<div id="loginBox">
  <h3>Login to Vote</h3>
</div>

<div id="dashboard" style="display:none">

  <button class="voteBtn onoe" onclick="vote('onoe')">ONOE</button>
  <button class="voteBtn delim" onclick="vote('delimitation')">Delimitation</button>
  <button class="voteBtn comb" onclick="vote('combined')">Combined</button>

  <p id="status"></p>
  <p id="time"></p>

  <div class="chartbox"><canvas id="bar"></canvas></div>
  <div class="chartbox"><canvas id="pie"></canvas></div>

  <!-- MAP -->
  <h3>🌍 India View</h3>
  <div style="background:#111827;padding:20px;border-radius:10px;">
    🇮🇳 Map (Upgrade Ready)
  </div>

  <!-- ADMIN -->
  <h3>🔐 Admin Panel</h3>
  <div id="admin" style="display:none">
    <input id="onoeVal" placeholder="ONOE">
    <input id="delimVal" placeholder="Delim">
    <input id="combVal" placeholder="Combined">
    <button onclick="adminUpdate()">Update</button>
  </div>

</div>

<div class="ticker" id="ticker">📊 Live updating...</div>

<script>

const firebaseConfig = {
  apiKey:"YOUR_API_KEY",
  authDomain:"YOUR_PROJECT.firebaseapp.com",
  projectId:"YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let user=null;
let voted=false;

const ADMIN_EMAIL = "yourgmail@gmail.com";

auth.onAuthStateChanged(u=>{
  if(u){
    user=u;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("dashboard").style.display="block";
    document.getElementById("user").innerText=u.email;

    if(u.email===ADMIN_EMAIL){
      document.getElementById("admin").style.display="block";
    }
  }
});

function login(){
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

function vote(type){
  if(voted) return;

  const ref=db.collection("votes").doc("india");

  db.runTransaction(async t=>{
    const doc=await t.get(ref);
    let d=doc.data()||{onoe:0,delimitation:0,combined:0};
    d[type]=(d[type]||0)+1;
    t.set(ref,d);
  });

  voted=true;
  document.getElementById("status").innerText="✔ Vote Recorded";
}

function adminUpdate(){
  let o=Number(document.getElementById("onoeVal").value||0);
  let d=Number(document.getElementById("delimVal").value||0);
  let c=Number(document.getElementById("combVal").value||0);

  db.collection("votes").doc("india").set({
    onoe:o,
    delimitation:d,
    combined:c
  });
}

let bar,pie;

db.collection("votes").doc("india")
.onSnapshot(doc=>{

  let d=doc.data()||{onoe:0,delimitation:0,combined:0};

  let vals=[d.onoe,d.delimitation,d.combined];
  let labels=["ONOE","Delim","Combined"];

  if(bar) bar.destroy();
  bar=new Chart(document.getElementById("bar"),{
    type:"bar",
    data:{labels,datasets:[{data:vals}]}
  });

  if(pie) pie.destroy();
  pie=new Chart(document.getElementById("pie"),{
    type:"pie",
    data:{labels,datasets:[{data:vals}]}
  });

  document.getElementById("time").innerText=
  new Date().toLocaleTimeString();

  document.getElementById("ticker").innerText=
  "🔴 LIVE → ONOE:"+d.onoe+" | DELIM:"+d.delimitation+" | COMB:"+d.combined;

});

</script>

</body>
</html>
