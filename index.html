<!DOCTYPE html>
<html>
<head>
  <title>Voting Login System</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 60px;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 20px;
      display: inline-block;
      border-radius: 10px;
      box-shadow: 0px 0px 10px #ccc;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 220px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      color: green;
    }
  </style>
</head>

<body>

  <h2>🔥 ONOE Voting Login System</h2>

  <div class="box">
    <input type="email" id="email" placeholder="Enter Email"><br>
    <input type="password" id="password" placeholder="Enter Password"><br>

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button><br><br>

    <button onclick="googleLogin()">Login with Google</button>

    <p id="msg"></p>
  </div>

<script>
  // 🔥 FINAL FIREBASE CONFIG (CORRECT ONE)
  const firebaseConfig = {
    apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
    authDomain: "onoevote2026.firebaseapp.com",
    databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "onoevote2026",
    storageBucket: "onoevote2026.firebasestorage.app",
    messagingSenderId: "181065724520",
    appId: "1:181065724520:web:f72a93869786373c1101dd"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  // Signup
  function signup() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Signup Success ✔";
    })
    .catch(err => {
      document.getElementById("msg").innerText = err.message;
    });
  }

  // Login
  function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Login Success ✔";
    })
    .catch(err => {
      document.getElementById("msg").innerText = err.message;
    });
  }

  // Google Login
  function googleLogin() {
    let provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
    .then(() => {
      document.getElementById("msg").innerText = "Google Login Success ✔";
    })
    .catch(err => {
      document.getElementById("msg").innerText = err.message;
    });
  }

  console.log("Firebase Connected ✔");
</script>

</body>
</html>
