<!DOCTYPE html>
<html>
<head>
  <title>ONOE Voting Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 50px;
    }
    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    button {
      padding: 10px 15px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .login { background: #22c55e; color: white; }
    .support { background: #10b981; color: white; }
    .against { background: #f43f5e; color: white; }
  </style>
</head>

<body>

<div class="box">
  <h2>🗳️ ONOE Voting</h2>

  <button class="login" onclick="login()">Google Login</button>

  <br><br>

  <button class="support" onclick="vote('support')">Support</button>
  <button class="against" onclick="vote('against')">Against</button>

  <h3>Live Results</h3>
  <p>Support: <span id="supportCount">0</span></p>
  <p>Against: <span id="againstCount">0</span></p>
</div>

<script>
  // 🔥 உங்கள் Firebase config இங்கு paste பண்ணவும்
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();
  const provider = new firebase.auth.GoogleAuthProvider();

  // ✅ Google Login
  function login() {
    auth.signInWithRedirect(provider);
  }

  // ✅ Auth check
  auth.onAuthStateChanged((user) => {
    if (user) {
      console.log("Logged in:", user.email);
    }
  });

  // ✅ Vote Function (One person = One vote)
  function vote(option) {
    const user = auth.currentUser;

    if (!user) {
      alert("Please login first");
      return;
    }

    const userId = user.uid;
    const voteRef = db.collection("votes").doc(userId);

    voteRef.get().then((doc) => {
      if (doc.exists) {
        alert("You already voted!");
      } else {
        voteRef.set({
          vote: option
        });
        alert("Vote submitted!");
      }
    });
  }

  // ✅ Live Count (Realtime)
  db.collection("votes").onSnapshot((snapshot) => {
    let support = 0;
    let against = 0;

    snapshot.forEach((doc) => {
      const data = doc.data();

      if (data.vote === "support") support++;
      if (data.vote === "against") against++;
    });

    document.getElementById("supportCount").innerText = support;
    document.getElementById("againstCount").innerText = against;
  });
</script>

</body>
</html>
