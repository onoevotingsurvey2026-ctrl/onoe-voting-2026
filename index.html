<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voting Site</title>
</head>

<body>

  <h1>🗳️ Voting System</h1>

  <p id="user"></p>

  <button onclick="vote('support')">Support</button>
  <button onclick="vote('against')">Against</button>

  <p id="result">No votes yet</p>

  <script>
    let support = 0;
    let against = 0;

    function vote(type) {
      if (type === "support") support++;
      if (type === "against") against++;

      document.getElementById("result").innerText =
        "Support: " + support + " | Against: " + against;
    }

    // USER NAME
    document.getElementById("user").innerText = "User: N RAMAN";
  </script>

</body>
</html>
