<!DOCTYPE html>
<html>
<head>
  <title>TV Broadcast Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:black;
      color:white;
      overflow:hidden;
    }

    /* TOP NEWS BAR */
    .topbar{
      background:#b30000;
      padding:10px;
      font-weight:bold;
      text-align:center;
      font-size:18px;
    }

    /* HEADER */
    .header{
      text-align:center;
      padding:10px;
      background:#111;
    }

    .title{
      font-size:22px;
      font-weight:bold;
    }

    .subtitle{
      font-size:14px;
      color:#aaa;
    }

    /* GRID */
    .grid{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-top:30px;
      flex-wrap:wrap;
    }

    .card{
      background:#1c1c1c;
      padding:25px;
      border-radius:12px;
      width:220px;
      text-align:center;
      box-shadow:0 0 10px rgba(255,255,255,0.1);
    }

    .label{
      font-size:14px;
      color:#ccc;
    }

    .num{
      font-size:55px;
      font-weight:bold;
      margin-top:10px;
    }

    .green{color:#00ff7f;}
    .red{color:#ff4d4d;}

    /* FOOTER TICKER */
    .footer{
      position:fixed;
      bottom:0;
      width:100%;
      background:#111;
      padding:10px;
      font-size:14px;
      color:#aaa;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="topbar">
  📡 LIVE ELECTION BROADCAST | ONOE + DEL RESULTS
</div>

<div class="header">
  <div class="title">🇮🇳 INDIA PUBLIC OPINION DASHBOARD</div>
  <div class="subtitle">
    ONOE (One Nation One Election) | DEL (Delimitation)
  </div>
</div>

<div class="grid">

  <div class="card">
    <div class="label">🟢 ONOE SUPPORT</div>
    <div class="num green" id="os">0</div>
  </div>

  <div class="card">
    <div class="label">🔴 ONOE AGAINST</div>
    <div class="num red" id="oa">0</div>
  </div>

  <div class="card">
    <div class="label">🟢 DEL SUPPORT</div>
    <div class="num green" id="ds">0</div>
  </div>

  <div class="card">
    <div class="label">🔴 DEL AGAINST</div>
    <div class="num red" id="da">0</div>
  </div>

</div>

<div class="footer">
  LIVE DATA | GLOBAL VOTING NETWORK | REAL TIME UPDATE
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LIVE DATA */
db.ref("stats").on("value", snap => {

  let d = snap.val() || {};

  document.getElementById("os").innerText = d.ONOE?.support || 0;
  document.getElementById("oa").innerText = d.ONOE?.against || 0;
  document.getElementById("ds").innerText = d.DEL?.support || 0;
  document.getElementById("da").innerText = d.DEL?.against || 0;

});
</script>

</body>
</html>
