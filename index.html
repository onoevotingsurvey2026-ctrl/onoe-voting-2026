<!DOCTYPE html>
<html>
<head>
  <title>DEBUG VOTING SYSTEM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      font-family:Arial;
      background:#111;
      color:#0f0;
      padding:10px;
    }

    .box{
      border:1px solid #0f0;
      padding:10px;
      margin:10px;
    }

    button{
      padding:10px;
      margin:5px;
      cursor:pointer;
    }

    #console{
      background:black;
      color:lime;
      padding:10px;
      height:200px;
      overflow:auto;
      font-size:12px;
    }
  </style>
</head>

<body>

<h2>🔥 DEBUG SYSTEM</h2>

<div class="box">
  <button onclick="login()">LOGIN</button>
  <button onclick="logout()">LOGOUT</button>

  <p id="status">STATUS: INIT</p>
</div>

<div class="box">
  <h3>DASHBOARD</h3>
  <div id="dashboard">WAITING...</div>
</div>

<div class="box">
  <h3>DEBUG CONSOLE</h3>
  <div id="console"></div>
</div>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

/* 🧠 DEBUG LOG FUNCTION */
function log(msg){
  console.log(msg);
  document.getElementById("console").innerHTML += msg + "<br>";
}

/* 🔐 LOGIN */
function login(){
  log("STEP 1: LOGIN CLICKED");

  auth.signInWithPopup(provider)
  .then(res=>{
    log("STEP 2: LOGIN SUCCESS " + res.user.email);
  })
  .catch(err=>{
    log("ERROR: " + err.message);

    auth.signInWithRedirect(provider);
  });
}

/* 🚪 LOGOUT */
function logout(){
  auth.signOut();
  log("LOGOUT DONE");
}

/* 🔁 REDIRECT RESULT */
auth.getRedirectResult()
.then(result=>{
  if(result.user){
    log("REDIRECT LOGIN SUCCESS: " + result.user.email);
  }
})
.catch(err=>{
  log("REDIRECT ERROR: " + err.message);
});

/* 👤 AUTH TRACKER */
auth.onAuthStateChanged(user => {

  log("AUTH STATE TRIGGERED");

  if(user){
    log("USER FOUND: " + user.email);

    document.getElementById("status").innerText =
      "LOGGED IN: " + user.email;

    loadDashboard();

  } else {
    log("NO USER FOUND");

    document.getElementById("status").innerText =
      "NOT LOGGED IN";
  }

});

/* 📊 DASHBOARD */
function loadDashboard(){

  log("LOADING DASHBOARD...");

  db.collection("votes").onSnapshot(snapshot => {

    let s=0,a=0;

    snapshot.forEach(doc=>{
      let v = doc.data().vote;
      if(v==="support") s++;
      if(v==="against") a++;
    });

    document.getElementById("dashboard").innerHTML =
      "SUPPORT: "+s+" | AGAINST: "+a;

    log("LIVE UPDATE: S="+s+" A="+a);

  });

}

</script>

</body>
</html>
