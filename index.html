<!DOCTYPE html>
<html>
<head>
  <title>GLOBAL VOTING SYSTEM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      font-family:Arial;
      background:#0b1220;
      color:white;
      text-align:center;
    }

    .box{
      margin:15px;
      padding:20px;
      background:#ffffff10;
      border-radius:10px;
    }

    button{
      padding:12px;
      margin:6px;
      border:none;
      border-radius:6px;
    }

    .login{background:#2196F3;color:white;}
    .logout{background:#444;color:white;}
  </style>
</head>

<body>

<h2>🌍 GLOBAL VOTING SYSTEM</h2>

<div class="box">
  <button class="login" onclick="login()">🔐 Login with Google</button>
  <button class="logout" onclick="logout()">Logout</button>

  <p id="status">NOT LOGGED IN</p>
</div>

<div class="box">
  <h3>🗳 LIVE RESULTS</h3>
  <div id="result">Loading...</div>
</div>

<script>

/* 🔥 FIREBASE CONFIG (CHECK THIS FIRST) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

/* DEBUG */
console.log("Firebase loaded");

/* LOGIN - SAFE METHOD */
function login(){
  auth.signInWithPopup(provider)
  .then(result => {
    console.log("LOGIN SUCCESS:", result.user.email);
  })
  .catch(error => {
    console.log("LOGIN ERROR:", error);
    alert("Login failed. Check Firebase settings.");
  });
}

/* LOGOUT */
function logout(){
  auth.signOut();
}

/* AUTH STATE */
auth.onAuthStateChanged(user => {

  console.log("AUTH STATE:", user);

  if(user){
    document.getElementById("status").innerText =
      "LOGGED IN: " + user.email;
  } else {
    document.getElementById("status").innerText =
      "NOT LOGGED IN";
  }

});

/* LIVE RESULTS SAFE */
function loadLive(){

  db.collection("votes").onSnapshot(snapshot => {

    let support = 0;
    let against = 0;

    snapshot.forEach(doc => {
      let v = doc.data().vote;
      if(v === "support") support++;
      if(v === "against") against++;
    });

    document.getElementById("result").innerHTML =
      "👍 SUPPORT: " + support +
      "<br>👎 AGAINST: " + against;

  }, error => {
    console.log("DB ERROR:", error);
  });

}

loadLive();

</script>

</body>
</html>
