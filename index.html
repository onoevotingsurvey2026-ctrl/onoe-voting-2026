<!DOCTYPE html>
<html>
<head>
  <title>Global Voting Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0f1a;
      color:white;
      text-align:center;
    }

    .header{
      padding:15px;
      background:#111a33;
    }

    .admin button{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .open{background:green;color:white;}
    .close{background:red;color:white;}
    .reset{background:orange;color:black;}

    .cards{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .card{
      background:#1e1e1e;
      padding:25px;
      border-radius:14px;
      min-width:180px;
    }

    .green{color:#00ff7f;}
    .red{color:#ff4d4d;}
    .blue{color:#4da6ff;}

    .num{
      font-size:42px;
      font-weight:bold;
      margin:10px 0;
    }

    .percent{
      color:#aaa;
      font-size:16px;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>📡 GLOBAL VOTING NETWORK</h2>
  <h3>🇮🇳 INDIA PUBLIC OPINION DASHBOARD</h3>
</div>

<!-- ADMIN -->
<div class="admin">
  <h3>👨‍💼 ADMIN CONTROL</h3>

  <button class="open" onclick="setStatus('OPEN')">🟢 OPEN VOTING</button>
  <button class="close" onclick="setStatus('CLOSED')">🔴 CLOSE VOTING</button>
  <button class="reset" onclick="resetVotes()">♻️ RESET</button>
</div>

<hr>

<!-- LIVE RESULTS -->
<h3>📊 LIVE RESULTS</h3>

<div class="cards">

  <div class="card green">
    🟢 A SUPPORT
    <div class="num" id="aCount">0</div>
    <div class="percent" id="aPercent">0.0%</div>
  </div>

  <div class="card red">
    🔴 B OPPOSE
    <div class="num" id="bCount">0</div>
    <div class="percent" id="bPercent">0.0%</div>
  </div>

  <div class="card blue">
    🔵 C MIXED
    <div class="num" id="cCount">0</div>
    <div class="percent" id="cPercent">0.0%</div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ADMIN
function setStatus(state){
  db.ref("system/status").set(state);
}

function resetVotes(){
  db.ref("votes").remove();
}

// LIVE DATA
db.ref("votes").on("value", snap=>{

  let data = snap.val() || {};

  let a=0,b=0,c=0;

  Object.values(data).forEach(v=>{
    if(v.vote==="A") a++;
    if(v.vote==="B") b++;
    if(v.vote==="C") c++;
  });

  let total = a+b+c || 1;

  document.getElementById("aCount").innerText = a;
  document.getElementById("bCount").innerText = b;
  document.getElementById("cCount").innerText = c;

  document.getElementById("aPercent").innerText = ((a/total)*100).toFixed(1)+"%";
  document.getElementById("bPercent").innerText = ((b/total)*100).toFixed(1)+"%";
  document.getElementById("cPercent").innerText = ((c/total)*100).toFixed(1)+"%";

});
</script>

</body>
</html>
