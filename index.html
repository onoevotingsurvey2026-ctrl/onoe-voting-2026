<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ONOE Voting System</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    h1 {
      background: #111827;
      color: white;
      padding: 15px;
      margin: 0;
    }

    .box {
      background: white;
      width: 320px;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    button {
      padding: 10px 15px;
      margin: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .login {
      background: green;
      color: white;
    }

    .vote {
      background: blue;
      color: white;
    }

    #voteBox {
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>

<body>

<h1>🗳 ONOE Voting System</h1>

<!-- LOGIN -->
<div class="box">
  <h3>Login</h3>

  <!-- ✅ REAL LOGIN BUTTON -->
  <button class="login" onclick="loginWithGoogle()">
    Login with Google
  </button>

  <p id="status">Please login to vote</p>
</div>

<!-- VOTING -->
<div class="box" id="voteBox">
  <h3>Vote Your Candidate</h3>

  <button class="vote" onclick="vote('Candidate_A')">Candidate A</button>
  <button class="vote" onclick="vote('Candidate_B')">Candidate B</button>
  <button class="vote" onclick="vote('Candidate_C')">Candidate C</button>
</div>

<!-- LIVE RESULTS -->
<div class="box">
  <h3>📊 LIVE RESULTS</h3>

  <p>Candidate A: <span id="aCount">0</span></p>
  <p>Candidate B: <span id="bCount">0</span></p>
  <p>Candidate C: <span id="cCount">0</span></p>
</div>

<!-- 🔥 FIREBASE SCRIPT -->
<script type="module" src="script.js"></script>

</body>
</html>
