<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ONOE Voting System</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px gray;
    }

    button {
      padding: 10px 15px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }

    .login {
      background: green;
      color: white;
    }

    .vote {
      background: blue;
      color: white;
    }
  </style>
</head>

<body>

  <h1>🗳 ONOE Voting System</h1>

  <!-- LOGIN BOX -->
  <div class="box">
    <h3>Login</h3>
    <button class="login" onclick="loginWithGoogle()">
      Login with Google
    </button>
  </div>

  <!-- VOTING BOX -->
  <div class="box">
    <h3>Vote Your Candidate</h3>

    <button class="vote" onclick="vote('Candidate_A')">
      Candidate A
    </button>

    <button class="vote" onclick="vote('Candidate_B')">
      Candidate B
    </button>

    <button class="vote" onclick="vote('Candidate_C')">
      Candidate C
    </button>
  </div>

  <!-- STATUS -->
  <div class="box">
    <p id="status">Please login to vote</p>
  </div>

  <!-- FIREBASE SCRIPT -->
  <script type="module" src="script.js"></script>

</body>
</html>
