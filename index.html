<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Vote Platform</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef2f7;
}

/* LOGIN CARD */
.container{
    width:100%;
    max-width:420px;
    margin:50px auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{text-align:center;margin-bottom:20px}

input,select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{background:#0056b3}

.small{
    font-size:13px;
    color:#444;
}

/* OTP BOX */
#otpBox{display:none}

/* DASHBOARD */
#dashboard{
    display:none;
    padding:20px;
}

.header{
    background:#007bff;
    color:white;
    padding:15px;
    text-align:center;
    border-radius:10px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    text-align:center;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div class="container" id="loginBox">

<h2>Mobile OTP Login</h2>

<select id="country">
    <option value="+91">🇮🇳 India +91</option>
</select>

<input type="text" id="mobile" placeholder="Enter Mobile Number">

<div class="small" id="captchaText"></div>
<input type="text" id="captchaInput" placeholder="Enter Captcha">

<button onclick="sendOTP()">Send OTP</button>

<div id="otpBox">
    <input type="text" id="otp" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Verify OTP</button>
</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="header">
    🗳️ Global Vote Dashboard
</div>

<div class="cards">
    <div class="card">
        <h3>Total Votes</h3>
        <p>1,245</p>
    </div>

    <div class="card">
        <h3>Live Users</h3>
        <p>320</p>
    </div>

    <div class="card">
        <h3>India Votes</h3>
        <p>980</p>
    </div>

    <div class="card">
        <h3>Global Votes</h3>
        <p>265</p>
    </div>
</div>

</div>

<script>

let otpCode;
let captchaAns;

/* CAPTCHA */
function generateCaptcha(){
    let a = Math.floor(Math.random()*10);
    let b = Math.floor(Math.random()*10);
    captchaAns = a + b;
    document.getElementById("captchaText").innerText =
    "Captcha: " + a + " + " + b + " = ?";
}
generateCaptcha();

/* SEND OTP (DEMO) */
function sendOTP(){

    let mobile = document.getElementById("mobile").value;
    let cap = document.getElementById("captchaInput").value;

    if(cap != captchaAns){
        alert("Captcha Wrong!");
        generateCaptcha();
        return;
    }

    if(mobile.length < 8){
        alert("Enter valid mobile number");
        return;
    }

    otpCode = Math.floor(1000 + Math.random()*9000);

    alert("OTP Sent (Demo): " + otpCode);

    document.getElementById("otpBox").style.display = "block";
}

/* VERIFY OTP */
function verifyOTP(){

    let otp = document.getElementById("otp").value;

    if(otp == otpCode){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    }else{
        alert("Invalid OTP");
    }
}

</script>

</body>
</html>
