<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ONOE Voting System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background: #1e88e5;
      color: white;
      padding: 20px;
    }

    h1 {
      margin: 0;
    }

    .container {
      margin-top: 40px;
    }

    .btn {
      padding: 15px 30px;
      margin: 10px;
      font-size: 18px;
      border: none;
      cursor: pointer;
      border-radius: 8px;
    }

    .support {
      background: green;
      color: white;
    }

    .against {
      background: red;
      color: white;
    }

    .count {
      font-size: 22px;
      margin-top: 20px;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      background: #ddd;
    }
  </style>
</head>

<body>

<header>
  <h1>ONOE / DELIMITATION Voting System</h1>
  <p>Public Opinion Real-time Transparency Dashboard</p>
</header>

<div class="container">

  <h2>Cast Your Vote</h2>

  <button class="btn support" onclick="supportVote()">Support 👍</button>
  <button class="btn against" onclick="againstVote()">Against 👎</button>

  <div class="count">
    <p>Support Votes: <span id="supportCount">0</span></p>
    <p>Against Votes: <span id="againstCount">0</span></p>
  </div>

</div>

<footer>
  © 2026 ONOE Voting System | Live Dashboard
</footer>

<script>
  let support = 0;
  let against = 0;

  function supportVote() {
    support++;
    document.getElementById("supportCount").innerText = support;
  }

  function againstVote() {
    against++;
    document.getElementById("againstCount").innerText = against;
  }
</script>

</body>
</html>
