<!DOCTYPE html>
<html>
<head>
  <title>ECI India Public Opinion Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#0b1220;
      color:white;
    }

    header{
      padding:15px;
      text-align:center;
      background:#111827;
      border-bottom:2px solid red;
    }

    .live{
      color:red;
      font-weight:bold;
    }

    .top{
      display:flex;
      justify-content:space-between;
      padding:10px;
      background:#1f2937;
      flex-wrap:wrap;
    }

    button{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .onoe{background:#2563eb;color:white;}
    .delim{background:#16a34a;color:white;}
    .comb{background:#7c3aed;color:white;}

    #dashboard{display:none;text-align:center;}

    .chart-box{
      width:80%;
      margin:auto;
      background:#111827;
      padding:10px;
      border-radius:10px;
      margin-top:15px;
    }

    #loginBox{
      text-align:center;
      margin-top:50px;
    }

    /* MOBILE */
    @media(max-width:768px){
      .chart-box{width:95%;}
      .top{flex-direction:column;text-align:center;}
    }

  </style>
</head>

<body>

<header>

  🏛️ இந்திய மக்கள் கருத்து கேட்பு – Indian Citizen Public Opinion & Election Analytics  

  <br>

  <span class="live">🔴 LIVE / நேரலை</span>

</header>

<div class="top">

  <div id="user">👤 Guest / விருந்தினர்</div>

  <div>
    <button onclick="login()">🔑 Google Login</button>
    <button onclick="document.body.requestFullscreen()">📺 TV Mode</button>
  </div>

</div>

<div id="loginBox">
  <h3>Login to Vote / வாக்களிக்க உள்நுழையவும்</h3>
</div>

<div id="dashboard">

  <h3>🗳️ Vote Options</h3>

  <button class="onoe" onclick="vote('onoe')">ONOE</button>
  <button class="delim" onclick="vote('delimitation')">Delimitation</button>
  <button class="comb" onclick="vote('combined')">Combined</button>

  <p id="status"></p>

  <div class="chart-box">
    <canvas id="bar"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="pie"></canvas>
  </div>

</div>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let user = null;

/* ================= LOGIN ================= */

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
  .catch(e => alert(e.message));
}

/* ================= AUTH FLOW ================= */

auth.onAuthStateChanged(u => {

  if(u){

    user = u;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    document.getElementById("user").innerText =
      "👤 " + u.email;

    loadData();

  }

});

/* ================= VOTE ================= */

function vote(type){

  let ref = db.collection("votes").doc("india");

  db.runTransaction(async t => {

    let doc = await t.get(ref);
    let d = doc.data() || {onoe:0, delimitation:0, combined:0};

    d[type]++;

    t.set(ref,d);

  });

  document.getElementById("status").innerText =
    "✔ Vote Recorded / வாக்கு பதிவு செய்யப்பட்டது";

}

/* ================= CHARTS ================= */

let bar,pie;

function loadData(){

  db.collection("votes").doc("india")
  .onSnapshot(doc=>{

    let d = doc.data() || {onoe:0, delimitation:0, combined:0};

    let values = [d.onoe,d.delimitation,d.combined];

    if(bar) bar.destroy();
    if(pie) pie.destroy();

    bar = new Chart(document.getElementById("bar"),{
      type:"bar",
      data:{
        labels:["ONOE","Delimitation","Combined"],
        datasets:[{data:values}]
      }
    });

    pie = new Chart(document.getElementById("pie"),{
      type:"pie",
      data:{
        labels:["ONOE","Delimitation","Combined"],
        datasets:[{data:values}]
      }
    });

  });

}

</script>

</body>
</html>
