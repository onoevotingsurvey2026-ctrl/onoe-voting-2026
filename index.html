<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Glass Voting Network Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
/* 🌈 Background */
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a8a, #0f172a);
  color: white;
}

/* 🧊 Glass Container */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* 🧊 Glass Card */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 15px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

/* Numbers */
.card h2 {
  margin: 5px 0;
  font-size: 22px;
}

.card p {
  font-size: 28px;
  font-weight: bold;
  color: #00ffcc;
}

/* 🟢 Support Buttons */
.support-btn {
  padding: 12px 18px;
  margin: 8px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  background: rgba(255,255,255,0.2);
  color: white;
  transition: 0.2s;
}

/* 👇 PRESS DOWN EFFECT */
.support-btn:active {
  transform: translateY(5px);
  background: rgba(0,255,204,0.3);
}

/* Layout */
.btn-group {
  text-align: center;
  margin-top: 15px;
}

/* 📱 Mobile */
@media(max-width:768px){
  .card p { font-size: 22px; }
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>🗳️ ONOE Support</h2>
    <p id="onoeSupport">0</p>
  </div>

  <div class="card">
    <h2>🗳️ ONOE Against</h2>
    <p id="onoeAgainst">0</p>
  </div>

  <div class="card">
    <h2>🗳️ Delimitation Support</h2>
    <p id="delSupport">0</p>
  </div>

  <div class="card">
    <h2>🗳️ Delimitation Against</h2>
    <p id="delAgainst">0</p>
  </div>

  <!-- Buttons -->
  <div class="btn-group">

    <button class="support-btn" onclick="vote('onoeSupport', this)">
      👇 ONOE Support
    </button>

    <button class="support-btn" onclick="vote('onoeAgainst', this)">
      👇 ONOE Against
    </button>

    <button class="support-btn" onclick="vote('delSupport', this)">
      👇 Del Support
    </button>

    <button class="support-btn" onclick="vote('delAgainst', this)">
      👇 Del Against
    </button>

    <br><br>

    <button class="support-btn" onclick="resetVotes()">
      🔄 Reset Votes
    </button>

  </div>

</div>

<script>

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🌍 GLOBAL DOC
const ref = db.collection("votes").doc("global");

// 🔴 LIVE SYNC
ref.onSnapshot((doc) => {
  if (doc.exists) {
    let d = doc.data();

    document.getElementById("onoeSupport").innerText = d.onoeSupport || 0;
    document.getElementById("onoeAgainst").innerText = d.onoeAgainst || 0;
    document.getElementById("delSupport").innerText = d.delSupport || 0;
    document.getElementById("delAgainst").innerText = d.delAgainst || 0;
  }
});

// 🟢 VOTE FUNCTION
function vote(field, btn) {
  ref.update({
    [field]: firebase.firestore.FieldValue.increment(1)
  }).catch(() => {
    ref.set({
      onoeSupport: 0,
      onoeAgainst: 0,
      delSupport: 0,
      delAgainst: 0
    }).then(() => vote(field, btn));
  });

  // UI feedback
  btn.innerHTML = "👇 Voted";
  btn.disabled = true;
}

// 🔵 RESET
function resetVotes() {
  ref.set({
    onoeSupport: 0,
    onoeAgainst: 0,
    delSupport: 0,
    delAgainst: 0
  });
}

</script>

</body>
</html>
