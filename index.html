<!DOCTYPE html>
<html>
<head>
  <title>Public Voting System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      font-family:Arial;
      text-align:center;
      margin:0;
      background:#f4f4f4;
    }

    .box{
      background:white;
      padding:20px;
      margin:10px;
      border-radius:10px;
      box-shadow:0 0 10px #ccc;
    }

    button{
      padding:15px;
      margin:10px;
      width:80%;
      font-size:18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .support{background:green;color:white;}
    .against{background:red;color:white;}

    h1{
      background:#111;
      color:white;
      padding:15px;
      margin:0;
    }
  </style>
</head>

<body>

<h1>🗳 PUBLIC VOTING SYSTEM (ECI STYLE)</h1>

<div class="box">
  <h2>Choose Your Vote</h2>

  <button class="support" onclick="vote('support')">👍 SUPPORT</button>
  <button class="against" onclick="vote('against')">👎 AGAINST</button>

  <br>

  <button onclick="submitVote()" style="background:#333;color:white;">SUBMIT VOTE</button>
</div>

<div class="box">
  <h2>LIVE RESULTS</h2>
  <div id="result">Loading...</div>
</div>

<script>

/* 🔥 FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let selectedVote = null;

/* SELECT VOTE */
function vote(v){
  selectedVote = v;
}

/* SUBMIT */
function submitVote(){

  if(!selectedVote){
    alert("Please select vote");
    return;
  }

  const id = "user_" + Date.now();

  db.collection("votes").doc(id).set({
    vote: selectedVote,
    time: new Date()
  });

  alert("Vote Recorded Successfully");
}

/* LIVE COUNT */
db.collection("votes").onSnapshot(snapshot => {

  let support = 0;
  let against = 0;

  snapshot.forEach(doc => {
    let v = doc.data().vote;
    if(v === "support") support++;
    if(v === "against") against++;
  });

  document.getElementById("result").innerHTML =
    "👍 SUPPORT: " + support +
    "<br>👎 AGAINST: " + against;

});

</script>

</body>
</html>
