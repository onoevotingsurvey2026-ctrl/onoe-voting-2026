<!DOCTYPE html>
<html>
<head>
  <title>ONOE Voting - One Click</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 30px;
    }
    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
    }
    .box {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2>🗳️ ONOE One Click Voting</h2>

<div class="box">
  <button onclick="vote('support')">👍 SUPPORT</button>
  <button onclick="vote('against')">👎 AGAINST</button>
</div>

<h3>📊 Live Results</h3>
<p>Support: <span id="support">0</span></p>
<p>Against: <span id="against">0</span></p>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 👉 Create unique device ID (first time only)
let deviceId = localStorage.getItem("deviceId");

if(!deviceId){
  deviceId = "dev_" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem("deviceId", deviceId);
}


// 🗳️ VOTE FUNCTION
function vote(choice){

  const ref = db.ref("votes/" + deviceId);

  ref.once("value").then(snapshot => {

    if(snapshot.exists()){
      alert("❌ You already voted!");
      return;
    }

    ref.set({
      choice: choice,
      time: Date.now()
    });

    alert("✅ Vote recorded: " + choice);
  });
}


// 📊 LIVE COUNT
db.ref("votes").on("value", snapshot => {
  let data = snapshot.val() || {};
  let support = 0;
  let against = 0;

  Object.values(data).forEach(v => {
    if(v.choice === "support") support++;
    if(v.choice === "against") against++;
  });

  document.getElementById("support").innerText = support;
  document.getElementById("against").innerText = against;
});
</script>

</body>
</html>
