<!DOCTYPE html>
<html>
<head>
  <title>Login Voting System</title>

  <!-- Firebase CDN (compat version easy for beginners) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; text-align:center; margin-top:50px; }

    .box { display:none; }
    input { padding:10px; margin:5px; width:200px; }
    button { padding:10px 20px; margin:10px; cursor:pointer; }
  </style>
</head>

<body>

<h2>🗳️ Voting Login System</h2>

<!-- LOGIN BOX -->
<div id="loginBox">
  <h3>Login</h3>
  <input type="email" id="email" placeholder="Enter Gmail"><br>
  <input type="password" id="password" placeholder="Enter Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">
  <h2>Welcome User 🎉</h2>

  <p>You are successfully logged in</p>

  <button onclick="logout()">Logout</button>
</div>

<script>
  // 🔥 Firebase Config (உங்கள் project details இங்கே replace பண்ணணும்)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();

  // ✅ LOGIN FUNCTION
  function login(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then(user => {
      alert("Login Success ✅");

      // hide login, show dashboard
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
    })
    .catch(error => {
      alert("Login Failed ❌ : " + error.message);
    });
  }

  // ✅ LOGOUT FUNCTION
  function logout(){
    auth.signOut().then(() => {
      location.reload();
    });
  }
</script>

</body>
</html>
