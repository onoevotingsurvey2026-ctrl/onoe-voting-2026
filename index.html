<!DOCTYPE html>
<html>
<head>
  <title>ONOE Public Opinion Dashboard</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#020617; color:white; text-align:center; }
    header { padding:15px; border-bottom:2px solid red; }
    .live { color:red; }

    .top {
      display:flex;
      justify-content:space-between;
      padding:10px 20px;
      background:#0f172a;
    }

    button {
      padding:10px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin:5px;
    }

    .voteBtn { width:260px; font-size:16px; }
    .onoe { background:#2563eb; }
    .delim { background:#16a34a; }
    .comb { background:#7c3aed; }

    .chartbox { width:90%; margin:auto; margin-top:20px; }

    .ticker {
      background:red;
      padding:8px;
      position:fixed;
      bottom:0;
      width:100%;
      font-weight:bold;
    }

    #loginBox { margin-top:60px; }
  </style>
</head>

<body>

<header>
🏛️ ONOE & Delimitation Public Opinion  
<br><span class="live">🔴 LIVE / நேரலை</span>
</header>

<div class="top">
  <div id="user">👤 Guest</div>
  <div>
    <button onclick="login()">🔑 Login</button>
    <button onclick="document.body.requestFullscreen()">📺 TV Mode</button>
  </div>
</div>

<div id="loginBox">
  <h3>Login to Vote</h3>
</div>

<div id="dashboard" style="display:none">

  <button class="voteBtn onoe" onclick="vote('onoe')">ONOE</button>
  <button class="voteBtn delim" onclick="vote('delimitation')">Delimitation</button>
  <button class="voteBtn comb" onclick="vote('combined')">Combined</button>

  <p id="status">Not voted yet</p>
  <p id="time"></p>

  <div class="chartbox"><canvas id="bar"></canvas></div>
  <div class="chartbox"><canvas id="pie"></canvas></div>

</div>

<div class="ticker" id="ticker">
🔴 LIVE → ONOE: 0 | DELIM: 0 | COMB: 0
</div>

<script>

const firebaseConfig = {
  apiKey: "PASTE_YOUR_API_KEY",
  authDomain: "PASTE_YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "PASTE_YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let user = null;
let voted = false;

// LOGIN FIX
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(() => {
      console.log("Login success");
    })
    .catch((error) => {
      alert("Login Error: " + error.message);
    });
}

// AUTH STATE
auth.onAuthStateChanged(u => {
  if (u) {
    user = u;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("user").innerText = u.email;

    checkVote();
  }
});

// CHECK USER VOTE
function checkVote() {
  db.collection("userVotes").doc(user.uid).get().then(doc => {
    if (doc.exists) {
      voted = true;
      document.getElementById("status").innerText = "Already voted";
    }
  });
}

// VOTE
function vote(type) {
  if (voted) return;

  const ref = db.collection("votes").doc("india");

  db.runTransaction(async t => {
    const doc = await t.get(ref);
    let d = doc.data() || { onoe:0, delimitation:0, combined:0 };

    d[type] = (d[type] || 0) + 1;

    t.set(ref, d);
  });

  voted = true;
  document.getElementById("status").innerText = "Vote recorded";
}

// LIVE UPDATE
let bar, pie;

db.collection("votes").doc("india")
.onSnapshot(doc => {

  let d = doc.data() || { onoe:0, delimitation:0, combined:0 };

  let values = [d.onoe, d.delimitation, d.combined];
  let labels = ["ONOE", "Delim", "Combined"];

  if (bar) bar.destroy();
  bar = new Chart(document.getElementById("bar"), {
    type: "bar",
    data: { labels, datasets: [{ data: values }] }
  });

  if (pie) pie.destroy();
  pie = new Chart(document.getElementById("pie"), {
    type: "pie",
    data: { labels, datasets: [{ data: values }] }
  });

  document.getElementById("time").innerText =
    new Date().toLocaleTimeString();

  document.getElementById("ticker").innerText =
    "🔴 LIVE → ONOE: " + d.onoe +
    " | DELIM: " + d.delimitation +
    " | COMB: " + d.combined;

});

</script>

</body>
</html>
