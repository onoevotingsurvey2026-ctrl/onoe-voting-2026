<!DOCTYPE html>
<html>
<head>
  <title>ONOE + DEL TV Broadcast Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:black;
      color:white;
    }

    /* TOP BAR */
    .topbar{
      background:#b30000;
      padding:10px;
      text-align:center;
      font-weight:bold;
      animation:blink 1.5s infinite;
    }

    /* HEADER */
    .header{
      text-align:center;
      padding:15px;
      background:#111;
      box-shadow:0 0 15px red;
    }

    .title{
      font-size:22px;
      font-weight:bold;
    }

    .subtitle{
      font-size:13px;
      color:#aaa;
    }

    .live{
      color:#00ff7f;
      font-weight:bold;
      animation:blink 1s infinite;
    }

    /* GRID */
    .grid{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-top:30px;
    }

    .card{
      background:#1c1c1c;
      padding:25px;
      border-radius:12px;
      width:220px;
      text-align:center;
    }

    .label{
      font-size:14px;
      color:#ccc;
    }

    .num{
      font-size:55px;
      font-weight:bold;
      margin-top:10px;
    }

    .green{color:#00ff7f;}
    .red{color:#ff4d4d;}

    /* TICKER */
    .ticker{
      position:fixed;
      bottom:0;
      width:100%;
      background:#111;
      padding:8px;
      overflow:hidden;
      white-space:nowrap;
    }

    .ticker span{
      display:inline-block;
      padding-left:100%;
      animation:scroll 12s linear infinite;
      color:#aaa;
    }

    @keyframes scroll{
      0%{transform:translateX(0);}
      100%{transform:translateX(-100%);}
    }

    @keyframes blink{
      0%{opacity:1;}
      50%{opacity:0.3;}
      100%{opacity:1;}
    }

  </style>
</head>

<body>

<div class="topbar">
📡 LIVE TV BROADCAST <span class="live">● LIVE</span>
</div>

<div class="header">
  <div class="title">🇮🇳 INDIA PUBLIC OPINION DASHBOARD</div>
  <div class="subtitle">
    ONOE (One Nation One Election) | DEL (Delimitation)
  </div>
</div>

<div class="grid">

  <div class="card">
    <div class="label">🟢 ONOE SUPPORT</div>
    <div class="num green" id="os">0</div>
  </div>

  <div class="card">
    <div class="label">🔴 ONOE AGAINST</div>
    <div class="num red" id="oa">0</div>
  </div>

  <div class="card">
    <div class="label">🟢 DEL SUPPORT</div>
    <div class="num green" id="ds">0</div>
  </div>

  <div class="card">
    <div class="label">🔴 DEL AGAINST</div>
    <div class="num red" id="da">0</div>
  </div>

</div>

<div class="ticker">
  <span>📡 LIVE ONOE + DEL RESULTS | GLOBAL VOTING NETWORK | REAL TIME ELECTION DASHBOARD | INDIA PUBLIC OPINION SYSTEM</span>
</div>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🎯 LIVE DATA */
db.ref("stats").on("value", snap => {

  let d = snap.val() || {};

  animate("os", d.ONOE?.support || 0);
  animate("oa", d.ONOE?.against || 0);
  animate("ds", d.DEL?.support || 0);
  animate("da", d.DEL?.against || 0);

});

/* 🔢 ANIMATION FUNCTION */
function animate(id, end){
  let el = document.getElementById(id);
  let start = 0;
  let step = end / 20;

  let timer = setInterval(()=>{
    start += step;
    el.innerText = Math.floor(start);

    if(start >= end){
      el.innerText = end;
      clearInterval(timer);
    }
  },30);
}

</script>

</body>
</html>
