<!DOCTYPE html>
<html>
<head>
  <title>Global Firebase Live Election Engine v1.3</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
      padding:0;
    }

    h2{
      text-align:center;
      padding:15px;
    }

    .card{
      background:#111827;
      margin:10px;
      padding:15px;
      border-radius:10px;
    }

    button{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      opacity:0.9;
    }

    #user{
      margin-top:10px;
      color:#22c55e;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h2>🌍 Global Firebase Live Election Engine v1.3</h2>

<!-- LOGIN -->
<div class="card">
  <button onclick="login()">Login with Google</button>
  <div id="user">Checking login...</div>
</div>

<!-- LIVE STATS -->
<div class="card">
  <h3>📊 Live Election Stats</h3>

  <div id="stats">
    Loading live stats...
  </div>
</div>

<!-- VOTING -->
<div class="card">
  <h3>🗳️ Voting Panel</h3>

  <button onclick="vote('onoeSupport')">
    ONOE +
  </button>

  <button onclick="vote('onoeAgainst')">
    ONOE -
  </button>

  <button onclick="vote('delSupport')">
    DEL +
  </button>

  <button onclick="vote('delAgainst')">
    DEL -
  </button>
</div>

<!-- AI -->
<div class="card">
  <h3>🤖 AI Prediction</h3>

  <div id="ai">
    Loading AI Prediction...
  </div>
</div>

<!-- SECURITY -->
<div class="card">
  <h3>🔐 Security Status</h3>

  <div>
    Firebase Live Sync Active | Fraud Protection Enabled
  </div>
</div>

<script>

/* ---------------- FIREBASE CONFIG ---------------- */

const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};

/* ---------------- INITIALIZE ---------------- */

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* ---------------- LOGIN ---------------- */

function login(){

  const provider =
    new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)

  .then((result)=>{

    document.getElementById("user").innerText =
      "Logged in: " + result.user.email;

  })

  .catch((error)=>{

    console.log(error);

    alert("Google Login Failed");

  });

}

/* ---------------- AUTH STATE ---------------- */

auth.onAuthStateChanged(user=>{

  if(user){

    document.getElementById("user").innerText =
      "Logged in: " + user.email;

  }
  else{

    document.getElementById("user").innerText =
      "Login Required";

  }

});

/* ---------------- LIVE STATS ---------------- */

db.ref("votes/india").on("value", snap=>{

  const data = snap.val() || {};

  document.getElementById("stats").innerHTML =

    "ONOE + : " + (data.onoeSupport || 0)
    + "<br><br>" +

    "ONOE - : " + (data.onoeAgainst || 0)
    + "<br><br>" +

    "DEL + : " + (data.delSupport || 0)
    + "<br><br>" +

    "DEL - : " + (data.delAgainst || 0);

  aiPredict(data);

});

/* ---------------- VOTING ---------------- */

function vote(type){

  const user = auth.currentUser;

  if(!user){

    alert("Login Required");
    return;

  }

  const voteRef =
    db.ref("votes/india/" + type);

  voteRef.transaction(v => (v || 0) + 1);

}

/* ---------------- AI PREDICTION ---------------- */

function aiPredict(d){

  const onoe =
    d.onoeSupport || 0;

  const del =
    d.delSupport || 0;

  const total =
    onoe + del + 1;

  let result = "";
  let confidence = 0;

  if(onoe === del){

    result =
      "🟡 Tight Competition";

    confidence = 50;

  }

  else if(onoe > del){

    result =
      "🟢 ONOE Leading";

    confidence =
      ((onoe - del) / total * 100)
      .toFixed(1);

  }

  else{

    result =
      "🔴 DEL Leading";

    confidence =
      ((del - onoe) / total * 100)
      .toFixed(1);

  }

  document.getElementById("ai").innerHTML =

    result +
    " | Confidence: " +
    confidence + "%";

}

</script>

</body>
</html>
