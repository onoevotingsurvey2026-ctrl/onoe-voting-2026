<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Indian Vote Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f14;
  color:#e0e0e0;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#0a2a43,#0d47a1,#0a2a43);
  color:white;
  text-align:center;
  padding:18px;
}

/* CARD */
.card{
  background:#121a22;
  margin:10px;
  padding:15px;
  border-radius:10px;
  border:1px solid #1f2a36;
}

/* INPUT */
input{
  width:90%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

/* BUTTON */
button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.login{background:#1565c0;color:white}
.support{background:#1b5e20;color:white}
.against{background:#b71c1c;color:white}
.reset{background:#37474f;color:white}

/* TEXT */
h3{color:#90caf9}
.small{font-size:13px;color:#b0bec5}
</style>

</head>

<body>

<header>
🌍 Global Indian Vote Dashboard  
🗳️ Digital Democracy Platform
</header>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button class="login" onclick="signup()">Sign Up</button>
<button class="login" onclick="login()">Login</button>

<p id="user">Not Logged In</p>
</div>

<!-- VOTE -->
<div class="card">
<h3>Vote Panel</h3>

<button class="support" onclick="vote('support')">👍 SUPPORT</button>
<button class="against" onclick="vote('against')">👎 AGAINST</button>
<button class="reset" onclick="resetVote()">RESET</button>

<p class="small">One Email = One Vote System</p>
</div>

<!-- RESULT -->
<div class="card">
<h3>Live Result</h3>
<p>Support: <span id="s">0</span></p>
<p>Against: <span id="a">0</span></p>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;
    document.getElementById("user").innerText = "Logged in: " + user.email;
  } else {
    document.getElementById("user").innerText = "Not Logged In";
  }
});

/* SIGN UP */
function signup(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email,password)
  .then(()=>{
    alert("Signup Successful");
  })
  .catch(err=>{
    alert(err.message);
  });
}

/* LOGIN */
function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
  .then(()=>{
    alert("Login Successful");
  })
  .catch(err=>{
    alert(err.message);
  });
}

/* DEVICE ID */
function getDeviceId(){
  let id = localStorage.getItem("device_id");
  if(!id){
    id = "DEV-" + Math.random().toString(36).substr(2,10);
    localStorage.setItem("device_id",id);
  }
  return id;
}

/* VOTE */
function vote(type){
  if(!currentUser){
    alert("Login required");
    return;
  }

  db.ref("votes/" + currentUser.uid).once("value",snap=>{
    if(snap.exists()){
      alert("Already Voted");
      return;
    }

    db.ref("votes/" + currentUser.uid).set({
      email: currentUser.email,
      vote: type,
      device: getDeviceId(),
      time: Date.now()
    });

    alert("Vote Recorded Successfully");
  });
}

/* RESET */
function resetVote(){
  if(currentUser){
    db.ref("votes/" + currentUser.uid).remove();
  }
}

/* LIVE RESULT */
db.ref("votes").on("value",snap=>{
  let data = snap.val() || {};
  let s=0,a=0;

  Object.values(data).forEach(v=>{
    if(v.vote==="support") s++;
    if(v.vote==="against") a++;
  });

  document.getElementById("s").innerText = s;
  document.getElementById("a").innerText = a;
});
</script>

</body>
</html>
