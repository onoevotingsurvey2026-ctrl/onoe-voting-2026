<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Global Voting Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    margin:0;
}

header{
    background:#1e293b;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

.container{
    margin-top:30px;
}

.card{
    background:#111827;
    padding:20px;
    margin:15px auto;
    width:320px;
    border-radius:12px;
    box-shadow:0 0 10px black;
}

button{
    padding:12px 18px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.support{
    background:green;
    color:white;
}

.against{
    background:red;
    color:white;
}

.login{
    background:#2563eb;
    color:white;
}

.result{
    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<header>
🗳 Global Election Dashboard
</header>

<div class="container">

    <!-- LOGIN -->
    <div class="card">

        <h2>User Login</h2>

        <button class="login" onclick="login()">
            Login with Google
        </button>

        <p id="user">
            Not Logged In
        </p>

    </div>


    <!-- VOTING -->
    <div class="card">

        <h2>Vote Panel</h2>

        <button class="support" onclick="vote('support')">
            👍 SUPPORT
        </button>

        <button class="against" onclick="vote('against')">
            👎 AGAINST
        </button>

    </div>


    <!-- LIVE RESULT -->
    <div class="card">

        <h2>🔥 Live Result</h2>

        <p class="result">
            Support :
            <span id="s">0</span>
        </p>

        <p class="result">
            Against :
            <span id="a">0</span>
        </p>

    </div>

</div>

<script>

// Firebase Config

const firebaseConfig = {

    apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",

    authDomain: "onoevote2026.firebaseapp.com",

    projectId: "onoevote2026",

    storageBucket: "onoevote2026.firebasestorage.app",

    messagingSenderId: "181065724520",

    appId: "1:181065724520:web:f72a93869786373c1101dd"

};


// Initialize Firebase

firebase.initializeApp(firebaseConfig);


// Firebase Services

const auth = firebase.auth();

const db = firebase.firestore();


// LOGIN

function login(){

    const provider =
        new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)

    .then((result)=>{

        document.getElementById("user").innerText =
            result.user.email;

    })

    .catch((error)=>{

        alert(error.message);

    });

}


// VOTE FUNCTION

function vote(type){

    const voteRef =
        db.collection("votes").doc("global_vote");

    voteRef.get()

    .then((doc)=>{

        let data = doc.data() || {

            onoe_support:0,

            onoe_against:0

        };


        if(type === "support"){

            data.onoe_support++;

        }


        if(type === "against"){

            data.onoe_against++;

        }


        voteRef.set(data);

    });

}


// LIVE RESULT UPDATE

db.collection("votes")

.doc("global_vote")

.onSnapshot((doc)=>{

    if(doc.exists){

        let data = doc.data();

        document.getElementById("s").innerText =
            data.onoe_support || 0;

        document.getElementById("a").innerText =
            data.onoe_against || 0;

    }

});

</script>

</body>
</html>
