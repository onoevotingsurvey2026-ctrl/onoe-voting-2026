<!DOCTYPE html>
<html>
<head>
  <title>Global Voting System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      font-family:Arial;
      text-align:center;
      background:#0b1220;
      color:white;
      margin:0;
    }

    .box{
      margin:15px;
      padding:20px;
      background:#ffffff10;
      border-radius:10px;
    }

    button{
      padding:12px;
      margin:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .login{background:#2196F3;color:white;}
    .logout{background:#444;color:white;}

    #voteBox{display:none;}
  </style>
</head>

<body>

<h2>🌍 GLOBAL VOTING SYSTEM</h2>

<div class="box">
  <button class="login" onclick="login()">🔐 Login with Google</button>
  <button class="logout" onclick="logout()">Logout</button>

  <p id="status">NOT LOGGED IN</p>
</div>

<!-- DASHBOARD ALWAYS EXISTS -->
<div class="box" id="voteBox">
  <h3>🗳 LIVE RESULTS</h3>
  <div id="result">Loading...</div>
</div>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

let user = null;

/* LOGIN */
function login(){
  auth.signInWithPopup(provider);
}

/* LOGOUT */
function logout(){
  auth.signOut();
}

/* AUTH STATE FIX */
auth.onAuthStateChanged(u => {

  if(u){
    user = u;

    document.getElementById("status").innerText =
      "LOGGED IN: " + u.email;

    document.getElementById("voteBox").style.display = "block";

    loadLive();

  } else {

    user = null;

    document.getElementById("status").innerText =
      "NOT LOGGED IN";

    document.getElementById("voteBox").style.display = "block"; 
    // dashboard still visible (no missing issue)

    loadLive();
  }

});

/* LIVE RESULTS */
function loadLive(){

  db.collection("votes").onSnapshot(snapshot => {

    let support = 0;
    let against = 0;

    snapshot.forEach(doc => {
      let v = doc.data().vote;
      if(v === "support") support++;
      if(v === "against") against++;
    });

    document.getElementById("result").innerHTML =
      "👍 SUPPORT: " + support +
      "<br>👎 AGAINST: " + against;

  });

}

</script>

</body>
</html>
