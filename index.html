<script>

/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let currentUser = null;
let latestData = {};

/* LOGIN */

function login(){

  let email = prompt("Enter Gmail ID");

  if(email && email.includes("@gmail.com")){

    currentUser = email;

    document.getElementById("userInfo").innerText =
    "Logged in: " + email;

  }else{

    alert("Invalid Gmail");

  }

}

/* FINAL FIXED VOTE FUNCTION */

function vote(type){

  if(!currentUser){

    alert("Login required");
    return;

  }

  /* SAFE EMAIL */

  const safeEmail =
  currentUser.replace(/\./g,"_");

  /* SAVE VOTE */

  db.ref("user_votes/" + safeEmail).set({

    email: currentUser,
    vote: type,
    time: Date.now()

  })

  .then(()=>{

    alert("✅ Vote Recorded Successfully");

  })

  .catch((err)=>{

    alert("❌ Error: " + err.message);

  });

}

/* LIVE DATA */

db.ref("user_votes").on("value",(snap)=>{

  let data = snap.val() || {};

  let s = 0;
  let n = 0;
  let o = 0;

  Object.values(data).forEach(v=>{

    if(v.vote === "support") s++;

    if(v.vote === "neutral") n++;

    if(v.vote === "oppose") o++;

  });

  document.getElementById("s").innerText = s;
  document.getElementById("n").innerText = n;
  document.getElementById("o").innerText = o;
  document.getElementById("t").innerText = s+n+o;

  /* UPDATE CHARTS */

  pieChart.data.datasets[0].data = [s,n,o];
  barChart.data.datasets[0].data = [s,n,o];

  pieChart.update();
  barChart.update();

  latestData = {

    s,n,o,
    total:s+n+o,
    raw:data

  };

});

/* PIE CHART */

const pieChart = new Chart(
document.getElementById("pieChart"),{

type:'pie',

data:{

labels:[
'Support',
'Neutral',
'Oppose'
],

datasets:[{

data:[0,0,0],

backgroundColor:[

'#22c55e',
'#facc15',
'#ef4444'

]

}]

}

});

/* BAR CHART */

const barChart = new Chart(
document.getElementById("barChart"),{

type:'bar',

data:{

labels:[
'Support',
'Neutral',
'Oppose'
],

datasets:[{

data:[0,0,0],

backgroundColor:[

'#22c55e',
'#facc15',
'#ef4444'

]

}]

}

});

/* PDF REPORT */

function downloadPDF(){

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF();

  doc.setFontSize(16);

  doc.text(
  "GLOBAL INDIAN VOTE REPORT",
  10,
  10
  );

  doc.setFontSize(12);

  doc.text(
  "Support: " + latestData.s,
  10,
  30
  );

  doc.text(
  "Neutral: " + latestData.n,
  10,
  40
  );

  doc.text(
  "Oppose: " + latestData.o,
  10,
  50
  );

  doc.text(
  "Total: " + latestData.total,
  10,
  60
  );

  doc.text(
  "Generated: " +
  new Date().toLocaleString(),
  10,
  70
  );

  let y = 90;

  doc.text(
  "INDIVIDUAL VOTE RECORDS:",
  10,
  y
  );

  y += 10;

  Object.keys(latestData.raw || {}).forEach((u,i)=>{

    const masked =
    u.replace(/(.{3}).+(@gmail.com)/,"$1***$2");

    doc.text(

    (i+1) + ". " +
    masked + " -> " +
    latestData.raw[u].vote,

    10,
    y

    );

    y += 10;

    if(y > 280){

      doc.addPage();

      y = 20;

    }

  });

  doc.save(
  "Global_Indian_Vote_Report.pdf"
  );

}

</script>
