<!DOCTYPE html>
<html>
<head>
  <title>Global Voting System - FIXED</title>

  <!-- ✅ Firebase v8 ONLY -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#f4f6f8;
      margin:0;
    }

    header{
      background:#0f172a;
      color:white;
      padding:15px;
    }

    #dashboard{ display:none; }

    button{
      padding:10px 15px;
      margin:5px;
      cursor:pointer;
    }

    .card{
      background:white;
      margin:10px;
      padding:15px;
      border-radius:10px;
      display:inline-block;
      min-width:200px;
    }
  </style>
</head>

<body>

<header>
  🌍 Global Voting System
</header>

<!-- LOGIN -->
<div id="loginSection">
  <h2>Login to Continue</h2>
  <button onclick="login()">Login with Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <h2>📊 Live Dashboard</h2>

  <div class="card">
    <h3>India</h3>
    <p>ONOE Support: <span id="in_os">0</span></p>
    <p>ONOE Against: <span id="in_oa">0</span></p>
  </div>

  <br>

  <button onclick="vote('india','onoeSupport')">Vote +</button>
  <button onclick="vote('india','onoeAgainst')">Vote -</button>
</div>

<script>

/////////////////////////////////////////////////////
// 🔥 FIREBASE CONFIG (REAL VALUES - YOU HAVE IT)
/////////////////////////////////////////////////////

const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/////////////////////////////////////////////////////
// 🔐 LOGIN (FIXED)
/////////////////////////////////////////////////////

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then((result)=>{
      console.log("LOGIN SUCCESS:", result.user.email);
    })
    .catch((error)=>{
      console.log("LOGIN ERROR:", error.code, error.message);
      alert(error.message);
    });
}

/////////////////////////////////////////////////////
// 🔄 AUTH STATE CONTROL
/////////////////////////////////////////////////////

auth.onAuthStateChanged((user)=>{

  console.log("AUTH:", user);

  if(user){
    document.getElementById("loginSection").style.display="none";
    document.getElementById("dashboard").style.display="block";
    loadVotes();
  } else {
    document.getElementById("loginSection").style.display="block";
    document.getElementById("dashboard").style.display="none";
  }

});

/////////////////////////////////////////////////////
// 📊 LOAD VOTES
/////////////////////////////////////////////////////

function loadVotes(){
  db.ref("votes/india").on("value", (snap)=>{
    const data = snap.val() || {};

    document.getElementById("in_os").innerText = data.onoeSupport || 0;
    document.getElementById("in_oa").innerText = data.onoeAgainst || 0;
  });
}

/////////////////////////////////////////////////////
// 🗳️ VOTE FUNCTION
/////////////////////////////////////////////////////

function vote(country,type){

  const user = auth.currentUser;

  if(!user){
    alert("Please login first");
    return;
  }

  db.ref("votes/"+country+"/"+type)
    .transaction((v)=> (v||0)+1);
}

</script>

</body>
</html>
