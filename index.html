<!DOCTYPE html>
<html>
<head>
  <title>Global Indian Vote 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align:center; padding:20px; }
    button { padding:10px 15px; margin:5px; cursor:pointer; }
    .box { margin-top:20px; padding:15px; border:1px solid #ccc; display:inline-block; }
  </style>
</head>

<body>

  <h2>🌍 Global Indian Vote 2026</h2>
  <p id="status">Not logged in</p>

  <button id="loginBtn">Login with Google</button>
  <button id="logoutBtn" style="display:none;">Logout</button>

  <div class="box" id="userBox" style="display:none;">
    <p><b>User:</b> <span id="userEmail"></span></p>
  </div>

  <hr>

  <h3>🗳️ Cast Your Vote</h3>

  <button onclick="vote('support')">👍 Support</button>
  <button onclick="vote('oppose')">👎 Oppose</button>
  <button onclick="vote('neutral')">⚖️ Neutral</button>

  <p id="voteMsg"></p>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      GoogleAuthProvider, 
      signInWithPopup, 
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import { 
      getDatabase, 
      ref, 
      get, 
      set 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 🔥 Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
      authDomain: "onoevote2026.firebaseapp.com",
      databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "onoevote2026",
      storageBucket: "onoevote2026.firebasestorage.app",
      messagingSenderId: "181065724520",
      appId: "1:181065724520:web:f72a93869786373c1101dd"
    };

    // Init Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // UI
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const status = document.getElementById("status");
    const userEmail = document.getElementById("userEmail");
    const userBox = document.getElementById("userBox");
    const voteMsg = document.getElementById("voteMsg");

    // LOGIN
    loginBtn.onclick = () => {
      signInWithPopup(auth, provider)
        .catch(err => alert(err.message));
    };

    // LOGOUT
    logoutBtn.onclick = () => {
      signOut(auth);
    };

    // AUTH STATE
    onAuthStateChanged(auth, (user) => {
      if (user) {
        status.innerText = "Logged in ✔️";
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
        userBox.style.display = "block";
        userEmail.innerText = user.email;
      } else {
        status.innerText = "Not logged in";
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
        userBox.style.display = "none";
      }
    });

    // 🗳️ VOTE FUNCTION (ONE USER ONE VOTE)
    window.vote = async function(choice) {

      const user = auth.currentUser;

      if (!user) {
        alert("Please login first");
        return;
      }

      const uid = user.uid;
      const voteRef = ref(db, "votes/" + uid);

      const snapshot = await get(voteRef);

      if (snapshot.exists()) {
        voteMsg.innerText = "❌ You already voted!";
        return;
      }

      await set(voteRef, {
        email: user.email,
        choice: choice,
        time: Date.now()
      });

      voteMsg.innerText = "✅ Vote submitted successfully!";
    };

  </script>

</body>
</html>
