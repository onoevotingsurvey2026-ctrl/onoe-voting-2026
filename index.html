<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Indian Vote</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    background:#f4f4f4;
    margin:0;
    padding:0;
}

.card{
    background:white;
    padding:20px;
    margin:20px auto;
    width:90%;
    max-width:600px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.support{background:green;color:white;}
.neutral{background:orange;color:white;}
.oppose{background:red;color:white;}
</style>

</head>

<body>

<div class="card">
<h2>🗳️ Cast Your Vote</h2>

<button class="support" onclick="vote('support')">🟢 Support</button>
<button class="neutral" onclick="vote('neutral')">⚪ Neutral</button>
<button class="oppose" onclick="vote('oppose')">🔴 Oppose</button>
</div>

<div class="card">
<h2>📊 Live Dashboard</h2>

<p>🟢 Support: <span id="supportCount">0</span></p>
<p>⚪ Neutral: <span id="neutralCount">0</span></p>
<p>🔴 Oppose: <span id="opposeCount">0</span></p>
<p>📊 Total: <span id="totalVotes">0</span></p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

<!-- Your JS -->
<script src="script.js"></script>

</body>
</html>
