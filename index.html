<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Global Overseas Election Platform</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-functions.js"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:#fff;
    }

    header{
      background:#111827;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 2fr 1fr;
      height:90vh;
    }

    section{
      padding:15px;
      border-right:1px solid #1f2937;
    }

    button{
      padding:10px;
      margin:5px;
      border-radius:8px;
      cursor:pointer;
    }

    canvas{
      background:#fff;
      border-radius:10px;
      margin-top:10px;
    }
  </style>
</head>

<body>

<header>
  🌍 Global Overseas Election Dashboard
  <button onclick="login()">Login with Google</button>
</header>

<div class="grid">

  <!-- LEFT PANEL -->
  <section>
    <h3>📊 Live Stats</h3>
    <div id="stats">Loading...</div>

    <h3>🤖 AI Assistant</h3>
    <div id="ai">Ask election questions...</div>
  </section>

  <!-- CENTER PANEL -->
  <section>
    <h2>🗳️ Voting Panel</h2>

    <button onclick="vote('onoe')">ONOE +</button>
    <button onclick="vote('del')">DEL +</button>

    <canvas id="chart"></canvas>
  </section>

  <!-- RIGHT PANEL -->
  <section>
    <h3>🌍 Global Map</h3>
    <div>Live map loading...</div>

    <h3>🔐 Security Status</h3>
    <div>Active (Fraud Protection ON)</div>
  </section>

</div>

<script>
/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const functions = firebase.functions();

/* 🔑 LOGIN */
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

/* 🗳️ VOTE FUNCTION */
function vote(choice){

  const fn = functions.httpsCallable("castVote");

  fn({ choice })
    .then(() => {
      alert("✅ Vote recorded successfully");
    })
    .catch(err => {
      alert("❌ " + err.message);
    });

}

/* 📊 CHART */
const ctx = document.getElementById("chart");

new Chart(ctx, {
  type: "bar",
  data: {
    labels: ["ONOE", "DEL"],
    datasets: [{
      label: "Live Votes",
      data: [12, 9]
    }]
  }
});

</script>

</body>
</html>
