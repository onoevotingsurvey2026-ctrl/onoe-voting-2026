<!DOCTYPE html>
<html>
<head>
  <title>Global Voting Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0f1a;
      color:white;
      text-align:center;
    }

    .header{
      padding:15px;
      background:#111a33;
    }

    .tv-toggle{
      padding:10px;
      margin:10px;
      background:#333;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .admin button{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .open{background:green;color:white;}
    .close{background:red;color:white;}
    .reset{background:orange;color:black;}

    .cards{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-top:30px;
    }

    .card{
      background:#1e1e1e;
      padding:25px;
      border-radius:14px;
      min-width:180px;
    }

    .green{color:#00ff7f;}
    .red{color:#ff4d4d;}
    .blue{color:#4da6ff;}

    .num{
      font-size:50px;
      font-weight:bold;
      margin:10px 0;
    }

    .percent{
      color:#aaa;
      font-size:16px;
    }

    body.tv-mode{
      background:black;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>📡 GLOBAL VOTING NETWORK</h2>
  <h3>🇮🇳 INDIA PUBLIC OPINION DASHBOARD</h3>
</div>

<!-- TV MODE BUTTON -->
<button class="tv-toggle" onclick="document.body.classList.toggle('tv-mode')">
📺 TV MODE ON/OFF
</button>

<!-- ADMIN CONTROL -->
<div class="admin">
  <h3>👨‍💼 ADMIN CONTROL</h3>

  <button class="open">🟢 OPEN VOTING</button>
  <button class="close">🔴 CLOSE VOTING</button>
  <button class="reset">♻️ RESET</button>
</div>

<hr>

<!-- LIVE RESULTS -->
<h3>📺 LIVE RESULTS DASHBOARD</h3>

<div class="cards">

  <div class="card green">
    🟢 A SUPPORT
    <div class="num">0</div>
    <div class="percent">0.0%</div>
  </div>

  <div class="card red">
    🔴 B OPPOSE
    <div class="num">0</div>
    <div class="percent">0.0%</div>
  </div>

  <div class="card blue">
    🔵 C MIXED
    <div class="num">0</div>
    <div class="percent">0.0%</div>
  </div>

</div>

</body>
</html>
