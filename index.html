<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enterprise Voting Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .count {
      font-size: 30px;
      color: #38bdf8;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  🗳️ LIVE ENTERPRISE VOTING DASHBOARD
</header>

<div class="container">
  <div class="card">
    OPTION A
    <div class="count" id="aVotes">0</div>
  </div>

  <div class="card">
    OPTION B
    <div class="count" id="bVotes">0</div>
  </div>

  <div class="card">
    OPTION C
    <div class="count" id="cVotes">0</div>
  </div>

  <div class="card">
    TOTAL VOTES
    <div class="count" id="totalVotes">0</div>
  </div>
</div>

<footer>
  Firebase Realtime Enterprise System 🚀
</footer>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // 🔴 YOUR FIREBASE CONFIG (REPLACE THIS)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  // Init Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Realtime DB reference
  const votesRef = ref(db, "votes");

  // Live listener
  onValue(votesRef, (snapshot) => {
    const data = snapshot.val() || {};

    const a = data.optionA || 0;
    const b = data.optionB || 0;
    const c = data.optionC || 0;

    document.getElementById("aVotes").innerText = a;
    document.getElementById("bVotes").innerText = b;
    document.getElementById("cVotes").innerText = c;
    document.getElementById("totalVotes").innerText = a + b + c;
  });

</script>

</body>
</html>
