<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONOE Voting Portal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      text-align: center;
    }

    .box {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      margin-top: 25px;
    }

    .status {
      color: green;
      font-weight: bold;
      margin: 10px 0;
    }

    .btn {
      width: 90%;
      padding: 15px;
      margin: 10px auto;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      display: block;
    }

    .support {
      background: #2ecc71;
      color: white;
    }

    .against {
      background: #e74c3c;
      color: white;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      margin-top: 20px;
    }

    .footer {
      font-size: 12px;
      color: gray;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>🗳️ ONOE / Delimitation Voting</h1>

  <div class="status">🔴 LIVE SYSTEM ACTIVE</div>

  <!-- VOTE BUTTONS -->
  <button class="btn support"
    onclick="window.open('PASTE_FORM_LINK_HERE')">
    ✔️ Support
  </button>

  <button class="btn against"
    onclick="window.open('PASTE_FORM_LINK_HERE')">
    ❌ Against
  </button>

  <!-- DASHBOARD -->
  <iframe src="PASTE_SHEET_EMBED_LINK_HERE"></iframe>

  <div class="footer">
    ⚡ Fast • Mobile Friendly • GitHub Pages Ready
  </div>

</div>

</body>
</html>
