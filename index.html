<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Global Voting System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      color:white;
      text-align:center;
      padding:20px;
    }
    .box{
      background:#1e293b;
      padding:20px;
      margin:10px auto;
      width:90%;
      max-width:500px;
      border-radius:10px;
    }
    button{
      padding:10px 20px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }
    .login{background:#22c55e;color:white;}
    .logout{background:#ef4444;color:white;}
    .vote{background:#3b82f6;color:white;}
  </style>
</head>

<body>

<h2>🌍 GLOBAL VOTING SYSTEM</h2>

<div class="box">
  <p id="status">NOT LOGGED IN</p>

  <button class="login" onclick="login()">🔐 Login with Google</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="box">
  <h3>🗳 LIVE RESULTS</h3>
  <p id="result">Loading...</p>
</div>

<div class="box">
  <h3>VOTE</h3>
  <button class="vote" onclick="vote('support')">👍 SUPPORT</button>
  <button class="vote" onclick="vote('against')">👎 AGAINST</button>
</div>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* 🔐 LOGIN (FIXED POPUP VERSION) */
function login(){
  console.log("👉 LOGIN CLICKED");

  const provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth().signInWithPopup(provider)
    .then(result => {
      console.log("✅ LOGIN SUCCESS:", result.user.email);
    })
    .catch(error => {
      console.log("❌ LOGIN ERROR:", error.code, error.message);
      alert(error.message);
    });
}

/* 🔓 LOGOUT */
function logout(){
  auth.signOut();
}

/* 👤 AUTH STATE */
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("status").innerText =
      "LOGGED IN: " + user.email;
  } else {
    document.getElementById("status").innerText =
      "NOT LOGGED IN";
  }
});

/* 🗳 VOTE FUNCTION */
function vote(type){
  let user = auth.currentUser;

  if(!user){
    alert("Please login first");
    return;
  }

  db.collection("votes").add({
    uid: user.uid,
    vote: type,
    time: new Date()
  });
}

/* 📊 LIVE RESULTS */
db.collection("votes").onSnapshot(snapshot => {

  let support = 0;
  let against = 0;

  snapshot.forEach(doc => {
    let v = doc.data().vote;
    if(v === "support") support++;
    if(v === "against") against++;
  });

  document.getElementById("result").innerHTML =
    "👍 SUPPORT: " + support +
    "<br>👎 AGAINST: " + against;

});

</script>

</body>
</html>
