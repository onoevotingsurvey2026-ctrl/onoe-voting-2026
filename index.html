<!DOCTYPE html>
<html>
<head>
  <title>ECI LEVEL GLOBAL SYSTEM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b1220;
      color:white;
      text-align:center;
    }

    .panel{
      margin:15px;
      padding:20px;
      background:#ffffff10;
      border-radius:12px;
    }

    button{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .login{background:#2196F3;color:white;}
    .vote{background:#4caf50;color:white;}
  </style>
</head>

<body>

<h2>🌍 ECI PRODUCTION SYSTEM (NEXT LEVEL)</h2>

<div class="panel">
  <button class="login" onclick="login()">🔐 Google Login</button>
  <p id="user">NOT LOGGED IN</p>
</div>

<div class="panel">
  <h3>🗳 VOTE PANEL</h3>
  <button class="vote" onclick="vote('support')">👍 SUPPORT</button>
  <button class="vote" onclick="vote('against')">👎 AGAINST</button>
</div>

<div class="panel">
  <h3>📊 LIVE RESULT</h3>
  <p id="result">Loading...</p>
</div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

/* LOGIN */
function login(){
  auth.signInWithRedirect(provider);
}

/* AUTH */
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").innerText = user.email;
  } else {
    document.getElementById("user").innerText = "NOT LOGGED IN";
  }
});

/* VOTE (BASIC STRUCTURE) */
function vote(type){
  const user = auth.currentUser;
  if(!user){
    alert("Please login first");
    return;
  }

  db.collection("votes").add({
    uid: user.uid,
    vote: type,
    time: Date.now()
  });
}

/* LIVE COUNT */
db.collection("votes").onSnapshot(snap=>{
  let support = 0;
  let against = 0;

  snap.forEach(d=>{
    let v = d.data().vote;
    if(v==="support") support++;
    if(v==="against") against++;
  });

  document.getElementById("result").innerHTML =
    "👍 " + support + " | 👎 " + against;
});

</script>

</body>
</html>
