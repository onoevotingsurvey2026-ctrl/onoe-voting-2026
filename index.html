<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ONOE Voting System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  text-align: center;
  margin: 0;
}

header {
  background: #1e88e5;
  color: white;
  padding: 20px;
}

button {
  padding: 15px 25px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.support { background: green; color: white; }
.against { background: red; color: white; }

</style>
</head>

<body>

<header>
  <h1>ONOE / DELIMITATION Voting System</h1>
  <p>Public Opinion Real-time Dashboard</p>
</header>

<h2>Cast Your Vote</h2>

<button class="support" onclick="supportVote()">Support 👍</button>
<button class="against" onclick="againstVote()">Against 👎</button>

<script>
const scriptURL = "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE";

function sendVote(type) {
  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({ vote: type })
  })
  .then(() => alert("Vote Submitted: " + type))
  .catch(() => alert("Error! Try again"));
}

function supportVote() {
  sendVote("Support");
}

function againstVote() {
  sendVote("Against");
}
</script>

</body>
</html>
