<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Global Voting Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body { font-family: Arial; margin:0; background:#f4f4f4; }
    header, footer { background:#111; color:#fff; text-align:center; padding:12px; }
    .container { padding:20px; text-align:center; }

    button {
      padding:10px 15px;
      margin:5px;
      cursor:pointer;
    }

    .card {
      background:white;
      padding:15px;
      margin:10px auto;
      width:90%;
      max-width:400px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <h2>Global Voting Dashboard</h2>
  <div style="font-size:12px; color:#ccc;">
    https://onoevotingsurvey2026-ctrl.github.io/onoe-voting-2026/
  </div>
</header>

<!-- LOGIN + DASHBOARD -->
<div class="container">

  <button onclick="login()">Login with Google</button>

  <div id="userBox"></div>

  <div class="card">
    <h3>Vote Panel</h3>

    <button onclick="vote('onoe_support')">👍 ONOE Support</button>
    <button onclick="vote('onoe_against')">👎 ONOE Against</button>
  </div>

  <div class="card">
    <h3>Live Result</h3>

    <p>ONOE Support: <span id="onoeSupport">0</span></p>
    <p>ONOE Against: <span id="onoeAgainst">0</span></p>
  </div>

</div>

<!-- FOOTER -->
<footer>
  © 2026 Global Voting System
</footer>

<!-- FIREBASE CONFIG (ADD YOURS) -->
<script>
  var firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.firestore();
  const auth = firebase.auth();

  // LOGIN
  function login() {
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider).then(result => {
      document.getElementById("userBox").innerHTML =
        "Logged in: " + result.user.email;
    });
  }

  // VOTE (ONE USER ONE VOTE)
  function vote(choice) {
    const user = auth.currentUser;

    if (!user) {
      alert("Please login first");
      return;
    }

    db.collection("votes").doc(user.uid).get().then(doc => {
      if (doc.exists) {
        alert("One Gmail one vote only allowed");
      } else {
        db.collection("votes").doc(user.uid).set({
          uid: user.uid,
          email: user.email,
          choice: choice,
          time: Date.now()
        });

        alert("Vote successfully recorded");
      }
    });
  }

  // LIVE RESULT
  db.collection("votes").onSnapshot(snapshot => {

    let support = 0;
    let against = 0;

    snapshot.forEach(doc => {
      const d = doc.data();

      if (d.choice === "onoe_support") support++;
      if (d.choice === "onoe_against") against++;
    });

    document.getElementById("onoeSupport").innerText = support;
    document.getElementById("onoeAgainst").innerText = against;
  });
</script>

</body>
</html>
