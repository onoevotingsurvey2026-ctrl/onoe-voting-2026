<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Indian Vote - Firebase Live System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
}

header{
    background:#111;
    color:white;
    padding:20px;
}

header h1{margin:0;}
header h2{color:#ffc107;}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.support{background:#28a745;color:white;}
.neutral{background:#ffc107;color:black;}
.oppose{background:#dc3545;color:white;}

.result-box{
    font-size:24px;
    font-weight:bold;
}

canvas{
    background:white;
    border-radius:10px;
    padding:10px;
    width:450px !important;
    height:450px !important;
}

</style>
</head>

<body>

<header>
<h1>🗳️ Global Indian Vote</h1>
<h2>Firebase Real-Time Voting System</h2>
</header>

<div class="container">

<div class="card">

<h2>👤 Login</h2>
<p id="userInfo">Not Logged In</p>
<button onclick="loginUser()">Login Gmail</button>

</div>

<div class="card">

<h2>🗳️ Vote</h2>

<button class="support" onclick="vote('support')">Support</button>
<button class="neutral" onclick="vote('neutral')">Neutral</button>
<button class="oppose" onclick="vote('oppose')">Oppose</button>

</div>

<div class="card result-box">
📊 Total Votes: <span id="totalVotes">0</span>
</div>

<div class="card">
<canvas id="pieChart"></canvas>
</div>

</div>

<script>

let currentUser = null;

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 👤 LOGIN
function loginUser(){
let email = prompt("Enter Gmail ID");

if(email && email.includes("@gmail.com")){
currentUser = email;
document.getElementById("userInfo").innerText =
"Logged in as: " + email;
}else{
alert("Invalid Gmail");
}
}

// 🗳️ VOTE (FIREBASE SAVE)
function vote(type){

if(!currentUser){
alert("Login required");
return;
}

db.ref("user_votes/" + currentUser).set({
vote: type,
timestamp: firebase.database.ServerValue.TIMESTAMP
});

alert("Vote saved successfully!");
}

// 📊 LIVE DASHBOARD
let votes = {support:0,neutral:0,oppose:0};

const pieChart = new Chart(document.getElementById("pieChart"), {
type:'pie',
data:{
labels:['Support','Neutral','Oppose'],
datasets:[{
data:[0,0,0],
backgroundColor:['#28a745','#ffc107','#dc3545']
}]
}
});

// 🔥 REAL TIME LISTENER
db.ref("user_votes").on("value", (snapshot)=>{

let data = snapshot.val();

let support=0, neutral=0, oppose=0;

for(let user in data){
let v = data[user].vote;

if(v==="support") support++;
else if(v==="neutral") neutral++;
else if(v==="oppose") oppose++;
}

votes = {support,neutral,oppose};

pieChart.data.datasets[0].data = [support,neutral,oppose];
pieChart.update();

document.getElementById("totalVotes").innerText =
support + neutral + oppose;

});

</script>

</body>
</html>
