<!DOCTYPE html>
<html>
<head>
  <title>GLOBAL VOTING SYSTEM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase v8 STABLE -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      font-family:Arial;
      margin:0;
      background:#0b1220;
      color:white;
      text-align:center;
    }

    .box{
      margin:15px;
      padding:20px;
      background:#ffffff10;
      border-radius:10px;
    }

    button{
      padding:12px;
      margin:6px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .login{background:#2196F3;color:white;}
    .logout{background:#444;color:white;}

    #dashboard{
      display:block;
    }
  </style>
</head>

<body>

<h2>🌍 GLOBAL VOTING SYSTEM</h2>

<div class="box">
  <button class="login" onclick="login()">🔐 Login with Google</button>
  <button class="logout" onclick="logout()">Logout</button>

  <p id="status">NOT LOGGED IN</p>
</div>

<!-- DASHBOARD ALWAYS PRESENT (FIXED ISSUE) -->
<div class="box" id="dashboard">
  <h3>🗳 LIVE RESULTS</h3>
  <div id="result">Loading...</div>
</div>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

/* 🔐 LOGIN (STABLE METHOD) */
function login(){
  auth.signInWithRedirect(provider);
}

/* 🔐 LOGOUT */
function logout(){
  auth.signOut();
}

/* 🔐 REDIRECT RESULT HANDLER */
auth.getRedirectResult()
.then(result => {
  if(result.user){
    console.log("LOGIN SUCCESS:", result.user.email);
  }
})
.catch(error => {
  console.log("LOGIN ERROR:", error.code, error.message);
});

/* 🔐 AUTH STATE (MAIN FIX FOR DASHBOARD ISSUE) */
auth.onAuthStateChanged(user => {

  if(user){
    document.getElementById("status").innerText =
      "LOGGED IN: " + user.email;
  } else {
    document.getElementById("status").innerText =
      "NOT LOGGED IN";
  }

});

/* 🔥 LIVE RESULTS (SAFE) */
db.collection("votes").onSnapshot(snapshot => {

  let support = 0;
  let against = 0;

  snapshot.forEach(doc => {
    let v = doc.data().vote;
    if(v === "support") support++;
    if(v === "against") against++;
  });

  document.getElementById("result").innerHTML =
    "👍 SUPPORT: " + support +
    "<br>👎 AGAINST: " + against;

}, error => {
  console.log("FIRESTORE ERROR:", error.message);
});

</script>

</body>
</html>
