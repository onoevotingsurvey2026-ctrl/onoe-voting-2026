<!DOCTYPE html>
<html>
<head>
  <title>ONOE Voting 2026</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle,#0f172a,#020617);
      color: white;
    }

    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      border-radius: 16px;
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .title {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
    }

    button {
      width: 48%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .support { background: #22c55e; color: white; }
    .against { background: #ef4444; color: white; }

    .submit {
      width: 100%;
      background: #3b82f6;
      color: white;
      margin-top: 10px;
    }

    .count {
      font-size: 20px;
      color: #38bdf8;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="title">🗳️ ONOE Public Voting Dashboard</div>

<div class="glass">

  <p>
    👍 Support: <span id="support">0</span><br>
    👎 Against: <span id="against">0</span><br>
    🧮 Total: <span id="total">0</span>
  </p>

  <hr style="opacity:0.2">

  <button class="support" onclick="selectVote('support')">👍 SUPPORT</button>
  <button class="against" onclick="selectVote('against')">👎 AGAINST</button>

  <button id="submitBtn" class="submit" disabled onclick="submitVote()">
    SUBMIT VOTE
  </button>

  <canvas id="chart"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "votes", "total");

let selected = null;

/* INIT */
async function init(){
  const snap = await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref,{support:0,against:0});
  }
}
init();

/* LIVE DATA */
onSnapshot(ref,(snap)=>{
  const d = snap.data() || {};

  document.getElementById("support").innerText = d.support || 0;
  document.getElementById("against").innerText = d.against || 0;
  document.getElementById("total").innerText =
    (d.support||0)+(d.against||0);

  chart.data.datasets[0].data = [
    d.support||0,
    d.against||0
  ];
  chart.update();
});

/* CHART */
const ctx = document.getElementById("chart");

let chart = new Chart(ctx,{
  type:"doughnut",
  data:{
    labels:["Support","Against"],
    datasets:[{
      data:[0,0],
      backgroundColor:["#22c55e","#ef4444"]
    }]
  }
});

/* SELECT */
window.selectVote = function(type){
  selected = type;
  document.getElementById("submitBtn").disabled = false;
};

/* DEVICE LOCK */
function isVoted(){
  return localStorage.getItem("voted") === "true";
}

/* SUBMIT */
window.submitVote = async function(){

  if(isVoted()){
    alert("⚠️ You already voted on this device");
    return;
  }

  if(!selected){
    alert("Select SUPPORT or AGAINST");
    return;
  }

  const snap = await getDoc(ref);
  const d = snap.data();

  if(selected === "support"){
    await updateDoc(ref,{support:(d.support||0)+1});
  }else{
    await updateDoc(ref,{against:(d.against||0)+1});
  }

  localStorage.setItem("voted","true");

  alert("✅ Vote submitted successfully");

  document.getElementById("submitBtn").disabled = true;
};

</script>

</body>
</html>
