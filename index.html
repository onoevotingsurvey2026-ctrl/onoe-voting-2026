<!DOCTYPE html>
<html>
<head>
  <title>ONOE Glass Voting Dashboard 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle,#0f172a,#020617);
      color: white;
    }

    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      border-radius: 16px;
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .title {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
    }

    button {
      padding: 12px;
      margin: 8px 5px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { transform: scale(1.05); }

    .support { background:#22c55e; color:white; width:45%; }
    .against { background:#ef4444; color:white; width:45%; }
    .submit { background:#facc15; color:black; width:95%; }

    .count {
      font-size: 20px;
      color: #38bdf8;
      font-weight: bold;
    }

    .status {
      text-align:center;
      color:#94a3b8;
      font-size:14px;
    }

    canvas {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="title">🗳️ ONOE Ultra Secure Glass Voting Dashboard</div>

<div class="glass">

  <p class="status" id="status">Checking device status...</p>

  <hr style="opacity:0.2">

  <p>👍 Support: <span class="count" id="support">0</span></p>
  <p>👎 Against: <span class="count" id="against">0</span></p>
  <p>🧮 Total: <span class="count" id="total">0</span></p>

  <hr style="opacity:0.2">

  <!-- SELECTION -->
  <button class="support" onclick="selectVote('support')">👍 SUPPORT</button>
  <button class="against" onclick="selectVote('against')">👎 AGAINST</button>

  <button class="submit" onclick="submitVote()">✅ SUBMIT VOTE</button>

  <canvas id="chart"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "votes", "total");

let selectedVote = null;

/* DEVICE LOCK SYSTEM */
const deviceKey = "voted_onoe_2026";

/* INIT */
async function init(){
  const snap = await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref,{support:0,against:0});
  }

  checkDevice();
}
init();

/* DEVICE CHECK */
function checkDevice(){
  const status = document.getElementById("status");

  if(localStorage.getItem(deviceKey)){
    status.innerText = "⚠️ This device already voted";
    status.style.color = "#ef4444";
  } else {
    status.innerText = "✅ You can vote now";
    status.style.color = "#22c55e";
  }
}

/* LIVE DATA */
onSnapshot(ref,(snap)=>{
  const d = snap.data() || {};

  document.getElementById("support").innerText = d.support || 0;
  document.getElementById("against").innerText = d.against || 0;
  document.getElementById("total").innerText =
    (d.support||0)+(d.against||0);

  chart.data.datasets[0].data = [
    d.support||0,
    d.against||0
  ];
  chart.update();
});

/* CHART */
const ctx = document.getElementById("chart");
const chart = new Chart(ctx,{
  type:"doughnut",
  data:{
    labels:["Support","Against"],
    datasets:[{
      data:[0,0],
      backgroundColor:["#22c55e","#ef4444"]
    }]
  }
});

/* SELECT VOTE */
window.selectVote = function(type){
  selectedVote = type;
  alert("Selected: " + type.toUpperCase());
};

/* SUBMIT VOTE */
window.submitVote = async function(){

  if(localStorage.getItem(deviceKey)){
    alert("⚠️ You already voted on this device!");
    return;
  }

  if(!selectedVote){
    alert("⚠️ Please select SUPPORT or AGAINST!");
    return;
  }

  const snap = await getDoc(ref);
  const d = snap.data();

  if(selectedVote === "support"){
    await updateDoc(ref,{support:(d.support||0)+1});
  } else {
    await updateDoc(ref,{against:(d.against||0)+1});
  }

  localStorage.setItem(deviceKey,"true");

  alert("✅ Vote submitted successfully!");

  checkDevice();
};

</script>

</body>
</html>
