<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Government Civic Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

/* HEADER */
header{
  background:#111c33;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

/* STATUS BAR */
.status{
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:#0f1a30;
  font-size:14px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:#18243f;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* BUTTON */
button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#2563eb;
  color:white;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  background:#111c33;
  font-size:12px;
  margin-top:20px;
}

@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<header>
🏛️ Government Civic Voting & Analytics Platform
</header>

<div class="status">
  <div>🗳️ Total Votes: 120</div>
  <div>📍 Districts: 12</div>
  <div>🔴 LIVE</div>
</div>

<div class="grid">

  <!-- VOTING -->
  <div class="card">
    <h3>🗳️ Voting Panel</h3>
    <button>Vote A</button>
    <button>Vote B</button>
    <button>Vote C</button>
  </div>

  <!-- RESULTS -->
  <div class="card">
    <h3>📊 Live Results</h3>
    <canvas id="pie"></canvas>
  </div>

  <!-- GIS -->
  <div class="card">
    <h3>🗺️ GIS Map</h3>
    <p>Satellite + District View Placeholder</p>
  </div>

  <!-- ANALYTICS -->
  <div class="card">
    <h3>📈 Analytics</h3>
    <canvas id="bar"></canvas>
  </div>

</div>

<!-- ADMIN -->
<div class="card" style="margin:15px;">
  <h3>🔐 Admin Panel</h3>
  <button style="background:red;">Reset Data</button>
  <button>Download Report</button>
</div>

<footer>
AI-powered Civic Data & Public Opinion Analytics Platform
</footer>

<script>

// PIE CHART
new Chart(document.getElementById("pie"),{
  type:"pie",
  data:{
    labels:["A","B","C"],
    datasets:[{
      data:[40,35,25]
    }]
  }
});

// BAR CHART
new Chart(document.getElementById("bar"),{
  type:"bar",
  data:{
    labels:["Chennai","Madurai","Coimbatore"],
    datasets:[{
      data:[120,90,60]
    }]
  }
});

</script>

</body>
</html>
