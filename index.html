<!DOCTYPE html>
<html>
<head>
  <title>Global Voting Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      text-align:center;
      margin:0;
      background:#f4f6f9;
    }

    header{
      background:#002b5c;
      color:white;
      padding:15px;
      font-size:18px;
    }

    button{
      padding:10px;
      margin:8px;
      width:80%;
      border:none;
      border-radius:6px;
      font-size:16px;
    }

    .login{
      background:#ff9800;
      color:white;
    }

    .a{background:#4CAF50;color:white;}
    .b{background:#f44336;color:white;}
    .c{background:#2196F3;color:white;}

    .box{
      background:white;
      margin:15px;
      padding:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<header>
  GLOBAL VOTING NETWORK<br>
  🇮🇳 INDIA PUBLIC OPINION DASHBOARD
</header>

<div class="box">
  <h3>Login to Vote</h3>
  <button class="login" onclick="login()">🔐 Google Login</button>
  <p id="user"></p>
</div>

<div class="box">
  <h3>Vote (A / B / C)</h3>

  <button class="a" onclick="vote('A')">🟢 Candidate A - Support</button>
  <button class="b" onclick="vote('B')">🔴 Candidate B - Oppose</button>
  <button class="c" onclick="vote('C')">🔵 Candidate C - Mixed</button>

  <p id="status"></p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // 🔥 YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
    authDomain: "onoevote2026.firebaseapp.com",
    databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "onoevote2026",
    storageBucket: "onoevote2026.firebasestorage.app",
    messagingSenderId: "181065724520",
    appId: "1:181065724520:web:f72a93869786373c1101dd"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.database();

  let currentUser = null;

  // 🔐 LOGIN
  function login(){
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
    .then(result => {
      currentUser = result.user;
      document.getElementById("user").innerText =
        "Logged in as: " + currentUser.email;
    })
    .catch(err => {
      alert(err.message);
    });
  }

  // 🗳️ VOTE FUNCTION
  function vote(choice){

    if(!currentUser){
      alert("Please login first!");
      return;
    }

    db.ref("votes/" + currentUser.uid).set({
      email: currentUser.email,
      vote: choice
    });

    document.getElementById("status").innerText =
      "Vote submitted: " + choice;
  }

</script>

</body>
</html>
