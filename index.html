<!DOCTYPE html>
<html>
<head>
  <title>Live Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#f4f6f9;
    }

    .box{
      background:white;
      margin:15px;
      padding:15px;
      border-radius:10px;
    }

    canvas{
      max-width:100%;
    }
  </style>
</head>

<body>

<h2>📊 LIVE VOTING DASHBOARD</h2>

<div class="box">
  <canvas id="pieChart"></canvas>
</div>

<div class="box">
  <canvas id="barChart"></canvas>
</div>

<script>
  // 🔥 Firebase Config (same as your project)
  const firebaseConfig = {
    apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
    authDomain: "onoevote2026.firebaseapp.com",
    databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "onoevote2026",
    storageBucket: "onoevote2026.firebasestorage.app",
    messagingSenderId: "181065724520",
    appId: "1:181065724520:web:f72a93869786373c1101dd"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let pieChart, barChart;

  function updateCharts(a,b,c){

    // PIE
    pieChart.data.datasets[0].data = [a,b,c];
    pieChart.update();

    // BAR
    barChart.data.datasets[0].data = [a,b,c];
    barChart.update();
  }

  function loadVotes(){

    db.ref("votes").on("value", snapshot => {

      let data = snapshot.val();

      let a=0,b=0,c=0;

      for(let key in data){
        if(data[key].vote=="A") a++;
        if(data[key].vote=="B") b++;
        if(data[key].vote=="C") c++;
      }

      updateCharts(a,b,c);
    });
  }

  window.onload = function(){

    pieChart = new Chart(document.getElementById("pieChart"), {
      type: "pie",
      data: {
        labels: ["A - Support", "B - Oppose", "C - Mixed"],
        datasets: [{
          data: [0,0,0],
          backgroundColor: ["green","red","blue"]
        }]
      }
    });

    barChart = new Chart(document.getElementById("barChart"), {
      type: "bar",
      data: {
        labels: ["A","B","C"],
        datasets: [{
          label: "Votes",
          data: [0,0,0],
          backgroundColor: ["green","red","blue"]
        }]
      }
    });

    loadVotes();
  }

</script>

</body>
</html>
