<!DOCTYPE html>
<html>
<head>
  <title>Admin Control Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#111;
      color:white;
    }

    .box{
      margin:15px;
      padding:15px;
      background:#222;
      border-radius:10px;
    }

    button{
      padding:10px;
      margin:10px;
      width:80%;
      border:none;
      border-radius:8px;
      font-size:16px;
    }

    .open{background:green;color:white;}
    .close{background:red;color:white;}
    .reset{background:orange;color:black;}
  </style>
</head>

<body>

<h2>👨‍💼 ADMIN CONTROL ROOM</h2>

<div class="box">
  <h3>🗳️ Voting Control</h3>

  <button class="open" onclick="setStatus('open')">OPEN VOTING</button>
  <button class="close" onclick="setStatus('close')">CLOSE VOTING</button>
  <button class="reset" onclick="resetVotes()">RESET SYSTEM</button>
</div>

<div class="box">
  <h3>📊 Live Status</h3>
  <p id="status">Loading...</p>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
    authDomain: "onoevote2026.firebaseapp.com",
    databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "onoevote2026",
    storageBucket: "onoevote2026.firebasestorage.app",
    messagingSenderId: "181065724520",
    appId: "1:181065724520:web:f72a93869786373c1101dd"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function setStatus(state){
    db.ref("system/status").set(state);
    alert("System set to: " + state);
  }

  function resetVotes(){
    db.ref("votes").remove();
    alert("All votes reset!");
  }

  function monitor(){
    db.ref("system/status").on("value", snap=>{
      document.getElementById("status").innerText =
        "Voting Status: " + snap.val();
    });
  }

  monitor();
</script>

</body>
</html>
