<!DOCTYPE html>
<html>
<head>
  <title>Global Voting System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#1e3c72,#2a5298);
      color:white;
      text-align:center;
    }

    #ticker{
      background:black;
      padding:10px;
      white-space:nowrap;
      overflow:hidden;
      font-size:14px;
    }

    .box{
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.3);
      margin:15px;
      padding:20px;
      border-radius:15px;
    }

    button{
      padding:10px 15px;
      margin:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .support{background:green;color:white;}
    .against{background:red;color:white;}

    #toast{
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:#222;
      padding:10px 20px;
      border-radius:8px;
      display:none;
    }
  </style>
</head>

<body>

<div id="ticker">
🔥 LIVE: Global Voting System Active | One Gmail One Vote Secure Firebase System
</div>

<div class="box">
  <h2>GLOBAL VOTING DASHBOARD</h2>

  <button onclick="login()">Login with Google</button>
  <button onclick="logout()">Logout</button>

  <p id="user">Please login with Google</p>

  <hr>

  <h3>SELECT YOUR VOTE</h3>

  <button class="support" onclick="selectVote('support')">👍 SUPPORT</button>
  <button class="against" onclick="selectVote('against')">👎 AGAINST</button>

  <br><br>

  <button onclick="submitVote()">SUBMIT VOTE</button>
</div>

<div class="box">
  <h3>LIVE RESULTS</h3>
  <div id="dashboard">Loading...</div>
</div>

<div id="toast"></div>

<script>
/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let selectedVote = null;

/* 🔐 GOOGLE LOGIN (MOBILE SAFE) */
const provider = new firebase.auth.GoogleAuthProvider();

function login(){
  auth.signInWithRedirect(provider);
}

/* 🔁 HANDLE REDIRECT RESULT */
auth.getRedirectResult().catch(console.error);

/* 👤 AUTH STATE */
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;
    document.getElementById("user").innerText =
      "Logged in: " + user.email;

    listenLive();
  } else {
    currentUser = null;
    document.getElementById("user").innerText =
      "Please login with Google";
  }
});

/* 🚪 LOGOUT */
function logout(){
  auth.signOut().then(()=>{
    showToast("Logged out successfully");
  });
}

/* 🗳 SELECT VOTE */
function selectVote(v){
  selectedVote = v;
  showToast("Selected: " + v);
}

/* 📤 SUBMIT VOTE */
function submitVote(){

  if(!currentUser){
    alert("Please login first");
    return;
  }

  if(!selectedVote){
    alert("Select vote first");
    return;
  }

  const ref = db.collection("votes").doc(currentUser.email);

  ref.get().then(doc=>{
    if(doc.exists){
      showToast("❌ You already voted");
      return;
    }

    ref.set({
      vote: selectedVote,
      sessionId: "2026-election",
      time: new Date()
    });

    showToast("🎉 VOTE SUCCESSFULLY RECORDED");
  });
}

/* 📊 LIVE DASHBOARD */
function listenLive(){

  db.collection("votes").onSnapshot(snapshot=>{

    let support = 0;
    let against = 0;

    snapshot.forEach(doc=>{
      let v = doc.data().vote;
      if(v==="support") support++;
      if(v==="against") against++;
    });

    document.getElementById("dashboard").innerHTML =
      "👍 SUPPORT: "+support+"<br>👎 AGAINST: "+against;
  });
}

/* 📱 TOAST */
function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";

  setTimeout(()=>t.style.display="none",3000);
}
</script>

</body>
</html>
