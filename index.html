<!DOCTYPE html>
<html>
<head>
  <title>ONOE vs Delimitation Public Opinion Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; margin:0; background:#0f172a; color:white; }

    header {
      text-align:center;
      padding:15px;
      background:#111827;
    }

    .live { color:#ff4d4d; font-weight:bold; }

    .top {
      display:flex;
      justify-content:space-between;
      padding:10px 20px;
      background:#1e293b;
    }

    .container { text-align:center; margin-top:20px; }

    button {
      margin:10px;
      padding:12px;
      width:220px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
    }

    .onoe { background:#2563eb; color:white; }
    .delim { background:#16a34a; color:white; }
    .comb { background:#7c3aed; color:white; }

    .chartbox { width:80%; margin:auto; margin-top:20px; }

    #login { text-align:center; margin-top:80px; }

    .disabled { opacity:0.5; pointer-events:none; }
  </style>
</head>

<body>

<header>
🗳️ ONOE vs Delimitation Public Opinion Dashboard <br>
<span class="live">🔴 LIVE SYSTEM</span>
</header>

<div class="top">
  <div id="user">Guest</div>
  <button onclick="login()">Google Login</button>
</div>

<div id="login">
  <h3>Login to Vote</h3>
</div>

<div id="dashboard" class="container" style="display:none">

  <h3>Vote Options</h3>

  <button class="onoe" onclick="vote('onoe')">ONOE</button>
  <button class="delim" onclick="vote('delimitation')">Delimitation</button>
  <button class="comb" onclick="vote('combined')">Combined</button>

  <p id="status"></p>
  <p id="time"></p>

  <div class="chartbox">
    <canvas id="bar"></canvas>
  </div>

  <div class="chartbox">
    <canvas id="pie"></canvas>
  </div>

</div>

<script>
  // 🔥 Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();

  let user = null;

  auth.onAuthStateChanged(u => {
    if(u){
      user = u;
      document.getElementById("login").style.display="none";
      document.getElementById("dashboard").style.display="block";
      document.getElementById("user").innerText = u.email;
    }
  });

  function login(){
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  }

  function vote(type){

    if(!user) return;

    const ref = db.collection("votes").doc("india");

    db.runTransaction(async t => {
      const doc = await t.get(ref);

      let d = doc.data() || {onoe:0,delimitation:0,combined:0};
      d[type] = (d[type]||0) + 1;

      t.set(ref,d);
    });

    document.getElementById("status").innerText="✔ Vote Recorded";
  }

  let bar, pie;

  db.collection("votes").doc("india")
  .onSnapshot(doc => {

    let d = doc.data() || {onoe:0,delimitation:0,combined:0};

    update(d);

    document.getElementById("time").innerText =
    "⏱ " + new Date().toLocaleTimeString();
  });

  function update(d){

    let labels=["ONOE","Delim","Combined"];
    let vals=[d.onoe,d.delimitation,d.combined];

    if(bar) bar.destroy();
    bar = new Chart(document.getElementById("bar"),{
      type:"bar",
      data:{labels,datasets:[{data:vals}]},
      options:{animation:{duration:800}}
    });

    if(pie) pie.destroy();
    pie = new Chart(document.getElementById("pie"),{
      type:"pie",
      data:{labels,datasets:[{data:vals}]}
    });
  }

</script>

</body>
</html>
