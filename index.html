<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Entry Gate Login +91</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

.box{
  width:320px;
  margin:100px auto;
  background:#18243f;
  padding:20px;
  border-radius:12px;
}

input,button{
  width:90%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.phone-wrap{
  display:flex;
  justify-content:center;
}

.prefix{
  padding:10px;
  background:#111c33;
  border-radius:6px 0 0 6px;
}

.phone{
  width:70%;
  border-radius:0 6px 6px 0;
}
</style>
</head>

<body>

<div class="box" id="loginBox">

<h2>🔐 Entry Gate Login</h2>

<!-- +91 FIXED -->
<div class="phone-wrap">
  <div class="prefix">+91</div>
  <input class="phone" id="phone" placeholder="Mobile Number">
</div>

<button onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">

<!-- ONLY SUBMIT -->
<button onclick="verifyOTP()">SUBMIT</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;margin-top:120px;">
<h2>🏛️ Login Success</h2>
<p>Welcome to Civic Dashboard</p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let confirmationResult;

/* CAPTCHA */
window.recaptchaVerifier = new RecaptchaVerifier(auth,"recaptcha-container",{
size:"normal"
});

/* SEND OTP */
window.sendOTP = () => {

const phoneNumber = "+91" + document.getElementById("phone").value;

signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
.then((result)=>{
confirmationResult = result;
alert("OTP Sent ✔");
})
.catch(()=>{
alert("OTP Error");
});

};

/* VERIFY OTP */
window.verifyOTP = () => {

const code = document.getElementById("otp").value;

confirmationResult.confirm(code)
.then((user)=>{

alert("Login Success ✔");

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

})
.catch(()=>{
alert("Invalid OTP");
});

};

</script>

</body>
</html>
