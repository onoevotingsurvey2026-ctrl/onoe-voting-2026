<!DOCTYPE html>
<html>
<head>
  <title>ONOE Voting 2026</title>
</head>

<body style="text-align:center;font-family:Arial">

<h2>🗳️ ONOE & Delimitation Public Voting Survey 2026</h2>

<p id="result">Loading votes...</p>

<button onclick="vote('support')">👍 Support</button>
<button onclick="vote('against')">👎 Against</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase Config (PUT YOUR REAL VALUES)
const firebaseConfig = {
  apiKey: "REAL_API_KEY",
  authDomain: "REAL_AUTH_DOMAIN",
  projectId: "onoevote2026",
  storageBucket: "REAL_STORAGE_BUCKET",
  messagingSenderId: "REAL_SENDER_ID",
  appId: "REAL_APP_ID"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "votes", "total");

// create if not exists
const snap = await getDoc(ref);
if (!snap.exists()) {
  await setDoc(ref, { support: 0, against: 0 });
}

// live update
onSnapshot(ref, (docSnap) => {
  if (!docSnap.exists()) return;

  const d = docSnap.data();

  document.getElementById("result").innerHTML =
    "👍 Support: " + (d.support ?? 0) +
    " | 👎 Against: " + (d.against ?? 0) +
    " | Total: " + ((d.support ?? 0) + (d.against ?? 0));
});  document.getElementById("result").innerHTML =
  "👍 Support: " + d.support +
  " | 👎 Against: " + d.against +
  " | Total: " + (d.support + d.against);
});

// voting
window.vote = async function(type) {
  const snap = await getDoc(ref);
  const d = snap.data();

  if (type === "support") {
    await updateDoc(ref, { support: d.support + 1 });
  } else {
    await updateDoc(ref, { against: d.against + 1 });
  }
};

</script>

</body>
</html>
