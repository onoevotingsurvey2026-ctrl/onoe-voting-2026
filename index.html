<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Voting Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
    text-align:center;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    color:#222;
}

.vote-box{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.support{
    background:#28a745;
    color:white;
}

.neutral{
    background:#ffc107;
    color:black;
}

.oppose{
    background:#dc3545;
    color:white;
}

.reset{
    background:#000;
    color:white;
}

.chart-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

canvas{
    background:white;
    padding:10px;
    border-radius:10px;
    width:400px !important;
    height:400px !important;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.result-box{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
    font-size:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.live{
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🗳️ LIVE Voting Dashboard</h1>

<p class="live">
🔴 LIVE Results Updating Automatically
</p>

<div class="vote-box">

<h2>Select Your Opinion</h2>

<button class="support" onclick="vote('support')">
✅ Support
</button>

<button class="neutral" onclick="vote('neutral')">
⚖️ Neutral
</button>

<button class="oppose" onclick="vote('oppose')">
❌ Oppose
</button>

<br><br>

<button class="reset" onclick="resetVotes()">
🔄 Reset Results
</button>

</div>

<div class="result-box">
Total Votes:
<span id="totalVotes">0</span>
</div>

<div class="chart-container">

<canvas id="pieChart"></canvas>

<canvas id="barChart"></canvas>

</div>

</div>

<script>

// RESET PASSWORD
const RESET_PASSWORD = "admin123";

// VOTE STORAGE
let votes = {
    support: 0,
    neutral: 0,
    oppose: 0
};

// LOAD SAVED VOTES
if(localStorage.getItem("liveVotes")){

    votes = JSON.parse(
        localStorage.getItem("liveVotes")
    );
}

// PIE CHART
const pieCtx =
document.getElementById('pieChart');

const pieChart = new Chart(pieCtx, {

    type: 'pie',

    data: {

        labels: [
            'Support',
            'Neutral',
            'Oppose'
        ],

        datasets: [{

            data: [
                votes.support,
                votes.neutral,
                votes.oppose
            ],

            backgroundColor: [
                '#28a745',
                '#ffc107',
                '#dc3545'
            ]
        }]
    }
});

// BAR CHART
const barCtx =
document.getElementById('barChart');

const barChart = new Chart(barCtx, {

    type: 'bar',

    data: {

        labels: [
            'Support',
            'Neutral',
            'Oppose'
        ],

        datasets: [{

            label: 'Votes',

            data: [
                votes.support,
                votes.neutral,
                votes.oppose
            ],

            backgroundColor: [
                '#28a745',
                '#ffc107',
                '#dc3545'
            ]
        }]
    },

    options: {

        responsive:true,

        scales:{
            y:{
                beginAtZero:true
            }
        }
    }
});

// VOTE FUNCTION
function vote(type){

    votes[type]++;

    saveVotes();

    updateCharts();
}

// UPDATE CHARTS
function updateCharts(){

    // PIE CHART UPDATE
    pieChart.data.datasets[0].data = [
        votes.support,
        votes.neutral,
        votes.oppose
    ];

    pieChart.update();

    // BAR CHART UPDATE
    barChart.data.datasets[0].data = [
        votes.support,
        votes.neutral,
        votes.oppose
    ];

    barChart.update();

    // TOTAL VOTES
    document.getElementById("totalVotes").innerText =

        votes.support +
        votes.neutral +
        votes.oppose;
}

// SAVE VOTES
function saveVotes(){

    localStorage.setItem(
        "liveVotes",
        JSON.stringify(votes)
    );
}

<!-- RESET PASSWORD PROTECTION -->

const RESET_PASSWORD = "admin123";

function resetVotes(){

    let enteredPassword = prompt("Enter Admin Password");

    if(enteredPassword === RESET_PASSWORD){

        votes = {
            support:0,
            neutral:0,
            oppose:0
        };

        saveVotes();

        updateCharts();

        alert("✅ Live Results Reset Successfully");

    } else {

        alert("❌ Wrong Password");

    }
}

// INITIAL LOAD
updateCharts();

</script>

</body>
</html>
