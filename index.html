<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Voting Dashboard UI</title>

<style>

/* 🌌 BACKGROUND */
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #000);
  color: white;
}

/* 📺 HEADER */
.header {
  text-align: center;
  padding: 12px;
  font-weight: bold;
  color: #00ffcc;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* 📰 TICKER */
.ticker {
  overflow: hidden;
  white-space: nowrap;
  background: rgba(255,255,255,0.05);
  padding: 8px;
}

.ticker-text {
  display: inline-block;
  animation: move 12s linear infinite;
  color: #ffcc00;
}

@keyframes move {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

/* 📦 MAIN GRID */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 15px;
}

/* 🟦 ONOE CARD */
.card-onoe {
  background: rgba(0,150,255,0.1);
  border: 1px solid rgba(0,150,255,0.3);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  padding: 15px;
  margin: 10px;
  width: 300px;
  text-align: center;
}

/* 🟨 DEL CARD */
.card-del {
  background: rgba(255,200,0,0.1);
  border: 1px solid rgba(255,200,0,0.3);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  padding: 15px;
  margin: 10px;
  width: 300px;
  text-align: center;
}

/* 🔢 NUMBERS */
.value {
  font-size: 28px;
  font-weight: bold;
  margin: 10px 0;
  color: #00ffcc;
}

/* 🔘 BUTTONS */
button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  color: white;
}

button:hover {
  background: rgba(0,255,204,0.2);
}

/* 📱 MOBILE */
@media(max-width:768px){
  .card-onoe, .card-del {
    width: 90%;
  }
}

</style>
</head>

<body>

<div class="header">
📺 LIVE TV VOTING DASHBOARD • INDIA PUBLIC SURVEY 🔴
</div>

<div class="ticker">
  <div class="ticker-text">
    📢 ONOE LIVE VOTING • 🌍 INDIA SURVEY ACTIVE • 🗳️ DELIMITATION DEBATE RUNNING • 📊 REAL TIME ANALYTICS
  </div>
</div>

<div class="container">

<!-- 🟦 ONOE -->
<div class="card-onoe">
  <h3>ONOE SECTION</h3>
  <div class="value">Support: 0</div>
  <div class="value">Against: 0</div>

  <button>👇 Support</button>
  <button>👇 Against</button>
</div>

<!-- 🟨 DEL -->
<div class="card-del">
  <h3>DELIMITATION SECTION</h3>
  <div class="value">Support: 0</div>
  <div class="value">Against: 0</div>

  <button>👇 Support</button>
  <button>👇 Against</button>
</div>

</div>

</body>
</html>
