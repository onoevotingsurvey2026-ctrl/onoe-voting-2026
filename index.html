<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Indian Vote 2026</title>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<!-- CHART JS -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#081229;
color:white;
padding:20px;
}

.main-title{
text-align:center;
margin-bottom:30px;
}

.panel,
.section{
background:#132046;
padding:25px;
border-radius:20px;
margin-top:20px;
}

input,
select,
button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
font-size:15px;
}

button{
cursor:pointer;
color:white;
background:#2f6df6;
}

button:hover{
opacity:0.9;
}

.vote-buttons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.support-btn{
background:#00a651;
}

.neutral-btn{
background:#777;
}

.oppose-btn{
background:#d62828;
}

.admin-btn{
background:#8e44ad;
}

.reset-btn{
background:red;
}

.download-btn{
background:#2f6df6;
}

.logout-btn{
background:#444;
}

#dashboard{
display:none;
}

#adminControls{
display:none;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th,
table td{
border:1px solid #555;
padding:10px;
text-align:center;
}

canvas{
background:white;
border-radius:15px;
padding:10px;
}

@media(max-width:768px){

.main-title{
font-size:24px;
}

}

</style>

</head>

<body>

<h1 class="main-title">
🏛 Global Indian Vote 2026
</h1>

<!-- MOBILE LOGIN -->

<div class="panel">

<h2>📱 Mobile Login</h2>

<input type="tel"
id="mobile"
placeholder="Enter Mobile Number"
maxlength="10">

<label style="display:block;margin-top:15px;">
CAPTCHA : 7 + 4 = ?
</label>

<input type="number"
id="captcha"
placeholder="Enter 11">

<button onclick="sendOTP()">
Send OTP
</button>

<div id="otpSection"
style="display:none;">

<input type="number"
id="otp"
placeholder="Enter OTP">

<button onclick="verifyOTP()">
Verify OTP
</button>

</div>

<div id="recaptcha-container"></div>

</div>

<!-- ADMIN LOGIN -->

<div class="panel">

<h2>🔐 Admin Login</h2>

<input type="text"
id="adminMobile"
placeholder="Admin Mobile">

<input type="password"
id="adminPassword"
placeholder="Admin Password">

<button class="admin-btn"
onclick="adminLogin()">
Admin Login
</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<!-- VOTING -->

<div class="section">

<h2>🗳 Voting Panel</h2>

<input type="text"
id="voterName"
placeholder="Enter Voter Name">

<select id="country">

<option>India</option>
<option>USA</option>
<option>United Kingdom</option>
<option>UAE</option>
<option>Japan</option>

</select>

<select id="region">

<option>North Tamil Nadu</option>
<option>South Tamil Nadu</option>
<option>West India Region</option>
<option>East USA</option>
<option>Dubai Region</option>
<option>Tokyo Region</option>

</select>

<div class="vote-buttons">

<button id="supportBtn"
class="support-btn"
onclick="vote('Support')">
✅ Support
</button>

<button id="neutralBtn"
class="neutral-btn"
onclick="vote('Neutral')">
⚪ Neutral
</button>

<button id="opposeBtn"
class="oppose-btn"
onclick="vote('Oppose')">
❌ Oppose
</button>

</div>

</div>

<!-- ADMIN PANEL -->

<div class="section"
id="adminControls">

<h2>🔐 Admin Panel</h2>

<button class="reset-btn"
onclick="resetData()">
Reset Data
</button>

<button class="download-btn"
onclick="downloadReport()">
Download Report
</button>

<button class="logout-btn"
onclick="adminLogout()">
Logout
</button>

<h2 style="margin-top:30px;">
📋 Vote Records
</h2>

<table id="recordsTable">

<tr>
<th>Name</th>
<th>Mobile</th>
<th>Vote</th>
<th>Region</th>
</tr>

</table>

</div>

<!-- LIVE RESULTS -->

<div class="section">

<h2>📊 Live Results</h2>

<canvas id="pieChart"></canvas>

</div>

<!-- ANALYTICS -->

<div class="section">

<h2>📈 Analytics</h2>

<canvas id="barChart"></canvas>

</div>

</div>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",

authDomain: "onoevote2026.firebaseapp.com",

projectId: "onoevote2026",

storageBucket: "onoevote2026.appspot.com",

messagingSenderId: "181065724520",

appId: "1:181065724520:web:f72a93869786373c1101dd"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* VARIABLES */

let confirmationResult;

let adminMode = false;

let votes = {

support:40,
neutral:35,
oppose:25

};

/* REAL FIREBASE OTP */

function sendOTP(){

const mobile =
document.getElementById("mobile").value;

const captcha =
document.getElementById("captcha").value;

if(mobile.length !== 10){

alert("Enter valid mobile number");
return;

}

if(captcha != "11"){

alert("Captcha incorrect");
return;

}

window.recaptchaVerifier =
new firebase.auth.RecaptchaVerifier(
'recaptcha-container',
{
size:'invisible'
}
);

const phoneNumber = "+91" + mobile;

firebase.auth()
.signInWithPhoneNumber(
phoneNumber,
window.recaptchaVerifier
)

.then((result)=>{

confirmationResult = result;

alert("✅ Real OTP Sent");

document.getElementById("otpSection")
.style.display = "block";

})

.catch((error)=>{

alert(error.message);

console.log(error);

});

}

/* VERIFY OTP */

function verifyOTP(){

const otp =
document.getElementById("otp").value;

confirmationResult.confirm(otp)

.then((result)=>{

alert("✅ Mobile Verification Success");

document.getElementById("dashboard")
.style.display = "block";

window.scrollTo(0,500);

})

.catch((error)=>{

alert("Invalid OTP");

console.log(error);

});

}

/* ADMIN LOGIN */

function adminLogin(){

const mobile =
document.getElementById("adminMobile").value;

const password =
document.getElementById("adminPassword").value;

if(
mobile === "9384695599" &&
password === "globalindianvote2026"
){

adminMode = true;

document.getElementById("dashboard")
.style.display = "block";

document.getElementById("adminControls")
.style.display = "block";

alert("✅ Admin Login Success");

}else{

alert("❌ Invalid Admin Credentials");

}

}

/* FINAL PRODUCTION VOTING */

function vote(type){

const mobile =
document.getElementById("mobile").value;

const voter =
document.getElementById("voterName").value;

const region =
document.getElementById("region").value;

const country =
document.getElementById("country").value;

if(voter.trim() === ""){

alert("Enter voter name");
return;

}

/* DUPLICATE CHECK */

db.collection("votes")
.where("mobile","==",mobile)
.get()

.then((snapshot)=>{

if(!snapshot.empty){

alert(
"⚠ This mobile number has already voted."
);

logoutPublic();

return;

}

/* SAVE VOTE */

db.collection("votes").add({

name: voter,
mobile: mobile,
vote: type,
region: region,
country: country,
time: new Date().toISOString()

});

/* UPDATE COUNTS */

if(type === "Support"){
votes.support++;
}

if(type === "Neutral"){
votes.neutral++;
}

if(type === "Oppose"){
votes.oppose++;
}

updateCharts();

/* UPDATE TABLE */

const table =
document.getElementById("recordsTable");

let row =
table.insertRow();

row.insertCell(0).innerHTML = voter;
row.insertCell(1).innerHTML = mobile;
row.insertCell(2).innerHTML = type;
row.insertCell(3).innerHTML = region;

/* LOCK BUTTONS */

document.getElementById("supportBtn")
.disabled = true;

document.getElementById("neutralBtn")
.disabled = true;

document.getElementById("opposeBtn")
.disabled = true;

alert(
"✅ Vote Submitted Successfully"
);

setTimeout(()=>{

logoutPublic();

},3000);

});

}

/* LOGOUT */

function logoutPublic(){

document.getElementById("mobile").value = "";
document.getElementById("captcha").value = "";
document.getElementById("otp").value = "";
document.getElementById("voterName").value = "";

document.getElementById("otpSection")
.style.display = "none";

document.getElementById("dashboard")
.style.display = "none";

document.getElementById("supportBtn")
.disabled = false;

document.getElementById("neutralBtn")
.disabled = false;

document.getElementById("opposeBtn")
.disabled = false;

}

/* ADMIN LOGOUT */

function adminLogout(){

adminMode = false;

document.getElementById("dashboard")
.style.display = "none";

document.getElementById("adminControls")
.style.display = "none";

}

/* PIE CHART */

const pieChart = new Chart(
document.getElementById("pieChart"),
{
type:'pie',

data:{
labels:[
'Support',
'Neutral',
'Oppose'
],

datasets:[{
data:[40,35,25],

backgroundColor:[
'#00a651',
'#777',
'#d62828'
]
}]
}
});

/* BAR CHART */

const barChart = new Chart(
document.getElementById("barChart"),
{
type:'bar',

data:{
labels:[
'Support',
'Neutral',
'Oppose'
],

datasets:[{
label:'Votes',

data:[40,35,25],

backgroundColor:[
'#00a651',
'#777',
'#d62828'
]
}]
}
});

/* UPDATE CHART */

function updateCharts(){

pieChart.data.datasets[0].data = [

votes.support,
votes.neutral,
votes.oppose

];

pieChart.update();

barChart.data.datasets[0].data = [

votes.support,
votes.neutral,
votes.oppose

];

barChart.update();

}

/* RESET */

function resetData(){

if(!adminMode){

alert("Access Denied");
return;

}

votes = {

support:0,
neutral:0,
oppose:0

};

updateCharts();

alert("✅ Reset Success");

}

/* DOWNLOAD REPORT */

function downloadReport(){

let report = `

Global Indian Vote 2026 Report

Support : ${votes.support}
Neutral : ${votes.neutral}
Oppose : ${votes.oppose}

`;

let blob =
new Blob([report],
{type:"text/plain"});

let a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"vote-report.txt";

a.click();

}

</script>

</body>
</html>
