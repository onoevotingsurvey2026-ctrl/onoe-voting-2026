<!DOCTYPE html>
<html>
<head>
  <title>OTP Login</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

  <style>
    body { font-family: Arial; background:#f4f4f4; text-align:center; }
    .box { margin-top:100px; padding:20px; background:white; width:300px; margin-left:auto; margin-right:auto; border-radius:10px; }
    input { width:90%; padding:10px; margin:10px 0; }
    button { padding:10px 20px; background:green; color:white; border:none; cursor:pointer; }
  </style>
</head>

<body>

<div class="box">
  <h2>Mobile OTP Login</h2>

  <input type="text" id="mobile" placeholder="+91XXXXXXXXXX">
  <button onclick="sendOTP()">Send OTP</button>

  <div id="otpBox" style="display:none;">
    <input type="text" id="otp" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Verify</button>
  </div>

  <div id="recaptcha-container"></div>
</div>

<script>
  // Firebase config (replace your config)
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT",
    appId: "YOUR_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);

  let confirmationResult;

  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
    size: 'invisible'
  });

  function sendOTP() {
    const phoneNumber = document.getElementById("mobile").value;

    firebase.auth().signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier)
      .then((result) => {
        confirmationResult = result;
        document.getElementById("otpBox").style.display = "block";
        alert("OTP Sent!");
      }).catch((error) => {
        alert(error.message);
      });
  }

  function verifyOTP() {
    const code = document.getElementById("otp").value;

    confirmationResult.confirm(code)
      .then((result) => {
        alert("Login Success");

        // 👉 redirect dashboard
        window.location.href = "dashboard.html";
      }).catch((error) => {
        alert("Wrong OTP");
      });
  }
</script>

</body>
</html>
