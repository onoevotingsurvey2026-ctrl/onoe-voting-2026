<!DOCTYPE html>
<html>
<head>
  <title>Global Voting Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0f1a;
      color:white;
      text-align:center;
    }

    /* TV MODE */
    body.tv-mode{
      background:black;
    }

    .header{
      padding:15px;
      background:#111a33;
    }

    .controls button{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .open{background:green;color:white;}
    .close{background:red;color:white;}
    .reset{background:orange;color:black;}
    .tv{background:#333;color:white;}

    .cards{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-top:30px;
    }

    .card{
      background:#1e1e1e;
      padding:25px;
      border-radius:14px;
      min-width:180px;
    }

    .green{color:#00ff7f;}
    .red{color:#ff4d4d;}
    .blue{color:#4da6ff;}

    .num{
      font-size:55px;
      font-weight:bold;
      margin:10px 0;
    }

    .percent{
      color:#aaa;
      font-size:16px;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>📡 GLOBAL VOTING NETWORK</h2>
  <h3>🇮🇳 INDIA PUBLIC OPINION DASHBOARD</h3>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="tv" onclick="toggleTV()">📺 TV MODE</button>
  <button class="open" onclick="setStatus('OPEN')">🟢 OPEN</button>
  <button class="close" onclick="setStatus('CLOSED')">🔴 CLOSE</button>
  <button class="reset" onclick="resetVotes()">♻️ RESET</button>
</div>

<hr>

<h3>📊 LIVE RESULTS</h3>

<div class="cards">

  <div class="card green">
    🟢 A SUPPORT
    <div class="num" id="aCount">0</div>
    <div class="percent" id="aPercent">0.0%</div>
  </div>

  <div class="card red">
    🔴 B OPPOSE
    <div class="num" id="bCount">0</div>
    <div class="percent" id="bPercent">0.0%</div>
  </div>

  <div class="card blue">
    🔵 C MIXED
    <div class="num" id="cCount">0</div>
    <div class="percent" id="cPercent">0.0%</div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* TV MODE */
function toggleTV(){
  document.body.classList.toggle("tv-mode");
}

/* ADMIN */
function setStatus(state){
  db.ref("system/status").set(state);
}

function resetVotes(){
  db.ref("votes").remove();
}

/* LIVE COUNTER (FIXED NO REPEAT ISSUE) */
db.ref("votes").on("value", snap => {

  let data = snap.val() || {};

  let a = 0, b = 0, c = 0;

  Object.values(data).forEach(v => {
    if(v.vote === "A") a++;
    if(v.vote === "B") b++;
    if(v.vote === "C") c++;
  });

  let total = a + b + c || 1;

  document.getElementById("aCount").innerText = a;
  document.getElementById("bCount").innerText = b;
  document.getElementById("cCount").innerText = c;

  document.getElementById("aPercent").innerText = ((a/total)*100).toFixed(1) + "%";
  document.getElementById("bPercent").innerText = ((b/total)*100).toFixed(1) + "%";
  document.getElementById("cPercent").innerText = ((c/total)*100).toFixed(1) + "%";

});
</script>

</body>
</html>
