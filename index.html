<!DOCTYPE html>
<html>
<head>
  <title>Global Election Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; margin:0; }
    .card { background:#111827; padding:15px; margin:10px; border-radius:10px; }
    button { padding:10px; margin:5px; cursor:pointer; }
  </style>
</head>

<body>

<h2 style="text-align:center;">🌍 Global Election Dashboard</h2>

<!-- LOGIN -->
<div class="card">
  <button onclick="login()">Login with Google</button>
  <div id="user"></div>
</div>

<!-- LIVE STATS -->
<div class="card">
  <h3>📊 Live Stats</h3>
  <div id="stats">Loading...</div>
</div>

<!-- VOTING -->
<div class="card">
  <h3>🗳️ Voting Panel</h3>
  <button onclick="vote('onoeSupport')">ONOE +</button>
  <button onclick="vote('onoeAgainst')">ONOE -</button>
  <button onclick="vote('delSupport')">DEL +</button>
  <button onclick="vote('delAgainst')">DEL -</button>
</div>

<!-- AI -->
<div class="card">
  <h3>🤖 AI Prediction</h3>
  <div id="ai">Loading AI...</div>
</div>

<!-- MAP -->
<div class="card">
  <h3>🌍 Global Map</h3>
  <div>Map Module Ready</div>
</div>

<!-- SECURITY -->
<div class="card">
  <h3>🔐 Security Status</h3>
  <div>Active (Geo + Device Protection ON)</div>
</div>

<script>

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

/* ---------------- LOGIN (SAFE) ---------------- */

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
  .catch(() => {
    auth.signInWithRedirect(provider);
  });
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").innerText =
      "Logged in: " + user.email;
  }
});

/* ---------------- SIMPLE VOTE LOCK ---------------- */

function vote(type){

  const user = auth.currentUser;

  if(!user){
    alert("Login required");
    return;
  }

  const voteKey = "voted_" + user.uid;

  if(localStorage.getItem(voteKey)){
    alert("You already voted!");
    return;
  }

  db.ref("votes/india/" + type)
  .transaction(v => (v || 0) + 1);

  localStorage.setItem(voteKey, "true");
}

/* ---------------- LIVE STATS ---------------- */

db.ref("votes/india").on("value", snap => {

  const d = snap.val() || {};

  document.getElementById("stats").innerHTML =
    "ONOE + : " + (d.onoeSupport||0) + "<br>" +
    "ONOE - : " + (d.onoeAgainst||0) + "<br>" +
    "DEL + : " + (d.delSupport||0) + "<br>" +
    "DEL - : " + (d.delAgainst||0);

  aiPredict(d);

});

/* ---------------- AI ---------------- */

function aiPredict(d){

  const total = (d.onoeSupport||0) + (d.delSupport||0) + 1;

  const onoe = (d.onoeSupport||0) / total;
  const del = (d.delSupport||0) / total;

  let result = onoe > del ? "🟢 ONOE Leading" : "🔴 DEL Leading";

  document.getElementById("ai").innerText =
    result + " | Confidence: " +
    Math.abs(onoe-del).toFixed(2);

}

</script>

</body>
</html>
