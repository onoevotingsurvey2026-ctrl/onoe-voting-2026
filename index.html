<!DOCTYPE html>
<html>
<head>
  <title>Live Vote Dashboard</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

  <style>
    body{
      font-family: Arial;
      text-align: center;
      background:#f4f4f4;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      margin:10px;
      border-radius:10px;
      display:inline-block;
      width:200px;
      box-shadow:0 0 10px #ccc;
    }

    .support{color:green;}
    .neutral{color:gray;}
    .oppose{color:red;}
  </style>
</head>

<body>

<h2>📊 Live Voting Dashboard</h2>

<div class="card support">
  🟢 Support <h1 id="support">0</h1>
</div>

<div class="card neutral">
  ⚪ Neutral <h1 id="neutral">0</h1>
</div>

<div class="card oppose">
  🔴 Oppose <h1 id="oppose">0</h1>
</div>

<script>
// 🔥 Firebase Config (உன் config போடு)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 📊 LIVE LISTENER
db.ref("user_votes").on("value", (snapshot) => {

  let data = snapshot.val();

  let support = 0;
  let neutral = 0;
  let oppose = 0;

  for(let user in data){
    let vote = data[user].vote;

    if(vote === "support") support++;
    else if(vote === "neutral") neutral++;
    else if(vote === "oppose") oppose++;
  }

  document.getElementById("support").innerText = support;
  document.getElementById("neutral").innerText = neutral;
  document.getElementById("oppose").innerText = oppose;
});

</script>

</body>
</html>
