<!DOCTYPE html>
<html>
<head>
  <title>Real Voting System PRO</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#f4f6f8;
      margin:0;
    }

    header{
      background:#0f172a;
      color:white;
      padding:15px;
    }

    #dashboard{ display:none; }

    .card{
      background:white;
      margin:10px;
      padding:15px;
      border-radius:10px;
      display:inline-block;
      min-width:220px;
    }

    button{
      padding:10px 15px;
      margin:5px;
      cursor:pointer;
    }

    #adminPanel{
      display:none;
      background:#fff3cd;
      padding:10px;
      margin:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<header>
  🌍 REAL Voting System PRO
</header>

<!-- LOGIN -->
<div id="loginSection">
  <h2>Login to Continue</h2>
  <button onclick="login()">Login with Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <h2>📊 Live Dashboard</h2>

  <div class="card">
    <h3>India</h3>
    <p>ONOE Support: <span id="os">0</span></p>
    <p>ONOE Against: <span id="oa">0</span></p>
    <p>DEL Support: <span id="ds">0</span></p>
    <p>DEL Against: <span id="da">0</span></p>

    <button onclick="vote('india','onoeSupport')">ONOE +</button>
    <button onclick="vote('india','onoeAgainst')">ONOE -</button>
    <button onclick="vote('india','delSupport')">DEL +</button>
    <button onclick="vote('india','delAgainst')">DEL -</button>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <h3>🧑‍💼 Admin Panel</h3>
    <button onclick="resetVotes()">Reset Votes</button>
  </div>

</div>

<script>

/////////////////////////////////////////////////////
// 🔥 FIREBASE CONFIG
/////////////////////////////////////////////////////

const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/////////////////////////////////////////////////////
// 🔐 LOGIN
/////////////////////////////////////////////////////

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

auth.getRedirectResult().catch(()=>{});

/////////////////////////////////////////////////////
// 🔄 AUTH CONTROL
/////////////////////////////////////////////////////

auth.onAuthStateChanged(user=>{

  if(user){
    document.getElementById("loginSection").style.display="none";
    document.getElementById("dashboard").style.display="block";
    loadVotes();

    // ADMIN CHECK (change email if needed)
    if(user.email === "onoe.voting.survey2026@gmail.com"){
      document.getElementById("adminPanel").style.display="block";
    }

  }else{
    document.getElementById("loginSection").style.display="block";
    document.getElementById("dashboard").style.display="none";
  }

});

/////////////////////////////////////////////////////
// 🗳️ ONE USER ONE VOTE SYSTEM
/////////////////////////////////////////////////////

function vote(country,type){

  const user = auth.currentUser;
  if(!user){
    alert("Login first");
    return;
  }

  const votePath = "userVotes/"+user.uid+"/"+country;

  db.ref(votePath).once("value", snap=>{
    if(snap.exists()){
      alert("❌ You already voted in this country!");
    }else{

      db.ref("votes/"+country+"/"+type)
        .transaction(v=> (v||0)+1);

      db.ref(votePath).set(type);
    }
  });

}

/////////////////////////////////////////////////////
// 📊 LOAD DATA
/////////////////////////////////////////////////////

function loadVotes(){

  db.ref("votes/india").on("value", snap=>{
    const d = snap.val() || {};

    document.getElementById("os").innerText = d.onoeSupport || 0;
    document.getElementById("oa").innerText = d.onoeAgainst || 0;
    document.getElementById("ds").innerText = d.delSupport || 0;
    document.getElementById("da").innerText = d.delAgainst || 0;
  });

}

/////////////////////////////////////////////////////
// 🧑‍💼 ADMIN RESET
/////////////////////////////////////////////////////

function resetVotes(){

  const user = auth.currentUser;

  if(user.email !== "onoe.voting.survey2026@gmail.com"){
    alert("Not allowed");
    return;
  }

  db.ref("votes").set({
    india:{
      onoeSupport:0,
      onoeAgainst:0,
      delSupport:0,
      delAgainst:0
    }
  });

  db.ref("userVotes").remove();

  alert("Votes reset successfully!");
}

</script>

</body>
</html>
