<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Entry Gate Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

.box{
  width:320px;
  margin:100px auto;
  background:#18243f;
  padding:20px;
  border-radius:12px;
}

input,button{
  width:90%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  background:#2563eb;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box" id="loginBox">

<h2>🔐 Entry Gate Login</h2>

<!-- COUNTRY CODE + MOBILE -->
<input id="phone" placeholder="+91 Mobile Number">

<!-- SEND OTP -->
<button onclick="sendOTP()">Send OTP</button>

<!-- ENTER OTP -->
<input id="otp" placeholder="Enter OTP">

<!-- SUBMIT OTP -->
<button onclick="verifyOTP()">Submit OTP</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;margin-top:120px;">
<h2>🏛️ Login Success</h2>
<p>Welcome to Civic Dashboard</p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* 🔥 FIREBASE CONFIG (ADD YOUR DETAILS) */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let confirmationResult;

/* CAPTCHA */
window.recaptchaVerifier = new RecaptchaVerifier(auth,"recaptcha-container",{
size:"normal"
});

/* SEND OTP */
window.sendOTP = () => {

const phone = document.getElementById("phone").value;

signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
.then((result)=>{
confirmationResult = result;
alert("OTP Sent ✔");
})
.catch(()=>{
alert("Error sending OTP");
});

};

/* VERIFY OTP */
window.verifyOTP = () => {

const code = document.getElementById("otp").value;

confirmationResult.confirm(code)
.then((user)=>{

alert("Login Success ✔");

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

})
.catch(()=>{
alert("Invalid OTP");
});

};

</script>

</body>
</html>
