<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ONOE Live TV Voting Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  color: #00ffcc;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 15px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  text-align: center;
  border: 1px solid rgba(0,255,204,0.2);
}

.card p {
  font-size: 24px;
  color: #00ffcc;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #1e3a8a;
  color: white;
}

.loginBox {
  text-align: center;
  margin-top: 20px;
}

</style>
</head>

<body>

<div class="header">
📺 ONOE LIVE TV VOTING DASHBOARD • INDIA SURVEY 🔴 LIVE
</div>

<!-- 🔐 LOGIN SECTION -->
<div class="loginBox">
  <button onclick="login()">🔐 Login with Google</button>
  <p id="userInfo"></p>
</div>

<div class="container">

<div class="card">
<h3>ONOE Support</h3>
<p id="onoeSupport">0 (0%)</p>
<button onclick="vote('onoeSupport')">👇 Vote</button>
</div>

<div class="card">
<h3>ONOE Against</h3>
<p id="onoeAgainst">0 (0%)</p>
<button onclick="vote('onoeAgainst')">👇 Vote</button>
</div>

<div class="card">
<h3>Del Support</h3>
<p id="delSupport">0 (0%)</p>
<button onclick="vote('delSupport')">👇 Vote</button>
</div>

<div class="card">
<h3>Del Against</h3>
<p id="delAgainst">0 (0%)</p>
<button onclick="vote('delAgainst')">👇 Vote</button>
</div>

<br>

<button onclick="resetVotes()">🔄 Reset Votes</button>

</div>

<script>

// 🔥 Firebase config (replace yours)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const ref = db.collection("votes").doc("global");

// 🔐 LOGIN
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
  .then((result) => {
    document.getElementById("userInfo").innerText =
      "Welcome: " + result.user.displayName;
  })
  .catch((error) => {
    alert(error.message);
  });
}

// 📊 LIVE UPDATE
ref.onSnapshot((doc) => {
  if (!doc.exists) return;

  let d = doc.data();

  let a = d.onoeSupport || 0;
  let b = d.onoeAgainst || 0;
  let c = d.delSupport || 0;
  let d1 = d.delAgainst || 0;

  let total = a + b + c + d1;

  function pct(v){
    return total ? ((v/total)*100).toFixed(1) : 0;
  }

  document.getElementById("onoeSupport").innerText = a + " (" + pct(a) + "%)";
  document.getElementById("onoeAgainst").innerText = b + " (" + pct(b) + "%)";
  document.getElementById("delSupport").innerText = c + " (" + pct(c) + "%)";
  document.getElementById("delAgainst").innerText = d1 + " (" + pct(d1) + "%)";
});

// 🗳️ VOTE FUNCTION
function vote(field) {

  const user = auth.currentUser;

  if (!user) {
    alert("Please login first");
    return;
  }

  ref.update({
    [field]: firebase.firestore.FieldValue.increment(1)
  });

}

// 🔄 RESET
function resetVotes() {
  ref.set({
    onoeSupport: 0,
    onoeAgainst: 0,
    delSupport: 0,
    delAgainst: 0
  });
}

</script>

</body>
</html>
