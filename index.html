<!DOCTYPE html>
<html>
<head>
  <title>ECI AI FORECAST ENGINE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#050b18,#0f1c33);
      color:white;
    }

    .header{
      text-align:center;
      padding:15px;
      font-size:22px;
      font-weight:bold;
      background:#0f172a;
      border-bottom:2px solid #2196F3;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
      padding:15px;
    }

    .card{
      background:rgba(255,255,255,0.08);
      padding:20px;
      border-radius:15px;
      text-align:center;
      backdrop-filter:blur(10px);
    }

    .big{
      font-size:30px;
      font-weight:bold;
    }

    .support{color:#4CAF50;}
    .against{color:#f44336;}
    .ai{color:#FFD700;}

    .bar{
      height:12px;
      background:#222;
      border-radius:10px;
      overflow:hidden;
      margin-top:10px;
    }

    .fill{
      height:100%;
      background:#4CAF50;
      width:50%;
    }

    .ticker{
      background:#00000070;
      padding:10px;
      white-space:nowrap;
      overflow:hidden;
    }

    .ticker span{
      display:inline-block;
      padding-left:100%;
      animation:move 10s linear infinite;
    }

    @keyframes move{
      0%{transform:translateX(0);}
      100%{transform:translateX(-100%);}
    }
  </style>
</head>

<body>

<div class="header">
🧠 ECI AI FORECAST ENGINE (LIVE)
</div>

<!-- LIVE STATS -->
<div class="grid">

  <div class="card">
    <div class="support">👍 SUPPORT</div>
    <div id="support" class="big">0</div>
  </div>

  <div class="card">
    <div class="against">👎 AGAINST</div>
    <div id="against" class="big">0</div>
  </div>

  <div class="card">
    <div>📊 TOTAL VOTES</div>
    <div id="total" class="big">0</div>
  </div>

</div>

<!-- AI PANEL -->
<div class="grid">

  <div class="card">
    <div class="ai">🧠 AI WIN PROBABILITY</div>
    <div id="ai" class="big">50%</div>
    <div class="bar">
      <div id="bar" class="fill"></div>
    </div>
  </div>

  <div class="card">
    <div>📈 TREND STATUS</div>
    <div id="trend" class="big">STABLE</div>
  </div>

  <div class="card">
    <div>⚡ MOMENTUM</div>
    <div id="momentum" class="big">0</div>
  </div>

</div>

<!-- TICKER -->
<div class="ticker">
  <span>🔴 AI FORECAST ENGINE ACTIVE • REAL TIME ELECTION ANALYTICS • MOMENTUM DETECTION RUNNING • ECI LEVEL DASHBOARD SYSTEM •</span>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* STORAGE FOR AI */
let lastTotal = 0;

/* LIVE ENGINE */
db.collection("votes").onSnapshot(snapshot=>{
  let support = 0;
  let against = 0;

  snapshot.forEach(doc=>{
    let v = doc.data().vote;
    if(v==="support") support++;
    if(v==="against") against++;
  });

  let total = support + against;

  /* AI CORE ENGINE */
  let ratio = total === 0 ? 0.5 : support / total;
  let ai = Math.round(ratio * 100);

  /* MOMENTUM */
  let momentum = total - lastTotal;
  lastTotal = total;

  /* TREND LOGIC */
  let trend = "STABLE";

  if(momentum > 5) trend = "STRONG RISE 📈";
  else if(momentum < -5) trend = "DECLINE 📉";
  else trend = "STABLE ⚖";

  /* UI UPDATE */
  document.getElementById("support").innerText = support;
  document.getElementById("against").innerText = against;
  document.getElementById("total").innerText = total;

  document.getElementById("ai").innerText = ai + "%";
  document.getElementById("trend").innerText = trend;
  document.getElementById("momentum").innerText = momentum;

  document.getElementById("bar").style.width = ai + "%";

});

</script>

</body>
</html>
