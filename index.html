<!DOCTYPE html>
<html>
<head>
  <title>ONOE Voting Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 25px;
      width: 320px;
      margin: 40px auto;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    button {
      padding: 10px 16px;
      margin: 8px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .support { background: #28a745; color: white; }
    .against { background: #dc3545; color: white; }
    .login { background: #007bff; color: white; }
  </style>
</head>

<body>

<div class="glass">
  <h2>🗳️ ONOE Voting Dashboard</h2>

  <button class="login" onclick="login()">🔐 Google Login</button>

  <p id="user"></p>

  <hr>

  <button class="support" onclick="vote('support')">👍 Support</button>
  <button class="against" onclick="vote('against')">👎 Against</button>

  <hr>

  <h3>📊 Live Results</h3>
  <p>Support: <span id="support">0</span></p>
  <p>Against: <span id="against">0</span></p>

  <hr>

  <h4>Admin View</h4>
  <p id="admin">Loading...</p>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let userId = null;

// 🔐 LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider).then(result => {
    userId = result.user.uid;
    document.getElementById("user").innerText =
      "Logged in: " + result.user.email;
  });
}

// 🗳️ VOTE (ANTI-FAKE LOCK)
function vote(type){
  if(!userId){
    alert("Please login first");
    return;
  }

  const ref = db.ref("votes/" + userId);

  ref.once("value").then(snapshot => {
    if(snapshot.exists()){
      alert("❌ You already voted!");
      return;
    }

    ref.set({
      choice: type,
      time: Date.now()
    });

    alert("✅ Vote submitted successfully!");
  });
}

// 📊 LIVE RESULTS
db.ref("votes").on("value", snapshot => {
  let data = snapshot.val() || {};

  let support = 0;
  let against = 0;

  Object.values(data).forEach(v => {
    if(v.choice === "support") support++;
    if(v.choice === "against") against++;
  });

  document.getElementById("support").innerText = support;
  document.getElementById("against").innerText = against;

  document.getElementById("admin").innerText =
    "Total Votes: " + (support + against);
});
</script>

</body>
</html>
