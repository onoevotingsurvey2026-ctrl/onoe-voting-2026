<!DOCTYPE html>
<html>
<head>
  <title>ONOE Voting 2026</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle,#0f172a,#020617);
      color: white;
      overflow-x: hidden;
    }

    /* GLASS CARD */
    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      border-radius: 16px;
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* HEADER */
    .title {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      margin-top: 20px;
    }

    /* BUTTONS */
    button {
      width: 48%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .support { background: #22c55e; color: white; }
    .against { background: #ef4444; color: white; }

    .login {
      width: 100%;
      background: #3b82f6;
      margin-bottom: 10px;
    }

    /* COUNTER ANIMATION */
    .count {
      font-size: 22px;
      font-weight: bold;
      color: #38bdf8;
      transition: all 0.5s ease;
    }

    /* LOADING */
    .loader {
      border: 4px solid #334155;
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    canvas {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="title">🗳️ ONOE Glass Voting Dashboard 2026</div>

<div class="glass">

  <button class="login" onclick="login()">🔐 Login with Google</button>

  <p id="user">Not logged in</p>

  <hr style="opacity:0.2">

  <div id="loading" class="loader"></div>

  <p>
    👍 Support: <span class="count" id="support">0</span>
  </p>

  <p>
    👎 Against: <span class="count" id="against">0</span>
  </p>

  <p>
    🧮 Total: <span class="count" id="total">0</span>
  </p>

  <button class="support" onclick="vote('support')">👍 SUPPORT</button>
  <button class="against" onclick="vote('against')">👎 AGAINST</button>

  <canvas id="chart"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ref = doc(db, "votes", "total");

/* CHART */
const ctx = document.getElementById("chart");
let chart = new Chart(ctx, {
  type: "doughnut",
  data: {
    labels: ["Support", "Against"],
    datasets: [{
      data: [0,0],
      backgroundColor: ["#22c55e","#ef4444"]
    }]
  }
});

/* INIT */
async function init(){
  const snap = await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref,{support:0,against:0});
  }
}
init();

/* LIVE */
onSnapshot(ref,(snap)=>{

  document.getElementById("loading").style.display="none";

  const d = snap.data() || {};

  animate("support", d.support || 0);
  animate("against", d.against || 0);

  const total = (d.support||0)+(d.against||0);
  animate("total", total);

  chart.data.datasets[0].data = [
    d.support||0,
    d.against||0
  ];
  chart.update();

});

/* NUMBER ANIMATION */
function animate(id,value){
  let el=document.getElementById(id);
  let start=0;
  let interval=setInterval(()=>{
    start++;
    el.innerText=start;
    if(start>=value) clearInterval(interval);
  },20);
}

/* LOGIN */
window.login = async function(){
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth,provider);
};

onAuthStateChanged(auth,(user)=>{
  document.getElementById("user").innerText =
    user ? "👤 "+user.displayName : "Not logged in";
});

/* VOTE */
window.vote = async function(type){

  const user = auth.currentUser;
  if(!user){
    alert("Login first!");
    return;
  }

  const snap = await getDoc(ref);
  const d = snap.data();

  if(type==="support"){
    await updateDoc(ref,{support:(d.support||0)+1});
  }else{
    await updateDoc(ref,{against:(d.against||0)+1});
  }

  alert("Vote recorded!");
};

</script>

</body>
</html>
