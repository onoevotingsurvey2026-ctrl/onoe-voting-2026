<!DOCTYPE html>
<html>
<head>
  <title>Global Voting Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body { font-family: Arial; text-align:center; background:#f4f4f4; }
    .box { background:#fff; padding:20px; margin:20px auto; width:90%; max-width:500px; border-radius:10px; }
    button { padding:10px 15px; margin:5px; cursor:pointer; }
    .selected { background:green; color:#fff; }
    #ticker { background:black; color:white; padding:10px; overflow:hidden; white-space:nowrap; }
  </style>
</head>

<body>

<div id="ticker">LIVE NEWS: Voting System Active Worldwide 🌍 | ONOE vs DEL Dashboard Running 🔥</div>

<div class="box">

  <h2>Global Voting Dashboard</h2>

  <button onclick="login()">Login with Google</button>
  <p id="user"></p>

  <hr>

  <h3>SELECT YOUR VOTE</h3>

  <button onclick="selectVote('onoeSupport')">ONOE SUPPORT 👍</button>
  <button onclick="selectVote('onoeAgainst')">ONOE AGAINST 👎</button>
  <button onclick="selectVote('delSupport')">DEL SUPPORT 👍</button>
  <button onclick="selectVote('delAgainst')">DEL AGAINST 👎</button>

  <br><br>

  <button onclick="submitVote()">SUBMIT YOUR VOTE</button>

  <p id="msg"></p>

</div>

<div class="box">
  <h3>LIVE DASHBOARD</h3>
  <p id="liveData">Loading...</p>
</div>

<script>
  // 🔥 Firebase Config (replace with yours)
  const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let selectedVote = null;

  // LOGIN
  function login(){
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
  }

  auth.onAuthStateChanged(user=>{
    if(user){
      currentUser = user;
      document.getElementById("user").innerText = "Welcome " + user.email;
      listenLive();
    }
  });

  // SELECT VOTE
  function selectVote(v){
    selectedVote = v;
    document.getElementById("msg").innerText = "Selected: " + v;
  }

  // SUBMIT VOTE
  function submitVote(){
    if(!currentUser){
      alert("Please login first");
      return;
    }
    if(!selectedVote){
      alert("Please select vote");
      return;
    }

    const ref = db.collection("votes").doc(currentUser.email);

    ref.get().then(doc=>{
      if(doc.exists){
        document.getElementById("msg").innerText = "❌ You already voted!";
      } else {
        ref.set({
          vote: selectedVote,
          time: new Date()
        });

        document.getElementById("msg").innerText =
          "🎉 YOUR VOTE SUCCESSFULLY RECORDED";

        selectedVote = null;
      }
    });
  }

  // LIVE DASHBOARD
  function listenLive(){
    db.collection("votes").onSnapshot(snapshot=>{
      let data = {
        onoeSupport:0,
        onoeAgainst:0,
        delSupport:0,
        delAgainst:0
      };

      snapshot.forEach(doc=>{
        data[doc.data().vote]++;
      });

      document.getElementById("liveData").innerHTML =
        "ONOE Support: " + data.onoeSupport + "<br>" +
        "ONOE Against: " + data.onoeAgainst + "<br>" +
        "DEL Support: " + data.delSupport + "<br>" +
        "DEL Against: " + data.delAgainst;
    });
  }
</script>

</body>
</html>
