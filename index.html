<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Nation One Election & Delimitation - Global Indian Vote</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
}

header{
    background:#111;
    color:white;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:20px auto;
    border-radius:10px;
    width:90%;
    max-width:800px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.support{background:#28a745;color:white;}
.neutral{background:#ffc107;color:black;}
.oppose{background:#dc3545;color:white;}

.result{
    font-size:22px;
    font-weight:bold;
}

canvas{
    width:100% !important;
    max-width:400px;
    margin:20px auto;
    background:white;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>🗳️ Global Indian Vote Platform</h1>
<p>One Nation One Election & Delimitation</p>
</header>

<!-- VOTING SECTION -->
<div class="card">

<h2>🗳️ Cast Your Vote</h2>

<button class="support" onclick="vote('support')">🟢 Support</button>
<button class="neutral" onclick="vote('neutral')">⚪ Neutral</button>
<button class="oppose" onclick="vote('oppose')">🔴 Oppose</button>

</div>

<!-- LIVE RESULTS -->
<div class="card result">
📊 Total Votes: <span id="totalVotes">0</span>

<p>🟢 Support: <span id="supportCount">0</span></p>
<p>⚪ Neutral: <span id="neutralCount">0</span></p>
<p>🔴 Oppose: <span id="opposeCount">0</span></p>

</div>

<!-- CHARTS -->
<div class="card">
<canvas id="pieChart"></canvas>
<canvas id="barChart"></canvas>
</div>

<!-- FIREBASE (ONLY CDN HERE) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

<!-- YOUR MAIN LOGIC -->
<script src="script.js"></script>

</body>
</html>
