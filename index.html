<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ONOE Voting Dashboard</title>

  <!-- Firebase (optional keep your version) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6f9;
      color: #333;
    }

    /* HEADER */
    .header {
      background: #1e3a8a;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    /* DASHBOARD CONTAINER */
    .dashboard {
      max-width: 1200px;
      margin: auto;
      padding: 15px;
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 22px;
      font-weight: bold;
      color: #1e3a8a;
    }

    /* BUTTONS */
    .btn {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1e3a8a;
      color: white;
    }

    /* MOBILE RESPONSIVE FIX */
    @media (max-width: 768px) {

      .cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .header {
        font-size: 16px;
      }

      .card p {
        font-size: 18px;
      }
    }

    @media (max-width: 480px) {

      .cards {
        grid-template-columns: 1fr;
      }

      .dashboard {
        padding: 10px;
      }
    }

  </style>
</head>

<body>

  <div class="header">
    🗳️ ONOE Voting Live Dashboard
  </div>

  <div class="dashboard">

    <div class="cards">

      <div class="card">
        <h2>ONOE Support</h2>
        <p id="onoeSupport">0</p>
      </div>

      <div class="card">
        <h2>ONOE Against</h2>
        <p id="onoeAgainst">0</p>
      </div>

      <div class="card">
        <h2>Delimitation Support</h2>
        <p id="delSupport">0</p>
      </div>

      <div class="card">
        <h2>Delimitation Against</h2>
        <p id="delAgainst">0</p>
      </div>

    </div>

    <br>

    <button class="btn" onclick="resetVotes()">Reset Votes</button>

  </div>

  <script>
    // Firebase config (your existing config paste here)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // LIVE LOAD (example structure)
    function loadVotes() {
      db.collection("votes").doc("india").onSnapshot(doc => {
        if (doc.exists) {
          const data = doc.data();

          document.getElementById("onoeSupport").innerText = data.onoeSupport || 0;
          document.getElementById("onoeAgainst").innerText = data.onoeAgainst || 0;
          document.getElementById("delSupport").innerText = data.delSupport || 0;
          document.getElementById("delAgainst").innerText = data.delAgainst || 0;
        }
      });
    }

    function resetVotes() {
      db.collection("votes").doc("india").set({
        onoeSupport: 0,
        onoeAgainst: 0,
        delSupport: 0,
        delAgainst: 0
      });

      alert("Votes reset successfully!");
    }

    loadVotes();
  </script>

</body>
</html>
