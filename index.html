<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voting Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

header{
  padding:20px;
  background:#111827;
}

button{
  padding:15px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

.loginBtn{
  background:#2563eb;
  color:white;
}

.logoutBtn{
  background:#f97316;
  color:white;
}

.voteBtn{
  background:#22c55e;
  color:white;
}

.box{
  background:#1e293b;
  margin:20px;
  padding:20px;
  border-radius:12px;
}

.count{
  font-size:28px;
  color:#facc15;
  font-weight:bold;
}

</style>

</head>

<body>

<header>
<h1>🌐 Voting Dashboard</h1>
</header>

<button class="loginBtn" onclick="login()">LOGIN</button>
<button class="logoutBtn" onclick="logout()">LOGOUT</button>

<p id="status">Not Logged In</p>

<div class="box">

<h2>ONOE</h2>

<p>Support: <span id="onoeSupport">0</span></p>
<p>Against: <span id="onoeAgainst">0</span></p>

<button class="voteBtn" onclick="vote('onoeSupport')">Support</button>
<button class="voteBtn" onclick="vote('onoeAgainst')">Against</button>

</div>

<div class="box">

<h2>Delimitation</h2>

<p>Support: <span id="delSupport">0</span></p>
<p>Against: <span id="delAgainst">0</span></p>

<button class="voteBtn" onclick="vote('delSupport')">Support</button>
<button class="voteBtn" onclick="vote('delAgainst')">Against</button>

</div>

<script>

  // Firebase Config (REPLACE THIS)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "onoevote2026.firebaseapp.com",
    projectId: "onoevote2026",
    storageBucket: "onoevote2026.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  // ======================
  // LOGIN FUNCTION
  // ======================
  function login(){

    const provider =
    new firebase.auth.GoogleAuthProvider();

    auth.signInWithRedirect(provider);

  }

  // ======================
  // LOGOUT FUNCTION
  // ======================
  function logout(){

    auth.signOut().then(()=>{
      alert("Logged out");
    });

  }

  // ======================
  // AUTH STATUS
  // ======================
  auth.onAuthStateChanged(user=>{
    if(user){
      document.getElementById("status").innerText =
      "Logged in: " + user.email;
    }else{
      document.getElementById("status").innerText =
      "Not Logged In";
    }
  });

  // ======================
  // LIVE DATA
  // ======================
  db.collection("votes").doc("india")
  .onSnapshot(doc=>{
    if(doc.exists){
      const d = doc.data();

      document.getElementById("onoeSupport").innerText = d.onoeSupport || 0;
      document.getElementById("onoeAgainst").innerText = d.onoeAgainst || 0;
      document.getElementById("delSupport").innerText = d.delSupport || 0;
      document.getElementById("delAgainst").innerText = d.delAgainst || 0;
    }
  });

  // ======================
  // VOTE FUNCTION
  // ======================
  function vote(field){

    if(!auth.currentUser){
      alert("Please login first");
      return;
    }

    db.collection("votes").doc("india").update({
      [field]: firebase.firestore.FieldValue.increment(1)
    });

  }

</script>

</body>
</html>
