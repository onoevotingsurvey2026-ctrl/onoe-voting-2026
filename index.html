
<!DOCTYPE html>
<html>
<head>
  <title>Global Indian Vote 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; text-align:center; padding:20px; background:#f4f4f4; }
    .card { background:white; padding:15px; margin:10px auto; width:90%; max-width:420px; border-radius:10px; }
    button { padding:10px 15px; margin:5px; cursor:pointer; }
    input { padding:8px; margin:5px; width:80%; }
  </style>
</head>

<body>

<h2>🌍 Global Indian Vote 2026</h2>

<!-- 🔐 LOGIN SECTION -->
<div class="card">
<h3>🔐 Login System</h3>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<br><br>
<button id="googleLogin">Login with Google</button>

<button id="logoutBtn" style="display:none;">Logout</button>

<p id="status">Not logged in</p>
<p><b>User:</b> <span id="userEmail"></span></p>
</div>

<!-- 🗳️ VOTING -->
<div class="card">
<h3>🗳️ Vote Section</h3>

<button onclick="vote('support')">👍 Support</button>
<button onclick="vote('oppose')">👎 Oppose</button>
<button onclick="vote('neutral')">⚖️ Neutral</button>

<p id="msg"></p>
</div>

<!-- 📊 DASHBOARD -->
<div class="card">
<h3>📊 Live Dashboard</h3>

<p>👍 Support: <span id="supportCount">0</span></p>
<p>👎 Oppose: <span id="opposeCount">0</span></p>
<p>⚖️ Neutral: <span id="neutralCount">0</span></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getDatabase,
  ref,
  get,
  set,
  onValue
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};

// Init
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

// UI
const status = document.getElementById("status");
const userEmail = document.getElementById("userEmail");
const msg = document.getElementById("msg");
const logoutBtn = document.getElementById("logoutBtn");

// 🔐 EMAIL SIGNUP
window.signup = function () {
  createUserWithEmailAndPassword(
    auth,
    document.getElementById("email").value,
    document.getElementById("password").value
  ).then(() => alert("Account created"));
};

// 🔐 EMAIL LOGIN
window.login = function () {
  signInWithEmailAndPassword(
    auth,
    document.getElementById("email").value,
    document.getElementById("password").value
  ).then(() => alert("Login success"));
};

// 🔵 GOOGLE LOGIN
document.getElementById("googleLogin").onclick = function () {
  signInWithPopup(auth, provider);
};

// LOGOUT
logoutBtn.onclick = () => {
  signOut(auth);
};

// AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    status.innerText = "Logged in ✔️";
    userEmail.innerText = user.email;
    logoutBtn.style.display = "inline-block";
  } else {
    status.innerText = "Not logged in";
    userEmail.innerText = "";
    logoutBtn.style.display = "none";
  }
});

// 🗳️ VOTE SYSTEM (ONE USER ONE VOTE)
window.vote = async function(choice) {

  const user = auth.currentUser;

  if (!user) {
    alert("Please login first");
    return;
  }

  const uid = user.uid;
  const voteRef = ref(db, "votes/" + uid);

  const snapshot = await get(voteRef);

  if (snapshot.exists()) {
    msg.innerText = "❌ Already voted!";
    return;
  }

  await set(voteRef, {
    email: user.email,
    choice: choice,
    time: Date.now()
  });

  msg.innerText = "✅ Vote submitted!";
};

// 📊 LIVE DASHBOARD
const votesRef = ref(db, "votes");

onValue(votesRef, (snapshot) => {

  let support = 0, oppose = 0, neutral = 0;

  snapshot.forEach((child) => {
    const data = child.val();

    if (data.choice === "support") support++;
    if (data.choice === "oppose") oppose++;
    if (data.choice === "neutral") neutral++;
  });

  document.getElementById("supportCount").innerText = support;
  document.getElementById("opposeCount").innerText = oppose;
  document.getElementById("neutralCount").innerText = neutral;

});

</script>

</body>
</html>
