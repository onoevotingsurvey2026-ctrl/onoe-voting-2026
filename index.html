<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>International Entry Gate</title>

<style>
body{
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:320px;
  background:#18243f;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

select,input,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
}

button{
  background:#2563eb;
  color:white;
}
</style>
</head>

<body>

<div class="box">

<h2>🔐 Entry Gate Login</h2>

<!-- 🌍 COUNTRY SELECT -->
<select id="country">
  <option value="+91">🇮🇳 India (+91)</option>
  <option value="+1">🇺🇸 USA (+1)</option>
  <option value="+44">🇬🇧 UK (+44)</option>
  <option value="+971">🇦🇪 UAE (+971)</option>
  <option value="+81">🇯🇵 Japan (+81)</option>
</select>

<!-- 📱 MOBILE -->
<input id="phone" placeholder="Mobile Number">

<!-- OTP -->
<button onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">SUBMIT</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let confirmationResult;

/* OTP SEND */
window.sendOTP = () => {

const code = document.getElementById("country").value;
const phone = document.getElementById("phone").value;

const fullNumber = code + phone;

signInWithPhoneNumber(auth, fullNumber, window.recaptchaVerifier)
.then(res=>{
confirmationResult = res;
alert("OTP Sent ✔");
});

};

/* VERIFY */
window.verifyOTP = () => {

const otp = document.getElementById("otp").value;

confirmationResult.confirm(otp)
.then(()=>{
alert("Login Success ✔");
})
.catch(()=>{
alert("Invalid OTP");
});

};

</script>

</body>
</html>
