<!DOCTYPE html>
<html>
<head>
  <title>Voting Login System</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }

    .box {
      border: 1px solid #ccc;
      padding: 20px;
      display: inline-block;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h2>🔥 Voting Login System</h2>

  <div class="box">
    <input type="email" id="email" placeholder="Enter Email"><br>
    <input type="password" id="password" placeholder="Enter Password"><br>

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <br><br>

    <button onclick="googleLogin()">Login with Google</button>

    <p id="msg"></p>
  </div>

<script>
  // 🔥 STEP 1: Firebase Config (PASTE YOUR REAL CONFIG HERE)
  const firebaseConfig = {
    apiKey: "PASTE_YOUR_API_KEY",
    authDomain: "PASTE_YOUR_AUTH_DOMAIN",
    projectId: "PASTE_YOUR_PROJECT_ID",
    storageBucket: "PASTE_YOUR_STORAGE_BUCKET",
    messagingSenderId: "PASTE_YOUR_SENDER_ID",
    appId: "PASTE_YOUR_APP_ID"
  };

  // 🔥 Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  // 🔐 Email Signup
  function signup() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Signup Success ✔";
    })
    .catch(err => {
      document.getElementById("msg").innerText = err.message;
    });
  }

  // 🔐 Email Login
  function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Login Success ✔";
    })
    .catch(err => {
      document.getElementById("msg").innerText = err.message;
    });
  }

  // 🔥 Google Login
  function googleLogin() {
    let provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
    .then(() => {
      document.getElementById("msg").innerText = "Google Login Success ✔";
    })
    .catch(err => {
      document.getElementById("msg").innerText = err.message;
    });
  }

  console.log("Firebase Loaded ✔");
</script>

</body>
</html>
