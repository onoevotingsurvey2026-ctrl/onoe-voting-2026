<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Global Indian Voting Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    header, footer { background:#111; color:#fff; text-align:center; padding:12px; }
    .container { padding:20px; text-align:center; }

    button {
      padding:10px 15px;
      margin:5px;
      cursor:pointer;
    }

    .card {
      background:white;
      padding:15px;
      margin:10px auto;
      width:90%;
      max-width:400px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <h2 id="title">Global Indian Voting Dashboard</h2>

  <div>
    <button onclick="setLang('en')">English</button>
    <button onclick="setLang('ta')">தமிழ்</button>
  </div>

  <div style="font-size:12px; color:#ccc;">
    https://global-indian-vote.github.io/global-indian-vote/
  </div>
</header>

<!-- MAIN -->
<div class="container">

  <button id="loginBtn" onclick="login()">Login with Google</button>

  <div id="userBox"></div>

  <!-- VOTE -->
  <div class="card">
    <h3 id="voteTitle">Vote Panel</h3>

    <button onclick="vote('onoe_support')">👍 ONOE Support</button>
    <button onclick="vote('onoe_against')">👎 ONOE Against</button>
  </div>

  <!-- LIVE RESULT -->
  <div class="card">
    <h3 id="liveTitle">Live Result</h3>

    <p>ONOE Support: <span id="onoeSupport">0</span></p>
    <p>ONOE Against: <span id="onoeAgainst">0</span></p>
  </div>

</div>

<!-- FOOTER -->
<footer>
  © 2026 Global Indian Voting System
</footer>

<script>
/* ---------------- FIREBASE CONFIG ---------------- */
var firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

/* ---------------- LANGUAGE ---------------- */
const texts = {
  en: {
    title: "Global Indian Voting Dashboard",
    vote: "Vote Panel",
    live: "Live Result",
    login: "Login with Google"
  },
  ta: {
    title: "உலக இந்திய வாக்கெடுப்பு",
    vote: "வாக்கு பகுதி",
    live: "நேரடி முடிவு",
    login: "Google மூலம் உள்நுழைய"
  }
};

function setLang(lang) {
  document.getElementById("title").innerText = texts[lang].title;
  document.getElementById("voteTitle").innerText = texts[lang].vote;
  document.getElementById("liveTitle").innerText = texts[lang].live;
  document.getElementById("loginBtn").innerText = texts[lang].login;
}

/* ---------------- LOGIN ---------------- */
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider).then(result => {
    document.getElementById("userBox").innerHTML =
      "Logged in: " + result.user.email;
  });
}

/* ---------------- VOTE (ONE USER ONE VOTE) ---------------- */
function vote(choice) {
  const user = auth.currentUser;

  if (!user) {
    alert("Please login first");
    return;
  }

  db.collection("votes").doc(user.uid).get().then(doc => {
    if (doc.exists) {
      alert("One Gmail one vote only allowed");
    } else {
      db.collection("votes").doc(user.uid).set({
        uid: user.uid,
        email: user.email,
        choice: choice,
        time: Date.now()
      });

      alert("Vote successfully recorded");
    }
  });
}

/* ---------------- LIVE RESULT ---------------- */
db.collection("votes").onSnapshot(snapshot => {

  let support = 0;
  let against = 0;

  snapshot.forEach(doc => {
    const d = doc.data();

    if (d.choice === "onoe_support") support++;
    if (d.choice === "onoe_against") against++;
  });

  document.getElementById("onoeSupport").innerText = support;
  document.getElementById("onoeAgainst").innerText = against;
});
</script>

</body>
</html>
