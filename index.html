<!DOCTYPE html>
<html>
<head>
  <title>ONOE Voting 2026</title>
</head>

<body style="text-align:center;font-family:Arial">

<h2>🗳️ ONOE & Delimitation Public Voting Survey 2026</h2>

<p id="result">Loading votes...</p>

<button onclick="vote('support')">👍 Support</button>
<button onclick="vote('against')">👎 Against</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.appspot.com",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:61a8541708b48fa51101dd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "votes", "total");

// create doc if not exists
async function init() {
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, { support: 0, against: 0 });
  }
}
init();

// live update
onSnapshot(ref, (docSnap) => {
  if (!docSnap.exists()) return;

  const d = docSnap.data();

  document.getElementById("result").innerHTML =
    "👍 Support: " + (d.support || 0) +
    " | 👎 Against: " + (d.against || 0) +
    " | Total: " + ((d.support || 0) + (d.against || 0));
});

// 🔐 PROTECTED VOTE FUNCTION (ONE VOTE PER DEVICE)
window.vote = async function(type) {

  // 🚫 already voted check
  if (localStorage.getItem("voted")) {
    alert("⚠️ You have already voted!");
    return;
  }

  try {
    const snap = await getDoc(ref);
    const d = snap.data();

    if (type === "support") {
      await updateDoc(ref, { support: (d.support || 0) + 1 });
    } else {
      await updateDoc(ref, { against: (d.against || 0) + 1 });
    }

    // mark as voted
    localStorage.setItem("voted", "true");

    alert("✅ Your vote has been recorded!");

  } catch (e) {
    console.error(e);
  }
};

</script>

</body>
</html>
