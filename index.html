<!DOCTYPE html>
<html>
<head>
  <title>ONOE Voting 2026</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>

<body style="text-align:center;font-family:Arial">

<h2>🗳️ ONOE & Delimitation Public Voting Survey 2026</h2>

<p id="result">Loading votes...</p>

<button onclick="vote('support')">👍 Support</button>
<button onclick="vote('against')">👎 Against</button>

<script type="module">

// 🔥 Firebase Config (YOUR DATA PASTE HERE)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "votes", "total");

// init
const snap = await getDoc(ref);
if (!snap.exists()) {
  await setDoc(ref, { support: 0, against: 0 });
}

// live update
onSnapshot(ref, (docSnap) => {
  const d = docSnap.data();
  document.getElementById("result").innerHTML =
  "👍 Support: " + d.support +
  " | 👎 Against: " + d.against +
  " | Total: " + (d.support + d.against);
});

// vote function
window.vote = async function(type) {
  const snap = await getDoc(ref);
  const d = snap.data();

  if (type === "support") {
    await updateDoc(ref, { support: d.support + 1 });
  } else {
    await updateDoc(ref, { against: d.against + 1 });
  }
};

</script>

</body>
</html>
