<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ONOE Voting System</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }

    .selected {
      background-color: green;
      color: white;
    }
  </style>
</head>

<body>

  <h2>🗳️ LIVE VOTING SYSTEM</h2>

  <div>
    <button id="supportBtn">Support</button>
    <button id="againstBtn">Against</button>
    <button id="neutralBtn">Neutral</button>
  </div>

  <br>

  <button onclick="submitVote()">Submit Vote</button>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 🔥 Firebase config (replace with your own)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let selectedVote = "";

    // Button selection
    document.getElementById("supportBtn").onclick = () => {
      selectedVote = "support";
      highlight("supportBtn");
    };

    document.getElementById("againstBtn").onclick = () => {
      selectedVote = "against";
      highlight("againstBtn");
    };

    document.getElementById("neutralBtn").onclick = () => {
      selectedVote = "neutral";
      highlight("neutralBtn");
    };

    function highlight(id) {
      document.querySelectorAll("button").forEach(btn => {
        btn.classList.remove("selected");
      });
      document.getElementById(id).classList.add("selected");
    }

    // Submit vote
    window.submitVote = async function () {
      if (!selectedVote) {
        alert("Please select a vote");
        return;
      }

      try {
        await addDoc(collection(db, "votes"), {
          vote: selectedVote,
          timestamp: new Date()
        });

        alert("Vote submitted successfully 🚀");
        selectedVote = "";
      } catch (e) {
        console.error(e);
        alert("Error submitting vote");
      }
    };
  </script>

</body>
</html>
