<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Indian Vote</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script><style>
body{
  font-family: Arial;
  text-align:center;
  background:#f4f4f4;
}

.card{
  background:white;
  padding:20px;
  margin:10px;
  border-radius:10px;
  display:inline-block;
}

button{
  padding:10px 20px;
  margin:5px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}

.support{background:green;color:white;}
.neutral{background:orange;}
.oppose{background:red;color:white;}
</style>

</head>

<body>

<h2>🗳️ Global Indian Vote</h2>

<div class="card">
<p id="userInfo">Not Logged In</p>
<button onclick="login()">Login Gmail</button>
</div>

<div class="card">
<h3>Vote</h3>
<button class="support" onclick="vote('support')">Support</button>
<button class="neutral" onclick="vote('neutral')">Neutral</button>
<button class="oppose" onclick="vote('oppose')">Oppose</button>
</div>

<div class="card">
<h3>📊 Results</h3>
<p>Support: <span id="s">0</span></p>
<p>Neutral: <span id="n">0</span></p>
<p>Oppose: <span id="o">0</span></p>
<p>Total: <span id="t">0</span></p>
</div>

<canvas id="chart" width="300"></canvas>

<script>

// 🔥 FIREBASE CONFIG (REPLACE THIS)
const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentUser = null;

// 👤 LOGIN
function login(){
  let email = prompt("Enter Gmail ID");

  if(email && email.includes("@gmail.com")){
    currentUser = email;
    document.getElementById("userInfo").innerText = "Logged in: " + email;
  }else{
    alert("Invalid Gmail");
  }
}

// 🗳️ VOTE SAVE (FIXED)
function vote(type){

  if(!currentUser){
    alert("Login required");
    return;
  }

  db.ref("user_votes/" + currentUser).set({
    vote: type,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  });

}

// 📊 LIVE LISTENER (FIXED)
db.ref("user_votes").on("value", (snapshot)=>{

  let data = snapshot.val() || {};

  let support=0, neutral=0, oppose=0;

  for(let user in data){
    let v = data[user].vote;

    if(v==="support") support++;
    else if(v==="neutral") neutral++;
    else if(v==="oppose") oppose++;
  }

  document.getElementById("s").innerText = support;
  document.getElementById("n").innerText = neutral;
  document.getElementById("o").innerText = oppose;
  document.getElementById("t").innerText = support+neutral+oppose;

  chart.data.datasets[0].data = [support,neutral,oppose];
  chart.update();

});

// 📊 CHART
const chart = new Chart(document.getElementById("chart"), {
type:'pie',
data:{
  labels:['Support','Neutral','Oppose'],
  datasets:[{
    data:[0,0,0],
    backgroundColor:['green','orange','red']
  }]
}
});

</script>

</body>
</html>
