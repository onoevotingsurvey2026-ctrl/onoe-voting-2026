<!DOCTYPE html>
<html>
<head>
  <title>ECI India Voting Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    body {
      margin:0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    header {
      text-align:center;
      padding:15px;
      background:#111827;
      border-bottom:2px solid red;
    }

    .live {
      color:red;
      font-weight:bold;
    }

    .top {
      display:flex;
      justify-content:space-between;
      padding:10px;
      background:#1f2937;
      flex-wrap:wrap;
    }

    button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .vote { width:220px; }
    .onoe { background:#2563eb; color:white; }
    .delim { background:#16a34a; color:white; }
    .comb { background:#7c3aed; color:white; }

    #dashboard { display:none; text-align:center; }

    .chart-box {
      width:80%;
      margin:auto;
      margin-top:20px;
      background:#111827;
      padding:10px;
      border-radius:10px;
    }

    #loginBox {
      text-align:center;
      margin-top:40px;
    }

    /* ================= MOBILE ================= */

    @media (max-width:768px) {

      .top {
        flex-direction:column;
        text-align:center;
      }

      .vote {
        width:95%;
      }

      .chart-box {
        width:95%;
      }
    }

    /* ================= HEATMAP ================= */

    .state {
      padding:10px;
      margin:10px;
      border-radius:6px;
      font-weight:bold;
    }

    .low { background:#1e3a8a; }
    .mid { background:#f59e0b; }
    .high { background:#dc2626; }

  </style>
</head>

<body>

<header>
🏛️ ECI India Voting Dashboard  
<br>
ONOE & Delimitation Public Opinion System  
<br>
<span class="live">🔴 LIVE / நேரலை</span>
<p style="font-size:13px;color:#aaa;">
👥 Public Opinion + Election Analytics
</p>
</header>

<div class="top">

  <div id="user">👤 Guest / விருந்தினர்</div>

  <div>
    <button onclick="login()">🔑 Google Login</button>
    <button onclick="document.body.requestFullscreen()">📺 TV Mode</button>
    <button onclick="enableTV()">🔥 TV Polish</button>
  </div>

</div>

<div id="loginBox">
  <h3>Login to Vote / வாக்களிக்க உள்நுழையவும்</h3>
</div>

<div id="dashboard">

  <h3>🗳️ Vote Options</h3>

  <button class="vote onoe" onclick="vote('onoe')">ONOE</button>
  <button class="vote delim" onclick="vote('delimitation')">Delimitation</button>
  <button class="vote comb" onclick="vote('combined')">Combined</button>

  <p id="status"></p>

  <div class="chart-box">
    <canvas id="bar"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="pie"></canvas>
  </div>

  <h3>🌍 India Heatmap (ECI View)</h3>

  <div id="tn" class="state">Tamil Nadu</div>
  <div id="ka" class="state">Karnataka</div>
  <div id="kl" class="state">Kerala</div>
  <div id="mh" class="state">Maharashtra</div>

</div>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let user = null;

/* ================= LOGIN ================= */

function login() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(res => console.log("Login success"))
    .catch(err => alert(err.message));
}

/* ================= AUTH ================= */

auth.onAuthStateChanged(u => {
  if (u) {
    user = u;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    document.getElementById("user").innerText =
      "👤 " + u.email;
  }
});

/* ================= VOTE ================= */

function vote(type) {

  let ref = db.collection("votes").doc("india");

  db.runTransaction(async t => {

    let doc = await t.get(ref);
    let d = doc.data() || {onoe:0, delimitation:0, combined:0};

    d[type]++;

    t.set(ref, d);

  });

  document.getElementById("status").innerText = "✔ Vote recorded";
}

/* ================= CHARTS ================= */

let bar, pie;

db.collection("votes").doc("india")
.onSnapshot(doc => {

  let d = doc.data() || {onoe:0, delimitation:0, combined:0};

  let values = [d.onoe, d.delimitation, d.combined];

  if (bar) bar.destroy();
  if (pie) pie.destroy();

  bar = new Chart(document.getElementById("bar"), {
    type:"bar",
    data:{
      labels:["ONOE","Delimitation","Combined"],
      datasets:[{data:values, backgroundColor:["#2563eb","#16a34a","#7c3aed"]}]
    }
  });

  pie = new Chart(document.getElementById("pie"), {
    type:"pie",
    data:{
      labels:["ONOE","Delimitation","Combined"],
      datasets:[{data:values}]
    }
  });

});

/* ================= HEATMAP ================= */

db.collection("states").onSnapshot(snap => {

  snap.forEach(doc => {

    let d = doc.data();
    let total = (d.onoe||0)+(d.delimitation||0)+(d.combined||0);

    let el = document.getElementById(doc.id);
    if(!el) return;

    if(total < 30) el.className = "state low";
    else if(total < 60) el.className = "state mid";
    else el.className = "state high";

  });

});

/* ================= TV MODE ================= */

function enableTV() {

  document.documentElement.requestFullscreen();

  document.body.style.background = "black";
  document.body.style.color = "#00ff99";

}

</script>

</body>
</html>
