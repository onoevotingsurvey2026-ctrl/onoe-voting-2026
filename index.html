<!DOCTYPE html>
<html>
<head>
  <title>Global Voting System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      font-family:Arial;
      text-align:center;
      background:#f5f5f5;
      margin:0;
    }

    .box{
      background:white;
      margin:10px;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px #ccc;
    }

    button{
      padding:15px;
      margin:10px;
      width:80%;
      font-size:18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .support{background:green;color:white;}
    .against{background:red;color:white;}
    .login{background:#333;color:white;}
  </style>
</head>

<body>

<h2>🌍 GLOBAL VOTING SYSTEM</h2>

<div class="box">
  <button class="login" onclick="login()">🔐 Login with Google</button>
  <button onclick="logout()">Logout</button>

  <p id="status">NOT LOGGED IN</p>
</div>

<div class="box" id="voteBox" style="display:none;">
  <h3>SELECT YOUR VOTE</h3>

  <button class="support" onclick="setVote('support')">👍 SUPPORT</button>
  <button class="against" onclick="setVote('against')">👎 AGAINST</button>

  <button onclick="submitVote()" style="background:#000;color:white;">SUBMIT VOTE</button>
</div>

<div class="box">
  <h3>LIVE RESULTS</h3>
  <div id="result">Loading...</div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

let user = null;
let selectedVote = null;

/* LOGIN */
function login(){
  auth.signInWithPopup(provider);
}

/* LOGOUT */
function logout(){
  auth.signOut();
}

/* AUTH STATE */
auth.onAuthStateChanged(u => {

  if(u){
    user = u;
    document.getElementById("status").innerText = "LOGGED IN: " + u.email;
    document.getElementById("voteBox").style.display = "block";
  } else {
    user = null;
    document.getElementById("status").innerText = "NOT LOGGED IN";
    document.getElementById("voteBox").style.display = "none";
  }

});

/* SELECT VOTE */
function setVote(v){
  selectedVote = v;
}

/* SUBMIT */
function submitVote(){

  if(!user){
    alert("Please login first");
    return;
  }

  const ref = db.collection("votes").doc(user.email);

  ref.get().then(doc => {

    if(doc.exists){
      alert("Already voted!");
      return;
    }

    ref.set({
      vote: selectedVote,
      time: new Date()
    });

    alert("Vote recorded successfully");

  });

}

/* LIVE COUNT */
db.collection("votes").onSnapshot(snapshot => {

  let support = 0;
  let against = 0;

  snapshot.forEach(doc => {
    let v = doc.data().vote;
    if(v === "support") support++;
    if(v === "against") against++;
  });

  document.getElementById("result").innerHTML =
    "👍 SUPPORT: " + support +
    "<br>👎 AGAINST: " + against;

});

</script>

</body>
</html>
