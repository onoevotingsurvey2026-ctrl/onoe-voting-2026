<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Broadcast Voting Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* 🌌 BACKGROUND */
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #000);
  color: white;
  overflow-x: hidden;
}

/* 📡 LIVE TOP BAR */
.topbar {
  background: rgba(255,255,255,0.05);
  padding: 10px;
  text-align: center;
  font-weight: bold;
  color: #00ffcc;
  box-shadow: 0 0 20px #00ffcc33;
}

/* 🧊 GLASS CARD */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  padding: 15px;
  margin: 10px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,255,204,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 25px rgba(0,255,204,0.3);
}

/* 🔢 NUMBERS */
.card h2 {
  margin: 5px;
  font-size: 18px;
}

.card p {
  font-size: 28px;
  font-weight: bold;
  color: #00ffcc;
}

/* 📰 NEWS TICKER */
.ticker {
  background: rgba(255,255,255,0.05);
  padding: 10px;
  overflow: hidden;
  white-space: nowrap;
}

.ticker-text {
  display: inline-block;
  animation: scroll 10s linear infinite;
  color: #ffcc00;
}

@keyframes scroll {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

/* 🔘 BUTTONS */
.buttons {
  text-align: center;
  margin-top: 10px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: rgba(0,255,204,0.2);
  color: white;
  transition: 0.2s;
}

button:active {
  transform: scale(0.9);
}

/* 📱 MOBILE */
@media(max-width:768px){
  .card p { font-size: 22px; }
}

</style>
</head>

<body>

<div class="topbar">
📺 TV BROADCAST LIVE VOTING NETWORK • INDIA ECI PUBLIC SURVEY • 🔴 LIVE
</div>

<!-- 📰 NEWS TICKER -->
<div class="ticker">
  <div class="ticker-text">
    📢 ONOE Voting Live • 🌍 Global Public Survey Running • 🗳️ Delimitation Debate Active • 📊 Real-time Results Updating • 🔥 ECI Dashboard Broadcast Mode
  </div>
</div>

<div class="container">

<!-- CARDS -->
<div class="card"><h2>ONOE Support</h2><p id="onoeSupport">0</p></div>
<div class="card"><h2>ONOE Against</h2><p id="onoeAgainst">0</p></div>
<div class="card"><h2>Del Support</h2><p id="delSupport">0</p></div>
<div class="card"><h2>Del Against</h2><p id="delAgainst">0</p></div>

<!-- CHART -->
<div class="card">
<canvas id="chart"></canvas>
</div>

<!-- BUTTONS -->
<div class="buttons">

<button onclick="vote('onoeSupport', this)">👇 ONOE Support</button>
<button onclick="vote('onoeAgainst', this)">👇 ONOE Against</button>
<button onclick="vote('delSupport', this)">👇 Del Support</button>
<button onclick="vote('delAgainst', this)">👇 Del Against</button>

<br><br>

<button onclick="resetVotes()">🔄 Reset Votes</button>

</div>

</div>

<script>

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const ref = db.collection("votes").doc("global");

// 📊 CHART
let chart = new Chart(document.getElementById("chart"), {
  type: "bar",
  data: {
    labels: ["ONOE Support","ONOE Against","Del Support","Del Against"],
    datasets: [{
      label: "Votes",
      data: [0,0,0,0],
      backgroundColor: ["#00ffcc","#ff4444","#00ccff","#ffcc00"]
    }]
  }
});

// 🔴 LIVE SYNC
ref.onSnapshot((doc) => {
  if (!doc.exists) return;
  let d = doc.data();

  let values = [
    d.onoeSupport || 0,
    d.onoeAgainst || 0,
    d.delSupport || 0,
    d.delAgainst || 0
  ];

  document.getElementById("onoeSupport").innerText = values[0];
  document.getElementById("onoeAgainst").innerText = values[1];
  document.getElementById("delSupport").innerText = values[2];
  document.getElementById("delAgainst").innerText = values[3];

  chart.data.datasets[0].data = values;
  chart.update();
});

// 🟢 VOTE
function vote(field, btn) {
  ref.update({
    [field]: firebase.firestore.FieldValue.increment(1)
  });

  btn.innerHTML = "✔ Voted";
  btn.disabled = true;
}

// 🔵 RESET
function resetVotes() {
  ref.set({
    onoeSupport: 0,
    onoeAgainst: 0,
    delSupport: 0,
    delAgainst: 0
  });
}

</script>

</body>
</html>
