<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ONOE Voting Dashboard 2026</title>

  <!-- FIREBASE -->

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <style>

    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#0f172a;
      color:white;
      text-align:center;
      overflow-x:hidden;
    }

    header{
      background:#111827;
      padding:20px;
    }

    h1{
      color:#22c55e;
      font-size:28px;
    }

    .box{
      background:#1e293b;
      margin:20px;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.5);
    }

    button{
      padding:12px 20px;
      margin:10px;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
      font-weight:bold;
    }

    .supportBtn{
      background:#22c55e;
      color:white;
    }

    .againstBtn{
      background:#ef4444;
      color:white;
    }

    .loginBtn{
      background:#3b82f6;
      color:white;
    }

    .count{
      font-size:30px;
      color:#facc15;
      font-weight:bold;
    }

    #loginStatus{
      color:#22c55e;
      font-weight:bold;
      margin-top:10px;
    }

    .live{
      color:red;
      font-weight:bold;
      animation:blink 1s infinite;
    }

    @keyframes blink{
      50%{
        opacity:0;
      }
    }

  </style>

</head>

<body>

<header>

  <h1>🌐 Global Election Network</h1>

  <h2>🏛️ Indian Citizen Public Opinion Dashboard 2026</h2>

  <div class="live">🔴 LIVE VOTING ACTIVE</div>

</header>

<br>

<button class="loginBtn" onclick="login()">
  LOGIN WITH GMAIL
</button>

<p id="loginStatus"></p>

<div class="box">

  <h2>🗳️ ONE NATION ONE ELECTION (ONOE)</h2>

  <p>
    👍 SUPPORT :
    <span class="count" id="onoeSupport">0</span>
  </p>

  <p>
    👎 AGAINST :
    <span class="count" id="onoeAgainst">0</span>
  </p>

  <button class="supportBtn" onclick="voteONOESupport()">
    👍 Support ONOE
  </button>

  <button class="againstBtn" onclick="voteONOEAgainst()">
    👎 Against ONOE
  </button>

</div>

<div class="box">

  <h2>📊 DELIMITATION OPINION</h2>

  <p>
    👍 SUPPORT :
    <span class="count" id="delSupport">0</span>
  </p>

  <p>
    👎 AGAINST :
    <span class="count" id="delAgainst">0</span>
  </p>

  <button class="supportBtn" onclick="voteDelSupport()">
    👍 Support Delimitation
  </button>

  <button class="againstBtn" onclick="voteDelAgainst()">
    👎 Against Delimitation
  </button>

</div>

<script>

  // FIREBASE CONFIG

  const firebaseConfig = {

    apiKey: "YOUR_API_KEY",

    authDomain: "YOUR_PROJECT.firebaseapp.com",

    projectId: "YOUR_PROJECT_ID",

    storageBucket: "YOUR_PROJECT.appspot.com",

    messagingSenderId: "YOUR_SENDER_ID",

    appId: "YOUR_APP_ID"

  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();

  const db = firebase.firestore();

  // LOGIN

  function login(){

    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)

    .then((result)=>{

      const user = result.user;

      document.getElementById("loginStatus").innerHTML =
      "✅ Logged in : " + user.email;

    })

    .catch((error)=>{

      alert(error.message);

    });

  }

  // LIVE FETCH

  db.collection("votes")
    .doc("india")
    .onSnapshot((doc)=>{

      if(doc.exists){

        const data = doc.data();

        document.getElementById("onoeSupport").innerHTML =
        data.onoeSupport || 0;

        document.getElementById("onoeAgainst").innerHTML =
        data.onoeAgainst || 0;

        document.getElementById("delSupport").innerHTML =
        data.delSupport || 0;

        document.getElementById("delAgainst").innerHTML =
        data.delAgainst || 0;

      }

    });

  // ONOE SUPPORT

  function voteONOESupport(){

    if(!auth.currentUser){

      alert("Please login first");

      return;

    }

    db.collection("votes")
      .doc("india")
      .update({

        onoeSupport:
        firebase.firestore.FieldValue.increment(1)

      })

      .then(()=>{

        alert("✅ Vote Recorded");

      })

      .catch((error)=>{

        alert(error.message);

      });

  }

  // ONOE AGAINST

  function voteONOEAgainst(){

    if(!auth.currentUser){

      alert("Please login first");

      return;

    }

    db.collection("votes")
      .doc("india")
      .update({

        onoeAgainst:
        firebase.firestore.FieldValue.increment(1)

      })

      .then(()=>{

        alert("✅ Vote Recorded");

      })

      .catch((error)=>{

        alert(error.message);

      });

  }

  // DEL SUPPORT

  function voteDelSupport(){

    if(!auth.currentUser){

      alert("Please login first");

      return;

    }

    db.collection("votes")
      .doc("india")
      .update({

        delSupport:
        firebase.firestore.FieldValue.increment(1)

      })

      .then(()=>{

        alert("✅ Vote Recorded");

      })

      .catch((error)=>{

        alert(error.message);

      });

  }

  // DEL AGAINST

  function voteDelAgainst(){

    if(!auth.currentUser){

      alert("Please login first");

      return;

    }

    db.collection("votes")
      .doc("india")
      .update({

        delAgainst:
        firebase.firestore.FieldValue.increment(1)

      })

      .then(()=>{

        alert("✅ Vote Recorded");

      })

      .catch((error)=>{

        alert(error.message);

      });

  }

</script>

</body>
</html>
