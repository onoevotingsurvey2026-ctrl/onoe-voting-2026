<!DOCTYPE html>
<html>
<head>
  <title>Global Professional Voting Dashboard</title>

  <!-- Firebase v8 (stable for this project) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f4f6f8;
      text-align:center;
    }

    header{
      background:#0f172a;
      color:white;
      padding:15px;
    }

    #loginSection, #dashboard, #adminPanel{
      padding:20px;
    }

    #dashboard, #adminPanel{
      display:none;
    }

    .card{
      background:white;
      margin:10px;
      padding:15px;
      border-radius:10px;
      display:inline-block;
      min-width:200px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    button{
      padding:10px 15px;
      margin:5px;
      cursor:pointer;
    }

    .admin{
      background:#dc2626;
      color:white;
    }
  </style>
</head>

<body>

<header>
  🌍 Global Professional Voting System
</header>

<!-- LOGIN -->
<div id="loginSection">
  <h2>Login to Continue</h2>
  <button onclick="login()">Login with Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <h2>📊 Live Voting Dashboard</h2>

  <div class="card">
    <h3>India</h3>
    <p>ONOE Support: <span id="in_os">0</span></p>
    <p>ONOE Against: <span id="in_oa">0</span></p>
    <p>DEL Support: <span id="in_ds">0</span></p>
    <p>DEL Against: <span id="in_da">0</span></p>
  </div>

  <div class="card">
    <h3>USA</h3>
    <p>ONOE Support: <span id="us_os">0</span></p>
    <p>ONOE Against: <span id="us_oa">0</span></p>
    <p>DEL Support: <span id="us_ds">0</span></p>
    <p>DEL Against: <span id="us_da">0</span></p>
  </div>

  <br>

  <button onclick="vote('india','onoeSupport')">India ONOE +</button>
  <button onclick="vote('india','onoeAgainst')">India ONOE -</button>

  <button onclick="vote('usa','onoeSupport')">USA ONOE +</button>
  <button onclick="vote('usa','onoeAgainst')">USA ONOE -</button>

  <br><br>

  <button class="admin" onclick="openAdmin()">Admin Panel</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h2>🧑‍💼 Admin Panel</h2>

  <p>Only admin can access this</p>

  <button onclick="resetVotes()">Reset All Votes</button>
  <button onclick="logout()">Logout</button>
</div>

<script>

// Firebase Config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

// ADMIN EMAILS
const admins = ["admin@gmail.com"];

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

// LOGOUT
function logout(){
  auth.signOut();
}

// AUTH STATE
auth.onAuthStateChanged((user)=>{
  if(user){
    document.getElementById("loginSection").style.display="none";
    document.getElementById("dashboard").style.display="block";

    if(admins.includes(user.email)){
      document.getElementById("adminPanel").style.display="block";
    }

    loadVotes();
    checkUserVote(user.uid);

  } else {
    document.getElementById("loginSection").style.display="block";
    document.getElementById("dashboard").style.display="none";
    document.getElementById("adminPanel").style.display="none";
  }
});

// ONE USER ONE VOTE CHECK
function checkUserVote(uid){
  db.ref("users/"+uid).once("value", snap=>{
    window.hasVoted = snap.exists();
  });
}

// VOTE FUNCTION
function vote(country,type){
  const user = auth.currentUser;

  if(!user) return;

  if(window.hasVoted){
    alert("You already voted!");
    return;
  }

  db.ref("votes/"+country+"/"+type).transaction(v=> (v||0)+1);

  db.ref("users/"+user.uid).set({voted:true});

  window.hasVoted = true;
}

// LOAD VOTES
function loadVotes(){
  const countries = ["india","usa"];

  countries.forEach(c=>{
    db.ref("votes/"+c).on("value", snap=>{
      const d = snap.val() || {};

      document.getElementById(c.slice(0,2)+"_os").innerText = d.onoeSupport||0;
      document.getElementById(c.slice(0,2)+"_oa").innerText = d.onoeAgainst||0;
      document.getElementById(c.slice(0,2)+"_ds").innerText = d.delSupport||0;
      document.getElementById(c.slice(0,2)+"_da").innerText = d.delAgainst||0;
    });
  });
}

// ADMIN RESET
function resetVotes(){
  db.ref("votes").set({});
  db.ref("users").set({});
  alert("All votes reset");
}

// ADMIN OPEN
function openAdmin(){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("adminPanel").style.display="block";
}

</script>

</body>
</html>
