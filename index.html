<!DOCTYPE html>
<html>
<head>
  <title>Global Live Voting Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      font-family:Arial;
      margin:0;
      background:#0b1220;
      color:white;
      text-align:center;
    }

    .box{
      margin:15px;
      padding:20px;
      background:#ffffff10;
      border-radius:12px;
    }

    button{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .support{background:green;color:white;}
    .against{background:red;color:white;}

    #status{
      font-weight:bold;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🌍 GLOBAL LIVE VOTING DASHBOARD</h2>

  <button onclick="login()">Login with Google</button>
  <button onclick="logout()">Logout</button>

  <div id="status">NOT LOGGED IN</div>
</div>

<div class="box" id="voteBox" style="display:none;">
  <h3>SELECT YOUR VOTE</h3>

  <button class="support" onclick="setVote('support')">SUPPORT</button>
  <button class="against" onclick="setVote('against')">AGAINST</button>

  <br><br>
  <button onclick="submitVote()">SUBMIT VOTE</button>
</div>

<div class="box">
  <h3>LIVE RESULTS</h3>
  <div id="results">Loading...</div>
</div>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;
let selectedVote = null;

/* LOGIN */
function login(){
  auth.signInWithPopup(provider);
}

/* LOGOUT */
function logout(){
  auth.signOut();
}

/* AUTH STATE */
auth.onAuthStateChanged(user => {

  if(user){
    currentUser = user;

    document.getElementById("status").innerText =
      "LOGGED IN: " + user.email;

    document.getElementById("voteBox").style.display = "block";

    loadLive();

  } else {
    currentUser = null;

    document.getElementById("status").innerText =
      "NOT LOGGED IN";

    document.getElementById("voteBox").style.display = "none";
  }

});

/* SET VOTE */
function setVote(v){
  selectedVote = v;
}

/* SUBMIT VOTE */
function submitVote(){

  if(!currentUser){
    alert("Please login first");
    return;
  }

  if(!selectedVote){
    alert("Select vote first");
    return;
  }

  const ref = db.collection("votes").doc(currentUser.email);

  ref.get().then(doc => {

    if(doc.exists){
      alert("You already voted!");
      return;
    }

    ref.set({
      vote: selectedVote,
      time: new Date()
    });

    alert("Vote successfully recorded");

  });

}

/* LIVE DASHBOARD */
function loadLive(){

  db.collection("votes").onSnapshot(snapshot => {

    let support = 0;
    let against = 0;

    snapshot.forEach(doc => {
      let v = doc.data().vote;
      if(v === "support") support++;
      if(v === "against") against++;
    });

    document.getElementById("results").innerHTML =
      "👍 SUPPORT: " + support +
      "<br>👎 AGAINST: " + against;

  });

}

</script>

</body>
</html>
