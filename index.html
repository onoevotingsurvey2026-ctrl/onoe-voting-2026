<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Global Indian Vote Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#0d47a1;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:10px}
button{padding:10px;margin:5px;border:none;border-radius:5px;cursor:pointer}
.support{background:green;color:#fff}
.against{background:red;color:#fff}
.reset{background:gray;color:#fff}
</style>

</head>
<body>

<header>
🌍 Global Indian Vote Dashboard  
🗳️ Digital Democracy Platform
</header>

<div class="container">

<div class="card">
<h3>Login</h3>
<button onclick="googleLogin()">Login with Google</button>
<p id="user"></p>
</div>

<div class="card">
<h3>Vote Panel</h3>
<button class="support" onclick="vote('support')">👍 SUPPORT</button>
<button class="against" onclick="vote('against')">👎 AGAINST</button>
<button class="reset" onclick="resetVote()">RESET</button>
</div>

<div class="card">
<h3>Voice Guide</h3>
<button onclick="playPolicy()">▶ Play Policy</button>
<audio id="policyAudio" controls></audio>
</div>

<div class="card">
<h3>Live Result</h3>
<p>Support: <span id="s">0</span></p>
<p>Against: <span id="a">0</span></p>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- CONFIG FILE (BEST PRACTICE) -->
<script src="firebase-config.js"></script>

<script>
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser=null;

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user;
    document.getElementById("user").innerText=user.email;
  }
});

function googleLogin(){
  let provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function vote(type){
  if(!currentUser){alert("Login required");return;}

  db.ref("votes/"+currentUser.uid).once("value",snap=>{
    if(snap.exists()){
      alert("Already voted");
    } else {
      db.ref("votes/"+currentUser.uid).set({
        email:currentUser.email,
        vote:type
      });
      alert("Vote recorded");
    }
  });
}

function resetVote(){
  if(currentUser){
    db.ref("votes/"+currentUser.uid).remove();
  }
}

db.ref("votes").on("value",snap=>{
  let data=snap.val()||{};
  let s=0,a=0;

  Object.values(data).forEach(v=>{
    if(v.vote=="support")s++;
    if(v.vote=="against")a++;
  });

  document.getElementById("s").innerText=s;
  document.getElementById("a").innerText=a;
});

function playPolicy(){
  let audio=document.getElementById("policyAudio");
  audio.src="policy-intro.mp3";
  audio.play();
}
</script>

</body>
</html>
