<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ultra Glass Voting Dashboard</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  height:100vh;
  background: linear-gradient(135deg,#1f1c2c,#928dab);
  display:flex;
  justify-content:center;
  align-items:center;
}

.glass{
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 25px;
  width: 90%;
  max-width: 400px;
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  color:white;
  text-align:center;
}

h2{ margin-bottom:20px; }

input{
  width:90%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  width:95%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.login-btn{ background:#00c6ff; color:white; }
.google-btn{ background:#ff4b5c; color:white; }

.dashboard{
  display:none;
}

.vote-btn{
  width:45%;
  margin:5px;
}

.support{ background:#00ff9d; }
.against{ background:#ff4b5c; }

.counter{
  margin-top:15px;
}
</style>
</head>
<body>

<!-- LOGIN BOX -->
<div class="glass" id="loginBox">
  <h2>🔥 Voting Login</h2>

  <input type="email" id="email" placeholder="Enter Email" />
  <input type="password" id="password" placeholder="Enter Password" />

  <button class="login-btn" onclick="login()">Login</button>
  <button class="google-btn" onclick="googleLogin()">Google Login</button>

  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div class="glass dashboard" id="dashboard">
  <h2>🗳️ Voting Dashboard</h2>

  <button class="vote-btn support" onclick="vote('support')">Support 👍</button>
  <button class="vote-btn against" onclick="vote('against')">Against 👎</button>

  <div class="counter">
    <p>Support: <span id="supportCount">0</span></p>
    <p>Against: <span id="againstCount">0</span></p>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script>
// Dummy UI logic (Firebase connect later)

function login(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("dashboard").style.display="block";
}

function googleLogin(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("dashboard").style.display="block";
}

function logout(){
  document.getElementById("loginBox").style.display="block";
  document.getElementById("dashboard").style.display="none";
}

let support=0;
let against=0;

function vote(type){
  if(type==='support') support++;
  else against++;

  document.getElementById("supportCount").innerText=support;
  document.getElementById("againstCount").innerText=against;
}
</script>

</body>
</html>
