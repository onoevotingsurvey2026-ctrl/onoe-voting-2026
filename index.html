<!DOCTYPE html>
<html>
<head>
  <title>INDIA ECI LIVE DASHBOARD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#06121f,#142a44);
      color:white;
    }

    .header{
      text-align:center;
      padding:18px;
      font-size:22px;
      font-weight:bold;
      background:#0f172a;
      border-bottom:2px solid #2196F3;
    }

    .panel{
      margin:15px;
      padding:15px;
      background:rgba(255,255,255,0.08);
      border-radius:15px;
      backdrop-filter:blur(10px);
      text-align:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:15px;
      padding:15px;
    }

    .box{
      background:rgba(255,255,255,0.08);
      padding:20px;
      border-radius:15px;
      text-align:center;
    }

    .big{
      font-size:28px;
      font-weight:bold;
      margin-top:10px;
    }

    .support{color:#4CAF50;}
    .against{color:#f44336;}

    button{
      padding:10px 15px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      margin:5px;
    }

    .login{background:#2196F3;color:white;}
    .vote{background:#4CAF50;color:white;}

    .status{
      font-size:14px;
      opacity:0.8;
    }
  </style>
</head>

<body>

<div class="header">
🇮🇳 INDIA ECI GLOBAL LIVE DASHBOARD
</div>

<!-- LOGIN -->
<div class="panel">
  <button class="login" onclick="login()">🔐 Google Login</button>
  <p id="user">NOT LOGGED IN</p>
</div>

<!-- VOTE -->
<div class="grid">
  <div class="box">
    <button class="vote" onclick="vote('support')">👍 SUPPORT</button>
  </div>

  <div class="box">
    <button class="vote" onclick="vote('against')">👎 AGAINST</button>
  </div>
</div>

<!-- LIVE RESULTS -->
<div class="grid">

  <div class="box">
    <div class="support">SUPPORT</div>
    <div id="support" class="big">0</div>
  </div>

  <div class="box">
    <div class="against">AGAINST</div>
    <div id="against" class="big">0</div>
  </div>

  <div class="box">
    <div>TOTAL</div>
    <div id="total" class="big">0</div>
  </div>

</div>

<div class="panel status">
📊 LIVE SYSTEM CONNECTED • INDIA ELECTION DASHBOARD ACTIVE
</div>

<script>

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

/* LOGIN */
function login(){
  auth.signInWithRedirect(provider);
}

/* USER STATE */
auth.onAuthStateChanged(user=>{
  document.getElementById("user").innerText =
    user ? "LOGGED IN: " + user.email : "NOT LOGGED IN";
});

/* VOTE */
function vote(type){
  const user = auth.currentUser;

  if(!user){
    alert("Please login first");
    return;
  }

  db.collection("votes").add({
    uid:user.uid,
    vote:type,
    time:Date.now()
  });
}

/* LIVE COUNT */
db.collection("votes").onSnapshot(snapshot=>{
  let support=0;
  let against=0;

  snapshot.forEach(doc=>{
    let v = doc.data().vote;
    if(v==="support") support++;
    if(v==="against") against++;
  });

  document.getElementById("support").innerText=support;
  document.getElementById("against").innerText=against;
  document.getElementById("total").innerText=support+against;
});

</script>

</body>
</html>
