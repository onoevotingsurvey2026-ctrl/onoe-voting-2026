<!DOCTYPE html>
<html>
<head>
  <title>GLOBAL VOTING DASHBOARD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family: Arial;
      background:#0b1220;
      color:white;
      text-align:center;
      margin:0;
    }

    .box{
      margin:15px;
      padding:20px;
      background:#ffffff10;
      border-radius:12px;
    }

    .big{
      font-size:22px;
      margin:10px 0;
    }

    .support{color:#4caf50;}
    .against{color:#ff5252;}
  </style>
</head>

<body>

<h2>🌍 GLOBAL VOTING DASHBOARD (STABLE BASE)</h2>

<div class="box">
  <div class="big support">👍 SUPPORT: <span id="support">0</span></div>
  <div class="big against">👎 AGAINST: <span id="against">0</span></div>
</div>

<div class="box">
  <h3>LIVE SYSTEM STATUS</h3>
  <p id="status">SYSTEM RUNNING (NO LOGIN MODE)</p>
</div>

<script>

/* 🔥 DEMO LIVE DATA ENGINE (NO FIREBASE DEPENDENCY) */
let support = 0;
let against = 0;

/* simulate live voting updates */
setInterval(() => {

  support += Math.floor(Math.random() * 3);
  against += Math.floor(Math.random() * 2);

  document.getElementById("support").innerText = support;
  document.getElementById("against").innerText = against;

}, 2000);

/* system status */
console.log("GLOBAL DASHBOARD RUNNING");

</script>

</body>
</html>
