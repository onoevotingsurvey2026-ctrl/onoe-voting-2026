<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#081229;
color:white;
padding:20px;
}

.main-title{
text-align:center;
margin-bottom:30px;
}

.login-wrapper{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
margin-bottom:30px;
}

.panel{
background:#132046;
padding:25px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.panel h2{
margin-bottom:20px;
text-align:center;
}

input,
select{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
font-size:15px;
outline:none;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
color:white;
}

button:hover{opacity:0.9;}

.voter-btn{background:#2f6df6;}
.admin-btn{background:#8e44ad;}
.support-btn{background:#00a651;}
.neutral-btn{background:#777;}
.oppose-btn{background:#d62828;}
.reset-btn{background:red;}
.download-btn{background:#2f6df6;}
.logout-btn{background:#444;}

.section{
background:#132046;
padding:25px;
border-radius:20px;
margin-top:25px;
}

.status-panel{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.status-box{
background:#1f2f63;
padding:20px;
border-radius:15px;
text-align:center;
}

.vote-buttons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.admin-buttons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

canvas{
background:white;
border-radius:15px;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th, table td{
border:1px solid #555;
padding:10px;
text-align:center;
}

#dashboard{display:none;}
#adminControls{display:none;}

.footer{
text-align:center;
margin-top:30px;
color:#bbb;
padding-bottom:30px;
}

</style>
</head>

<body>

🏛 Global Indian Vote 2026<br>
Civic Voting & Analytics Platform
</h1>
