<!DOCTYPE html>
<html>
<head>
  <title>ONOE + DEL TV Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#000;
      color:white;
    }

    .topbar{
      background:#b30000;
      padding:10px;
      text-align:center;
      font-weight:bold;
    }

    .header{
      text-align:center;
      padding:15px;
      background:#111;
    }

    .title{
      font-size:22px;
      font-weight:bold;
    }

    .subtitle{
      font-size:13px;
      color:#aaa;
      margin-top:5px;
    }

    .grid{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-top:30px;
    }

    .card{
      background:#1c1c1c;
      padding:25px;
      border-radius:12px;
      width:220px;
      text-align:center;
    }

    .label{
      font-size:14px;
      color:#ccc;
    }

    .num{
      font-size:60px;
      font-weight:bold;
      margin-top:10px;
    }

    .green{color:#00ff7f;}
    .red{color:#ff4d4d;}

    .footer{
      position:fixed;
      bottom:0;
      width:100%;
      background:#111;
      padding:10px;
      text-align:center;
      font-size:12px;
      color:#aaa;
    }
  </style>
</head>

<body>

<div class="topbar">
📡 LIVE TV BROADCAST | ONOE + DEL REAL TIME RESULTS
</div>

<div class="header">
  <div class="title">🇮🇳 INDIA PUBLIC OPINION DASHBOARD</div>
  <div class="subtitle">
    ONOE (One Nation One Election) | DEL (Delimitation)
  </div>
</div>

<div class="grid">

  <div class="card">
    <div class="label">🟢 ONOE SUPPORT</div>
    <div class="num green" id="os">0</div>
  </div>

  <div class="card">
    <div class="label">🔴 ONOE AGAINST</div>
    <div class="num red" id="oa">0</div>
  </div>

  <div class="card">
    <div class="label">🟢 DEL SUPPORT</div>
    <div class="num green" id="ds">0</div>
  </div>

  <div class="card">
    <div class="label">🔴 DEL AGAINST</div>
    <div class="num red" id="da">0</div>
  </div>

</div>

<div class="footer">
LIVE DATA • GLOBAL VOTING NETWORK • AUTO REFRESH
</div>

<script>
/* 🔥 FIREBASE CONFIG (replace yours) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 📊 LIVE LISTENER */
db.ref("stats").on("value", snap => {

  let d = snap.val() || {};

  let onoe = d.ONOE || {};
  let del = d.DEL || {};

  document.getElementById("os").innerText = onoe.support || 0;
  document.getElementById("oa").innerText = onoe.against || 0;
  document.getElementById("ds").innerText = del.support || 0;
  document.getElementById("da").innerText = del.against || 0;

});
</script>

</body>
</html>
