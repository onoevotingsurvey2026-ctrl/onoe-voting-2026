<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Indian Vote - Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

/* HEADER */
header{
  background:#0b1220;
  padding:20px;
  text-align:center;
  border-bottom:2px solid #22c55e;
}

header h1{
  margin:0;
  font-size:26px;
}

header p{
  margin:5px 0 0;
  opacity:0.8;
}

/* CARD */
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,255,150,0.1);
  text-align:center;
}

/* BUTTONS */
button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.support{background:#22c55e;color:black;}
.neutral{background:#facc15;color:black;}
.oppose{background:#ef4444;color:white;}
.login{background:#3b82f6;color:white;}

/* NUMBERS */
.big{
  font-size:32px;
  font-weight:bold;
}

/* CHART */
canvas{
  max-width:100%;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  background:#0b1220;
  margin-top:20px;
  font-size:12px;
  opacity:0.8;
}
</style>
</head>

<body>

<header>
<h1>🗳️ Global Indian Vote</h1>
<p>Real-Time Civic Opinion Dashboard</p>
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="card">
    <h3>👤 User Login</h3>
    <p id="userInfo">Not Logged In</p>
    <button class="login" onclick="login()">Login Gmail</button>
  </div>

  <!-- VOTE -->
  <div class="card">
    <h3>🗳️ Cast Your Vote</h3>
    <button class="support" onclick="vote('support')">Support</button>
    <button class="neutral" onclick="vote('neutral')">Neutral</button>
    <button class="oppose" onclick="vote('oppose')">Oppose</button>
  </div>

  <!-- RESULTS -->
  <div class="card">
    <h3>📊 Live Results</h3>
    <p>Support: <span class="big" id="s">0</span></p>
    <p>Neutral: <span class="big" id="n">0</span></p>
    <p>Oppose: <span class="big" id="o">0</span></p>
    <p>Total: <span class="big" id="t">0</span></p>
  </div>

  <!-- CHART -->
  <div class="card">
    <h3>📈 Analytics</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<footer>
© 2026 Global Indian Vote | Live Analytics Platform
</footer>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = null;

/* LOGIN */
function login(){
  let email = prompt("Enter Gmail ID");

  if(email && email.includes("@gmail.com")){
    currentUser = email;
    document.getElementById("userInfo").innerText = "Logged in: " + email;
  } else {
    alert("Invalid Gmail");
  }
}

/* VOTE */
function vote(type){

  if(!currentUser){
    alert("Login required");
    return;
  }

  db.ref("user_votes/" + currentUser).set({
    vote: type,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  });
}

/* LIVE DATA */
db.ref("user_votes").on("value", (snapshot)=>{

  let data = snapshot.val() || {};

  let s=0,n=0,o=0;

  Object.values(data).forEach(v=>{
    if(v.vote==="support") s++;
    if(v.vote==="neutral") n++;
    if(v.vote==="oppose") o++;
  });

  document.getElementById("s").innerText = s;
  document.getElementById("n").innerText = n;
  document.getElementById("o").innerText = o;
  document.getElementById("t").innerText = s+n+o;

  chart.data.datasets[0].data = [s,n,o];
  chart.update();
});

/* CHART */
const chart = new Chart(document.getElementById("chart"), {
type:'pie',
data:{
  labels:['Support','Neutral','Oppose'],
  datasets:[{
    data:[0,0,0],
    backgroundColor:['#22c55e','#facc15','#ef4444']
  }]
},
options:{
  responsive:true
}
});

</script>

</body>
</html>
