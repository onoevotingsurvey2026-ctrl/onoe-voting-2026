<!DOCTYPE html>
<html>
<head>
  <title>ONOE Vote Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0b1220; color:white; text-align:center; }
    header { padding:15px; background:#111827; border-bottom:2px solid red; }

    .top { display:flex; justify-content:space-between; padding:10px; background:#1f2937; }

    button { padding:10px; margin:5px; border:none; border-radius:6px; cursor:pointer; }

    .vote { width:220px; }
    .onoe { background:#2563eb; color:white; }
    .delim { background:#16a34a; color:white; }
    .comb { background:#7c3aed; color:white; }

    #dashboard { display:none; }
    .box { width:90%; margin:auto; margin-top:20px; }

    .live { color:red; font-weight:bold; }
  </style>
</head>

<body>

<header>
🏛️ ONOE & Delimitation Public Opinion Dashboard  
<br>
<span class="live">🔴 LIVE</span>
</header>

<div class="top">
  <div id="user">👤 Guest</div>
  <button onclick="login()">Google Login</button>
</div>

<div id="loginBox">
  <h3>Login to Vote</h3>
</div>

<div id="dashboard">

  <h3>Vote Options</h3>

  <button class="vote onoe" onclick="vote('onoe')">ONOE</button>
  <button class="vote delim" onclick="vote('delimitation')">Delimitation</button>
  <button class="vote comb" onclick="vote('combined')">Combined</button>

  <p id="status"></p>

  <div class="box">
    <canvas id="bar"></canvas>
  </div>

  <div class="box">
    <canvas id="pie"></canvas>
  </div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let user = null;
let voted = false;

/* 🔐 LOGIN FIX */
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(res => {
      console.log("Login success", res.user.email);
    })
    .catch(err => {
      console.log(err.code, err.message);  // 🔴 IMPORTANT DEBUG
      alert("Login Error: " + err.message);
    });
}

/* AUTH STATE */
auth.onAuthStateChanged(u => {
  if (u) {
    user = u;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("user").innerText = "👤 " + u.email;

    checkVote();
  }
});

/* CHECK VOTE */
function checkVote() {
  db.collection("userVotes").doc(user.uid).get().then(doc => {
    if (doc.exists) voted = true;
  });
}

/* VOTE */
function vote(type) {
  if (voted) return;

  let ref = db.collection("votes").doc("india");

  db.runTransaction(async t => {
    let doc = await t.get(ref);
    let d = doc.data() || {onoe:0, delimitation:0, combined:0};

    d[type] = (d[type] || 0) + 1;

    t.set(ref, d);
  });

  voted = true;
  document.getElementById("status").innerText = "Vote recorded";
}

/* LIVE */
let bar, pie;

db.collection("votes").doc("india")
.onSnapshot(doc => {

  let d = doc.data() || {onoe:0, delimitation:0, combined:0};

  let values = [d.onoe, d.delimitation, d.combined];

  if (bar) bar.destroy();
  bar = new Chart(document.getElementById("bar"), {
    type: "bar",
    data: { labels:["ONOE","Delim","Comb"], datasets:[{data:values}] }
  });

  if (pie) pie.destroy();
  pie = new Chart(document.getElementById("pie"), {
    type: "pie",
    data: { labels:["ONOE","Delim","Comb"], datasets:[{data:values}] }
  });

});

</script>

</body>
</html>
