<!DOCTYPE html>
<html>
<head>
  <title>Global Voting - Production</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color:white;
      text-align:center;
    }

    .box{
      background:rgba(255,255,255,0.10);
      backdrop-filter:blur(10px);
      margin:15px;
      padding:20px;
      border-radius:15px;
    }

    button{
      padding:10px 15px;
      margin:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .support{background:green;color:white;}
    .against{background:red;color:white;}

    #toast{
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:#222;
      padding:10px 20px;
      border-radius:8px;
      display:none;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>GLOBAL VOTING SYSTEM</h2>

  <button onclick="login()">Login with Google</button>
  <button onclick="logout()">Logout</button>

  <p id="status">Please login</p>
</div>

<div class="box" id="dashboardBox" style="display:none;">
  <h3>SELECT YOUR VOTE</h3>

  <button class="support" onclick="vote('support')">👍 SUPPORT</button>
  <button class="against" onclick="vote('against')">👎 AGAINST</button>

  <br><br>

  <button onclick="submitVote()">SUBMIT VOTE</button>
</div>

<div class="box">
  <h3>LIVE DASHBOARD</h3>
  <div id="dashboard">Loading...</div>
</div>

<div id="toast"></div>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const provider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;
let selectedVote = null;

/* 🔐 LOGIN (PRODUCTION SAFE) */
function login(){
  auth.signInWithPopup(provider)
  .catch(() => {
    auth.signInWithRedirect(provider);
  });
}

/* 🔁 REDIRECT HANDLER */
auth.getRedirectResult().catch(()=>{});

/* 👤 AUTH STATE (FIXED CORE) */
auth.onAuthStateChanged(user => {

  if(user){
    currentUser = user;

    document.getElementById("status").innerHTML =
      "LOGGED IN: " + user.email;

    document.getElementById("dashboardBox").style.display = "block";

    loadLive();

  } else {

    currentUser = null;

    document.getElementById("status").innerHTML =
      "NOT LOGGED IN";

    document.getElementById("dashboardBox").style.display = "none";
  }

});

/* 🚪 LOGOUT */
function logout(){
  auth.signOut();
  showToast("Logged out");
}

/* 🗳 SELECT VOTE */
function vote(v){
  selectedVote = v;
  showToast("Selected: " + v);
}

/* 📤 SUBMIT VOTE (ONE USER ONE VOTE) */
function submitVote(){

  if(!currentUser){
    alert("Please login");
    return;
  }

  const ref = db.collection("votes").doc(currentUser.email);

  ref.get().then(doc => {

    if(doc.exists){
      showToast("❌ Already voted");
      return;
    }

    ref.set({
      vote: selectedVote,
      time: new Date()
    });

    showToast("🎉 VOTE RECORDED SUCCESSFULLY");

  });

}

/* 📊 LIVE DASHBOARD */
function loadLive(){

  db.collection("votes").onSnapshot(snapshot => {

    let support = 0;
    let against = 0;

    snapshot.forEach(doc => {
      let v = doc.data().vote;
      if(v === "support") support++;
      if(v === "against") against++;
    });

    document.getElementById("dashboard").innerHTML =
      "👍 SUPPORT: " + support + "<br>👎 AGAINST: " + against;

  });

}

/* 📱 TOAST */
function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";

  setTimeout(()=> t.style.display="none", 2500);
}

</script>

</body>
</html>
