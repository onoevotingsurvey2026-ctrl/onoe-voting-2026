<!DOCTYPE html>
<html>
<head>
  <title>ONOE + DEL Live Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0f1a;
      color:white;
      text-align:center;
    }

    .header{
      padding:15px;
      background:#111a33;
    }

    .grid{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-top:30px;
    }

    .card{
      background:#1e1e1e;
      padding:25px;
      border-radius:14px;
      width:220px;
    }

    .title{
      font-size:18px;
      margin-bottom:10px;
    }

    .num{
      font-size:50px;
      font-weight:bold;
    }

    .btn{
      padding:10px;
      margin:5px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .green{background:green;color:white;}
    .red{background:red;color:white;}
    .blue{background:blue;color:white;}
  </style>
</head>

<body>

<div class="header">
  <h2>📊 ONOE + DEL LIVE DASHBOARD</h2>
</div>

<h3>🗳️ VOTE CONTROLS</h3>

<button class="green" onclick="vote('ONOE','support')">ONOE SUPPORT</button>
<button class="red" onclick="vote('ONOE','against')">ONOE AGAINST</button>
<button class="green" onclick="vote('DEL','support')">DEL SUPPORT</button>
<button class="red" onclick="vote('DEL','against')">DEL AGAINST</button>

<hr>

<h3>📊 LIVE RESULTS</h3>

<div class="grid">

  <div class="card">
    <div class="title">🟢 ONOE SUPPORT</div>
    <div class="num" id="os">0</div>
  </div>

  <div class="card">
    <div class="title">🔴 ONOE AGAINST</div>
    <div class="num" id="oa">0</div>
  </div>

  <div class="card">
    <div class="title">🟢 DEL SUPPORT</div>
    <div class="num" id="ds">0</div>
  </div>

  <div class="card">
    <div class="title">🔴 DEL AGAINST</div>
    <div class="num" id="da">0</div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* VOTE FUNCTION */
function vote(type, choice){
  let id = "u_" + Date.now();

  db.ref("stats/" + type + "/" + choice).transaction(val => {
    return (val || 0) + 1;
  });
}

/* LIVE UPDATE */
db.ref("stats").on("value", snap => {

  let data = snap.val() || {};

  let os = data.ONOE?.support || 0;
  let oa = data.ONOE?.against || 0;
  let ds = data.DEL?.support || 0;
  let da = data.DEL?.against || 0;

  document.getElementById("os").innerText = os;
  document.getElementById("oa").innerText = oa;
  document.getElementById("ds").innerText = ds;
  document.getElementById("da").innerText = da;

});
</script>

</body>
</html>
