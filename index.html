<!DOCTYPE html>
<html>
<head>
  <title>India Civic Live Data Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b1220;
      color:white;
    }

    .header {
      background:#111827;
      padding:15px;
      text-align:center;
      color:#00ffcc;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:10px;
    }

    .card {
      background:rgba(255,255,255,0.05);
      padding:15px;
      border-radius:10px;
      border:1px solid #00ffcc33;
    }

    #map {
      height:400px;
      margin:10px;
      border-radius:10px;
    }

    .ticker {
      background:black;
      color:#00ffcc;
      padding:5px;
      overflow:hidden;
      white-space:nowrap;
    }
  </style>
</head>

<body>

<div class="header">
  🇮🇳 INDIA CIVIC LIVE DATA DASHBOARD
</div>

<div class="ticker">
  ONOE vs DELIMITATION | REAL DATA CIVIC ANALYSIS | LIVE DASHBOARD ACTIVE |
</div>

<div class="grid">

  <div class="card">
    <h3>📊 LIVE ANALYTICS</h3>
    <p id="analytics">Loading...</p>
  </div>

  <div class="card">
    <h3>🧠 INSIGHTS</h3>
    <p id="insight">Processing data...</p>
  </div>

</div>

<div id="map"></div>

<script>

const indiaData = {
  onoe: 45,
  delim: 35,
  combo: 20,

  tn: 0.8,
  dl: 0.6,
  mh: 0.5
};

// 🧠 ANALYTICS
function updateAnalytics(v){
  let total = v.onoe + v.delim + v.combo;

  document.getElementById("analytics").innerHTML =
    "ONOE: " + (v.onoe/total*100).toFixed(1) + "%<br>" +
    "DELIMITATION: " + (v.delim/total*100).toFixed(1) + "%<br>" +
    "COMBINED: " + (v.combo/total*100).toFixed(1) + "%";
}

// 🧠 INSIGHT
function insight(v){
  let msg = "Balanced civic opinion";

  if(v.onoe > v.delim) msg = "ONOE leaning trend";
  if(v.delim > v.onoe) msg = "Delimitation leaning trend";

  document.getElementById("insight").innerText = msg;
}

// 🗺️ MAP
let map = L.map('map').setView([20.5937, 78.9629], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'India Civic Map'
}).addTo(map);

function heat(){
  let heatData = [
    [13.0827, 80.2707, indiaData.tn],
    [28.7041, 77.1025, indiaData.dl],
    [19.0760, 72.8777, indiaData.mh]
  ];

  L.heatLayer(heatData, {radius:25}).addTo(map);
}

// INIT
updateAnalytics(indiaData);
insight(indiaData);
heat();

</script>

</body>
</html>
