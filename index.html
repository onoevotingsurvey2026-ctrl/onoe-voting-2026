<!DOCTYPE html>
<html>
<head>
  <title>ONOE & Delimitation Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    body {
      margin:0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    header {
      text-align:center;
      padding:15px;
      background:#111827;
      border-bottom:2px solid red;
    }

    .live {
      color:red;
      font-weight:bold;
    }

    .top {
      display:flex;
      justify-content:space-between;
      padding:10px;
      background:#1f2937;
      flex-wrap:wrap;
    }

    button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .vote {
      width:220px;
      font-size:16px;
    }

    .onoe { background:#2563eb; color:white; }
    .delim { background:#16a34a; color:white; }
    .comb { background:#7c3aed; color:white; }

    #loginBox {
      text-align:center;
      margin-top:40px;
    }

    #dashboard {
      text-align:center;
    }

    .chart-box {
      width:80%;
      margin:auto;
      margin-top:20px;
    }

    #user {
      font-weight:bold;
    }

    /* ================= MOBILE MODE ================= */

    @media (max-width:768px) {

      .top {
        flex-direction:column;
        align-items:center;
      }

      .vote {
        width:95%;
      }

      .chart-box {
        width:98%;
      }

      header {
        font-size:14px;
      }
    }

  </style>
</head>

<body>

<header>
🏛️ ஒரே நாடு ஒரே தேர்தல் & தொகுதி மறுசீரமைப்பு  
<br>
ONOE & Delimitation Public Opinion Dashboard  
<br>
<span class="live">🔴 LIVE / நேரலை</span>
<p style="font-size:13px;color:#9ca3af;">
👥 மக்கள் கருத்து சேகரிப்பு அமைப்பு | Public Opinion System
</p>
</header>

<div class="top">
  <div id="user">👤 Guest / விருந்தினர்</div>

  <div>
    <button onclick="login()">🔑 Google Login</button>
    <button onclick="document.body.requestFullscreen()">📺 TV Mode</button>
  </div>
</div>

<div id="loginBox">
  <h3>Login to Vote / வாக்களிக்க உள்நுழையவும்</h3>
  <p style="color:gray;">Live results updating instantly</p>
</div>

<div id="dashboard" style="display:none">

  <h3>🗳️ Vote Options</h3>

  <button class="vote onoe" onclick="vote('onoe')">ONOE</button>
  <button class="vote delim" onclick="vote('delimitation')">Delimitation</button>
  <button class="vote comb" onclick="vote('combined')">Combined</button>

  <p id="status"></p>

  <div class="chart-box">
    <canvas id="bar"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="pie"></canvas>
  </div>

</div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let user = null;
let voted = false;

/* LOGIN */
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(res => console.log("Login success"))
    .catch(err => console.log(err.code, err.message));
}

/* AUTH */
auth.onAuthStateChanged(u => {
  if (u) {
    user = u;
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("user").innerText = "👤 " + u.email;
  }
});

/* VOTE */
function vote(type) {
  let ref = db.collection("votes").doc("india");

  db.runTransaction(async t => {
    let doc = await t.get(ref);
    let d = doc.data() || {onoe:0, delimitation:0, combined:0};

    d[type] = (d[type] || 0) + 1;

    t.set(ref, d);
  });

  document.getElementById("status").innerText = "Vote recorded ✔";
}

/* LIVE CHART */
let bar, pie;

db.collection("votes").doc("india")
.onSnapshot(doc => {

  let d = doc.data() || {onoe:0, delimitation:0, combined:0};

  let values = [d.onoe, d.delimitation, d.combined];

  if (bar) bar.destroy();
  bar = new Chart(document.getElementById("bar"), {
    type: "bar",
    data: {
      labels:["ONOE","Delim","Comb"],
      datasets:[{ data:values, backgroundColor:["#2563eb","#16a34a","#7c3aed"] }]
    }
  });

  if (pie) pie.destroy();
  pie = new Chart(document.getElementById("pie"), {
    type: "pie",
    data: {
      labels:["ONOE","Delim","Comb"],
      datasets:[{ data:values }]
    }
  });

});

</script>

</body>
</html>
