<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Firebase Live Election Engine v1.3</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:#111827;
    padding:20px;
    margin-top:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    color:#22c55e;
}

h2{
    color:#38bdf8;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:6px;
    font-size:16px;
    font-weight:bold;
}

.login-btn{
    background:#ffffff;
    color:#000;
}

.support-btn{
    background:#16a34a;
    color:white;
}

.against-btn{
    background:#dc2626;
    color:white;
}

.status{
    margin-top:10px;
    color:#22c55e;
    font-weight:bold;
}

.stats{
    font-size:20px;
    line-height:2;
}

.ai-box{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#94a3b8;
}

@media(max-width:600px){

    h1{
        font-size:24px;
    }

    button{
        width:100%;
    }

}

</style>

</head>
<body>

<div class="container">

<h1>
🌐 Global Firebase Live Election Engine v1.3
</h1>

<!-- LOGIN -->

<div class="card">

<button class="login-btn" onclick="login()">
Login with Google
</button>

<div id="userInfo" class="status">
Not Logged In
</div>

</div>

<!-- LIVE STATS -->

<div class="card">

<h2>📊 Live Election Stats</h2>

<div class="stats">

<div>
ONOE + :
<span id="onoeSupport">0</span>
</div>

<div>
ONOE - :
<span id="onoeAgainst">0</span>
</div>

<div>
DEL + :
<span id="delSupport">0</span>
</div>

<div>
DEL - :
<span id="delAgainst">0</span>
</div>

</div>

</div>

<!-- VOTING PANEL -->

<div class="card">

<h2>🗳 Voting Panel</h2>

<button class="support-btn"
onclick="voteONOESupport()">
ONOE +
</button>

<button class="against-btn"
onclick="voteONOEAgainst()">
ONOE -
</button>

<button class="support-btn"
onclick="voteDELSupport()">
DEL +
</button>

<button class="against-btn"
onclick="voteDELAgainst()">
DEL -
</button>

</div>

<!-- AI PREDICTION -->

<div class="card">

<h2>🧠 AI Prediction</h2>

<div class="ai-box" id="prediction">

Loading AI Analysis...

</div>

</div>

<!-- SECURITY -->

<div class="card">

<h2>🔒 Security Status</h2>

<p>
Firebase Live Sync Active |
Fraud Protection Enabled
</p>

</div>

<div class="footer">
Powered by Firebase + GitHub Pages
</div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {

  apiKey: "YOUR_API_KEY",

  authDomain: "YOUR_PROJECT.firebaseapp.com",

  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",

  projectId: "YOUR_PROJECT",

  storageBucket: "YOUR_PROJECT.appspot.com",

  messagingSenderId: "XXXXXXXX",

  appId: "XXXXXXXX"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

const db = firebase.database();


// LOGIN

function login(){

    const provider =
    new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider);

}

auth.onAuthStateChanged(user => {

    if(user){

        document.getElementById("userInfo")
        .innerHTML =
        "Logged in: " + user.email;

    }else{

        document.getElementById("userInfo")
        .innerHTML =
        "Not Logged In";

    }

});


// VOTE FUNCTIONS

function voteONOESupport(){

    db.ref("votes/india/onoeSupport")
    .transaction(v => (v || 0) + 1);

}

function voteONOEAgainst(){

    db.ref("votes/india/onoeAgainst")
    .transaction(v => (v || 0) + 1);

}

function voteDELSupport(){

    db.ref("votes/india/delSupport")
    .transaction(v => (v || 0) + 1);

}

function voteDELAgainst(){

    db.ref("votes/india/delAgainst")
    .transaction(v => (v || 0) + 1);

}


// LIVE SYNC

db.ref("votes/india")
.on("value", snapshot => {

    const data = snapshot.val() || {};

    const onoeSupport =
    data.onoeSupport || 0;

    const onoeAgainst =
    data.onoeAgainst || 0;

    const delSupport =
    data.delSupport || 0;

    const delAgainst =
    data.delAgainst || 0;

    document.getElementById("onoeSupport")
    .innerHTML = onoeSupport;

    document.getElementById("onoeAgainst")
    .innerHTML = onoeAgainst;

    document.getElementById("delSupport")
    .innerHTML = delSupport;

    document.getElementById("delAgainst")
    .innerHTML = delAgainst;

    
    // AI Prediction

    let prediction = "";

    const totalSupport =
    onoeSupport + delSupport;

    const totalAgainst =
    onoeAgainst + delAgainst;

    if(totalSupport > totalAgainst){

        prediction =
        "🟢 Public Support Leading";

    }else if(totalAgainst > totalSupport){

        prediction =
        "🔴 Opposition Sentiment Rising";

    }else{

        prediction =
        "🟡 Tight Competition | Confidence: 50%";

    }

    document.getElementById("prediction")
    .innerHTML = prediction;

});

</script>

</body>
</html>
