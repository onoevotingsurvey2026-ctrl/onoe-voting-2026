<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ONOE TV Voting Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>

/* 🌌 Background */
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* 📺 HEADER */
.header {
  background: #111827;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  color: #00ffcc;
}

/* 📦 CONTAINER */
.container {
  max-width: 800px;
  margin: auto;
  padding: 15px;
}

/* 🧊 BOX STYLE */
.box {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 0 10px rgba(0,255,204,0.1);
}

.box h3 {
  margin: 5px;
}

.box p {
  font-size: 28px;
  color: #00ffcc;
  font-weight: bold;
}

/* 🔘 BUTTONS */
.buttons {
  text-align: center;
  margin-top: 15px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #1e3a8a;
  color: white;
}

button:active {
  transform: scale(0.95);
}

/* 📱 MOBILE */
@media(max-width:768px){
  .box p { font-size: 22px; }
}

</style>
</head>

<body>

<div class="header">
📺 ONOE LIVE TV VOTING DASHBOARD • INDIA ECI SURVEY
</div>

<div class="container">

<!-- VALUES -->
<div class="box">
<h3>ONOE Support</h3>
<p id="onoeSupport">0</p>
</div>

<div class="box">
<h3>ONOE Against</h3>
<p id="onoeAgainst">0</p>
</div>

<div class="box">
<h3>Delimitation Support</h3>
<p id="delSupport">0</p>
</div>

<div class="box">
<h3>Delimitation Against</h3>
<p id="delAgainst">0</p>
</div>

<!-- BUTTONS -->
<div class="buttons">

<button onclick="vote('onoeSupport', this)">👇 ONOE Support</button>
<button onclick="vote('onoeAgainst', this)">👇 ONOE Against</button>

<button onclick="vote('delSupport', this)">👇 Del Support</button>
<button onclick="vote('delAgainst', this)">👇 Del Against</button>

<br><br>

<button onclick="resetVotes()">🔄 Reset Votes</button>

</div>

</div>

<script>

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🌍 GLOBAL DOC
const ref = db.collection("votes").doc("global");

// 🔴 LIVE SYNC
ref.onSnapshot((doc) => {
  if (!doc.exists) return;

  let d = doc.data();

  document.getElementById("onoeSupport").innerText = d.onoeSupport || 0;
  document.getElementById("onoeAgainst").innerText = d.onoeAgainst || 0;
  document.getElementById("delSupport").innerText = d.delSupport || 0;
  document.getElementById("delAgainst").innerText = d.delAgainst || 0;
});

// 🟢 VOTE FUNCTION
function vote(field, btn) {
  ref.update({
    [field]: firebase.firestore.FieldValue.increment(1)
  });

  btn.innerHTML = "✔ Voted";
  btn.disabled = true;
}

// 🔵 RESET FUNCTION
function resetVotes() {
  ref.set({
    onoeSupport: 0,
    onoeAgainst: 0,
    delSupport: 0,
    delAgainst: 0
  });
}

</script>

</body>
</html>
