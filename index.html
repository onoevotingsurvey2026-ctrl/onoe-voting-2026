<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Global Overseas Election Dashboard</title>

  <!-- Firebase (v8 stable) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header{
      background:#111827;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 2fr 1fr;
      height:90vh;
    }

    section{
      padding:15px;
      border-right:1px solid #1f2937;
    }

    button{
      padding:10px;
      margin:5px;
      border-radius:8px;
      cursor:pointer;
    }

    canvas{
      background:white;
      border-radius:10px;
      margin-top:10px;
    }
  </style>
</head>

<body>

<header>
  🌍 Global Election Dashboard
  <button onclick="login()">Login with Google</button>
</header>

<div class="grid">

  <!-- LEFT -->
  <section>
    <h3>📊 Live Stats</h3>
    <div id="stats">Loading...</div>

    <h3>🤖 AI Assistant</h3>
    <div id="ai">Ask anything...</div>
  </section>

  <!-- CENTER -->
  <section>
    <h2>🗳️ Voting Panel</h2>

    <button onclick="vote('onoeSupport')">ONOE +</button>
    <button onclick="vote('onoeAgainst')">ONOE -</button>
    <button onclick="vote('delSupport')">DEL +</button>
    <button onclick="vote('delAgainst')">DEL -</button>

    <canvas id="chart"></canvas>
  </section>

  <!-- RIGHT -->
  <section>
    <h3>🌍 Global Map</h3>
    <div>Live map loading...</div>

    <h3>🔐 Security</h3>
    <div>Active Protection ON</div>
  </section>

</div>

<script>

//////////////////////////////////////////////////////
// 🔥 FIREBASE CONFIG (ONLY ONE - CLEAN VERSION)
//////////////////////////////////////////////////////
const firebaseConfig = {
  apiKey: "AIzaSyCfyVODifxy7a1Vt80IcU-ixhZwu6W0Jeg",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026",
  storageBucket: "onoevote2026.firebasestorage.app",
  messagingSenderId: "181065724520",
  appId: "1:181065724520:web:f72a93869786373c1101dd"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

//////////////////////////////////////////////////////
// 🔑 LOGIN FIX (POPUP)
//////////////////////////////////////////////////////
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(user => {
      alert("Login Success: " + user.user.email);
    })
    .catch(err => {
      alert("Login Error: " + err.message);
      console.log(err);
    });
}

//////////////////////////////////////////////////////
// 🗳️ VOTE FUNCTION
//////////////////////////////////////////////////////
function vote(type){

  const user = auth.currentUser;

  if(!user){
    alert("Please login first");
    return;
  }

  const ref = db.ref("votes/india/" + type);

  ref.transaction(value => (value || 0) + 1);
}

//////////////////////////////////////////////////////
// 📊 LIVE DASHBOARD
//////////////////////////////////////////////////////
db.ref("votes/india").on("value", snap => {

  const data = snap.val() || {};

  document.getElementById("stats").innerHTML = `
    ONOE Support: ${data.onoeSupport || 0} <br>
    ONOE Against: ${data.onoeAgainst || 0} <br>
    DEL Support: ${data.delSupport || 0} <br>
    DEL Against: ${data.delAgainst || 0}
  `;

  // Chart update
  new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["ONOE+", "ONOE-", "DEL+", "DEL-"],
      datasets: [{
        data: [
          data.onoeSupport || 0,
          data.onoeAgainst || 0,
          data.delSupport || 0,
          data.delAgainst || 0
        ]
      }]
    }
  });

});

</script>

</body>
</html>
