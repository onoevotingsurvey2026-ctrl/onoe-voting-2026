<!DOCTYPE html>
<html>
<head>
  <title>Election Portal 4.0</title>

  <!-- Auto refresh (live feel) -->
  <meta http-equiv="refresh" content="15">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f4f8;
    }

    header {
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: white;
      padding: 30px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .container {
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: white;
      margin: 20px 0;
      padding: 15px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.01);
    }

    h3 {
      margin-top: 0;
      color: #1e3a8a;
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #0f172a;
      color: white;
      margin-top: 20px;
    }

    .badge {
      display: inline-block;
      background: #2563eb;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>
🗳️ LIVE ELECTION PORTAL 4.0
<div class="badge">Real-Time Dashboard System</div>
</header>

<div class="container">

  <div class="card">
    <h3>📊 ONOE Voting Results</h3>
    <iframe src="YOUR_GOOGLE_SHEET_LINK_HERE"></iframe>
  </div>

  <div class="card">
    <h3>📊 DEL Voting Results</h3>
    <iframe src="YOUR_GOOGLE_SHEET_LINK_HERE"></iframe>
  </div>

  <div class="card">
    <h3>📊 Comparison Chart</h3>
    <iframe src="YOUR_GOOGLE_SHEET_LINK_HERE"></iframe>
  </div>

</div>

<footer>
Built for Public Voting Transparency 🚀 | Election Portal 4.0
</footer>

</body>
</html>
