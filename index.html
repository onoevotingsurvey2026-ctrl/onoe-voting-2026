<!DOCTYPE html>
<html>
<head>
  <title>ONOE & Delimitation Public Opinion Dashboard</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b1220;
      color:white;
      text-align:center;
    }

    header {
      padding:15px;
      background:#111827;
      border-bottom:2px solid red;
    }

    .live { color:red; font-weight:bold; }

    .topbar {
      display:flex;
      justify-content:space-between;
      padding:10px 20px;
      background:#1f2937;
    }

    button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .vote { width:240px; font-size:16px; }

    .onoe { background:#2563eb; color:white; }
    .delim { background:#16a34a; color:white; }
    .comb { background:#7c3aed; color:white; }

    .box { width:90%; margin:auto; margin-top:20px; }

    #loginBox { margin-top:60px; }

    .ticker {
      position:fixed;
      bottom:0;
      width:100%;
      background:red;
      padding:8px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<header>
🏛️ ஒரே நாடு ஒரே தேர்தல் & தொகுதி மறுசீரமைப்பு  
<br>
ONOE & Delimitation Public Opinion Dashboard
<br>
<span class="live">🔴 LIVE / நேரலை</span>
</header>

<div class="topbar">
  <div id="user">👤 Guest / விருந்தினர்</div>
  <div>
    <button onclick="login()">🔑 Google Login / உள்நுழைய</button>
  </div>
</div>

<div id="loginBox">
  <h3>Login to Vote / வாக்களிக்க உள்நுழையவும்</h3>
  <p>📊 Live Results Updating Instantly</p>
</div>

<div id="dashboard" style="display:none">

  <h3>🗳️ Vote Options / வாக்கு தேர்வுகள்</h3>

  <button class="vote onoe" onclick="vote('onoe')">ONOE</button>
  <button class="vote delim" onclick="vote('delimitation')">Delimitation</button>
  <button class="vote comb" onclick="vote('combined')">Combined</button>

  <p id="status">Not voted yet</p>
  <p id="time"></p>

  <div class="box">
    <canvas id="bar"></canvas>
  </div>

  <div class="box">
    <canvas id="pie"></canvas>
  </div>

</div>

<div class="ticker" id="ticker">
🔴 LIVE DATA LOADING...
</div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let user = null;
let voted = false;

/* 🔥 LOGIN FIX (SAFE VERSION) */
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(result => {
      console.log("LOGIN SUCCESS:", result.user.email);
    })
    .catch(e => {
      console.log(e.code, e.message); // DEBUG LINE
      alert("Login Error: " + e.message);
    });
}

/* AUTH STATE */
auth.onAuthStateChanged(u => {
  if (u) {
    user = u;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("user").innerText = "👤 " + u.email;

    checkVote();
  }
});

/* CHECK VOTE */
function checkVote() {
  db.collection("userVotes").doc(user.uid).get().then(doc => {
    if (doc.exists) {
      voted = true;
      document.getElementById("status").innerText = "Already voted";
    }
  });
}

/* VOTE */
function vote(type) {
  if (voted) return;

  const ref = db.collection("votes").doc("india");

  db.runTransaction(async t => {
    const doc = await t.get(ref);
    let d = doc.data() || {onoe:0, delimitation:0, combined:0};

    d[type] = (d[type] || 0) + 1;

    t.set(ref, d);
  });

  voted = true;
  document.getElementById("status").innerText = "Vote recorded";
}

/* LIVE UPDATE */
let bar, pie;

db.collection("votes").doc("india")
.onSnapshot(doc => {

  let d = doc.data() || {onoe:0, delimitation:0, combined:0};

  let values = [d.onoe, d.delimitation, d.combined];
  let labels = ["ONOE", "Delimitation", "Combined"];

  if (bar) bar.destroy();
  bar = new Chart(document.getElementById("bar"), {
    type: "bar",
    data: { labels, datasets: [{ data: values }] }
  });

  if (pie) pie.destroy();
  pie = new Chart(document.getElementById("pie"), {
    type: "pie",
    data: { labels, datasets: [{ data: values }] }
  });

  document.getElementById("time").innerText =
    "⏱ " + new Date().toLocaleTimeString();

  document.getElementById("ticker").innerText =
    "🔴 LIVE → ONOE: " + d.onoe +
    " | DELIM: " + d.delimitation +
    " | COMB: " + d.combined;
});

</script>

</body>
</html>
