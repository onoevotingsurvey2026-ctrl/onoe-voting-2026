<!DOCTYPE html>
<html>
<head>
  <title>Global Real-Time Election Engine v1</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; margin:0; }
    .card { background:#111827; margin:10px; padding:15px; border-radius:10px; }
    button { padding:10px; margin:5px; cursor:pointer; }
  </style>
</head>

<body>

<h2 style="text-align:center;">🌍 Global Real-Time Election Engine v1</h2>

<!-- LOGIN -->
<div class="card">
  <button onclick="login()">Login with Google</button>
  <div id="user"></div>
</div>

<!-- LIVE STATS -->
<div class="card">
  <h3>📊 Live Stats (WebSocket)</h3>
  <div id="stats">Connecting...</div>
</div>

<!-- VOTING -->
<div class="card">
  <h3>🗳️ Voting Panel</h3>
  <button onclick="vote('onoeSupport')">ONOE +</button>
  <button onclick="vote('onoeAgainst')">ONOE -</button>
  <button onclick="vote('delSupport')">DEL +</button>
  <button onclick="vote('delAgainst')">DEL -</button>
</div>

<!-- AI -->
<div class="card">
  <h3>🤖 AI Prediction</h3>
  <div id="ai">Loading AI...</div>
</div>

<!-- SECURITY -->
<div class="card">
  <h3>🔐 Security Status</h3>
  <div>WebSocket Sync Active | Fraud Protection ON</div>
</div>

<script>

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "onoevote2026.firebaseapp.com",
  databaseURL: "https://onoevote2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "onoevote2026"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* ---------------- LOGIN ---------------- */

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
  .catch(()=>auth.signInWithRedirect(provider));
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").innerText =
      "Logged in: " + user.email;
  }
});

/* ---------------- WEBSOCKET ---------------- */

const socket = new WebSocket("ws://localhost:8080");

socket.onopen = () => {
  console.log("WebSocket Connected");
};

socket.onmessage = (event) => {

  const data = JSON.parse(event.data);

  document.getElementById("stats").innerHTML =
    "ONOE + : " + data.onoeSupport + "<br>" +
    "ONOE - : " + data.onoeAgainst + "<br>" +
    "DEL + : " + data.delSupport + "<br>" +
    "DEL - : " + data.delAgainst;

  aiPredict(data);

};

/* ---------------- VOTE ---------------- */

function vote(type){

  const user = auth.currentUser;

  if(!user){
    alert("Login required");
    return;
  }

  socket.send(JSON.stringify({
    type: "vote",
    voteType: type
  }));

}

/* ---------------- AI ENGINE ---------------- */

function aiPredict(d){

  const onoe = d.onoeSupport || 0;
  const del = d.delSupport || 0;
  const total = onoe + del + 1;

  let result = "";
  let confidence = 0;

  if(onoe === del){
    result = "🟡 Tight Competition";
    confidence = 50;
  }
  else if(onoe > del){
    result = "🟢 ONOE Leading";
    confidence = ((onoe-del)/total*100).toFixed(1);
  }
  else{
    result = "🔴 DEL Leading";
    confidence = ((del-onoe)/total*100).toFixed(1);
  }

  document.getElementById("ai").innerHTML =
    result + " | Confidence: " + confidence + "%";

}

</script>

</body>
</html>
