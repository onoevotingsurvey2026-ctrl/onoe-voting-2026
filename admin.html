<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - ONOE Voting</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    h2 {
      color: #00ffcc;
      margin-top: 20px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      margin: 15px auto;
      width: 340px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,255,204,0.2);
    }

    h3 {
      margin-bottom: 10px;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🧑‍💼 ADMIN DASHBOARD</h2>

<div id="status">Checking admin access...</div>

<!-- COUNTS -->
<div class="box">
  <h3>Candidate A</h3>
  <h1 id="aCount">0</h1>
</div>

<div class="box">
  <h3>Candidate B</h3>
  <h1 id="bCount">0</h1>
</div>

<div class="box">
  <h3>Candidate C</h3>
  <h1 id="cCount">0</h1>
</div>

<!-- GRAPH -->
<div class="box">
  <h3>📊 Live Vote Graph</h3>
  <canvas id="voteChart"></canvas>
</div>

<!-- FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase Config (REPLACE THIS)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// =======================
// 📊 CHART SETUP
// =======================
let chart;
let a = 0, b = 0, c = 0;

function initChart() {
  const ctx = document.getElementById("voteChart");

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Candidate A", "Candidate B", "Candidate C"],
      datasets: [{
        label: "Votes",
        data: [0, 0, 0],
        backgroundColor: ["red", "blue", "green"]
      }]
    }
  });
}

function updateChart() {
  if (chart) {
    chart.data.datasets[0].data = [a, b, c];
    chart.update();
  }
}

// =======================
// 🔐 ADMIN CHECK
// =======================
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    document.getElementById("status").innerText =
      "❌ Not logged in";
    return;
  }

  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if (snap.exists() && snap.data().role === "admin") {

    document.getElementById("status").innerText =
      "✅ Admin Access Granted";

    initChart();
    startDashboard();

  } else {
    document.getElementById("status").innerText =
      "⛔ Access Denied (Not Admin)";
  }
});

// =======================
// 📊 LIVE DASHBOARD
// =======================
function startDashboard() {

  onSnapshot(doc(db,"results","Candidate_A"), (snap)=>{
    a = snap.exists() ? snap.data().count : 0;
    document.getElementById("aCount").innerText = a;
    updateChart();
  });

  onSnapshot(doc(db,"results","Candidate_B"), (snap)=>{
    b = snap.exists() ? snap.data().count : 0;
    document.getElementById("bCount").innerText = b;
    updateChart();
  });

  onSnapshot(doc(db,"results","Candidate_C"), (snap)=>{
    c = snap.exists() ? snap.data().count : 0;
    document.getElementById("cCount").innerText = c;
    updateChart();
  });

}

</script>

</body>
</html>
