<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Voting System</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    h2 {
      color: #00ffcc;
      margin-top: 20px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      margin: 15px auto;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,255,204,0.2);
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🧑‍💼 ADMIN DASHBOARD</h2>

<div id="status" class="status">Checking admin access...</div>

<div class="box">
  <h3>Candidate A</h3>
  <h1 id="aCount">0</h1>
</div>

<div class="box">
  <h3>Candidate B</h3>
  <h1 id="bCount">0</h1>
</div>

<div class="box">
  <h3>Candidate C</h3>
  <h1 id="cCount">0</h1>
</div>

<!-- FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG (REPLACE THIS)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// =======================
// 🔐 ADMIN CHECK
// =======================
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    document.getElementById("status").innerText =
      "❌ Not logged in";
    return;
  }

  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if (snap.exists() && snap.data().role === "admin") {

    document.getElementById("status").innerText =
      "✅ Admin Access Granted";

    startDashboard();

  } else {
    document.getElementById("status").innerText =
      "⛔ Access Denied (Not Admin)";
  }
});


// =======================
// 📊 LIVE DASHBOARD
// =======================
function startDashboard() {

  onSnapshot(doc(db,"results","Candidate_A"), (snap)=>{
    document.getElementById("aCount").innerText =
      snap.exists() ? snap.data().count : 0;
  });

  onSnapshot(doc(db,"results","Candidate_B"), (snap)=>{
    document.getElementById("bCount").innerText =
      snap.exists() ? snap.data().count : 0;
  });

  onSnapshot(doc(db,"results","Candidate_C"), (snap)=>{
    document.getElementById("cCount").innerText =
      snap.exists() ? snap.data().count : 0;
  });

}

</script>

</body>
</html>
